# PR-level CI workflow — the central per-PR test harness for all three
# in-tree toolchains.
#
# Locked matrix (Goal #11 DoD bullet 4 — every PR runs lint + tests on
# every toolchain that has source code in the repo):
#
#   python-lint-test  : ruff check + ruff format --check + mypy + pytest on backend/
#   go-lint-test      : golangci-lint + go build + go test on cli/
#   helm-lint-template: helm lint + helm template + kubeconform on deploy/charts/meho/
#
# Each job runs on its own meho-runners-ci runner in parallel; total wall
# clock for a green PR is well below the 10-minute Goal #11 budget
# because the three jobs never block each other. Per-job
# `timeout-minutes` caps a runaway gate at twice its observed cost.
#
# Out of scope (deliberately delegated to existing workflows; do not
# duplicate here):
#   * Backplane image build / push  -> .github/workflows/image.yml
#     (builds without pushing on PRs that touch `backend/**` or
#     `.github/workflows/image.yml` — path-filtered, see image.yml's
#     `on.pull_request.paths`). PRs that don't touch backend skip the
#     image build by design — the Dockerfile + dep-resolution gate only
#     needs to run when its inputs change. Repeating the build here
#     would double the cost for backend PRs and add zero signal for
#     non-backend PRs.
#   * Alembic backward-compat guard -> .github/workflows/migration-compat.yml
#     (path-scoped to backend/alembic/versions/**, runs only when
#     migrations change).
#   * Chart publish / sign          -> .github/workflows/chart.yml
#     (publish runs only on main + tag pushes; chart.yml's `validate`
#     job runs on PRs too as a path-scoped gate. This workflow's
#     helm job exercises the same lint+template+kubeconform pass
#     unconditionally so a chart-touching regression also fails the
#     central CI check operators see in branch protection.)
#   * Dependency license scan       -> .github/workflows/dependency-license-check.yml
#     (path-scoped to manifest changes).
#   * Secret + supply-chain scans   -> secret-scan.yml + security-scan.yml.
#
# The workflow name is `CI` so it satisfies the `workflow_run:
# workflows: ["CI"]` dependency in quality-gate.yml (SonarCloud's
# Clean-as-You-Code gate). The Python job uploads `coverage.xml` as a
# `python-coverage` artifact so the downstream SonarCloud scan can
# ingest it — quality-gate.yml's `actions/download-artifact` step
# references that exact name.
#
# Fail-loud posture (per Goal #11 + devops_best_practices "no
# continue-on-error on linters or tests"): every step that asserts a
# contract is allowed to fail the job. The only continue-on-error in
# this file is on the coverage artifact upload — losing the artifact
# does not invalidate the test result, and SonarCloud already guards
# its own download with continue-on-error.
#
# All third-party actions pinned to immutable SHAs with the
# human-readable tag in a trailing comment (devops_best_practices:
# SHA-pin every action). Same SHAs as the publish workflows where the
# action overlaps, so a single supply-chain audit covers all of CI.
#
# Merge queue (#769): the `merge_group` event fires when a PR is admitted
# to the GitHub merge queue. Required checks configured in the merge-queue
# ruleset run against the actual merge result (PR head + current main +
# any ahead-in-queue PRs), so a semantically-broken combination is caught
# before it reaches main — ending the inherited-red episodes from
# 2026-05-20/21. The concurrency group is intentionally NOT set to
# cancel-in-progress on merge_group runs: a cancelled queue check fails
# the merge attempt and defeats the queue's purpose. cancel-in-progress
# is scoped to pull_request / push refs only so PR force-pushes and rapid
# main pushes still cancel their predecessors cleanly.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Fires when a PR enters the merge queue. Runs the full check matrix
  # against the synthesised merge commit (PR + current main tip +
  # any ahead-in-queue PRs). This is the gate that prevents a
  # stale-but-green PR from landing a broken combination on main.
  merge_group:

permissions:
  contents: read

concurrency:
  # On push to main: one in-flight CI run per ref so a fast follow-up
  # commit cancels its predecessor. On PRs: scoped per PR ref so an
  # author force-push cancels its own prior CI run cleanly. Mirrors
  # the pattern used by image.yml, chart.yml, and cli-release.yml.
  #
  # IMPORTANT: already-running merge_group jobs must NEVER be cancelled.
  # A cancelled queue check causes the merge attempt to fail and the PR
  # falls out of the queue — defeating the whole point of the merge queue.
  # The conditional below restricts cancel-in-progress to pull_request /
  # push contexts only. Queued (not-yet-started) merge_group runs can
  # still be displaced by newer queue entries; that is expected behaviour.
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

jobs:
  python-lint-test:
    name: Python (ruff + mypy + pytest)
    # Fork-PR guard: never execute project code from a fork on the
    # self-hosted runner pool. Mirrors image.yml + chart.yml's stance —
    # `runs-on: meho-runners-ci` is internal infra, so fork PRs skip
    # entirely. Push events (main) short-circuit the OR via
    # github.event_name != 'pull_request'. Job-level (not step-level)
    # so no step ever starts on a fork PR.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    # Dedicated heavy ARC scale set (6000m requests=limits, max 5 pods)
    # for the unit suite only — #761. The other jobs (Go, Helm,
    # integration) stay on the 4-core `meho-runners-ci` pool; only the
    # pytest sweep is CPU-bound enough to want the extra cores. Heavy
    # pool scales from 0, so an idle period costs one cold-start on the
    # next run. Provisioned RDC-side in rdc-gitops#55.
    runs-on: meho-runners-ci-heavy
    # 20-min cap: ~2x the observed ~9.3-min job wall after #771/#799
    # removed the per-test descriptor re-embedding that had dominated
    # this job. pytest is ~8m33s with --cov+sysmon (run 26245676016,
    # the post-#799 push) / ~7m35s without; everything else in the job
    # (uv sync, ruff, mypy, drift-guard) is <1 min combined. History:
    # the combined serial sweep once blew the 10→20→40→50-min caps
    # (runs 25910787068, 25970564527, 25972807988, 25987329377,
    # 25992737115) before the integration split (#570), xdist
    # (#585/#603), and the #799 re-embed fix landed; the 50-min cap was
    # generous headroom from that era. Retuned down now that real
    # multi-core wall-clock is observed, exactly as the prior comment
    # instructed. Job name is intentionally unchanged so the existing
    # branch-protection required check stays satisfied.
    timeout-minutes: 20
    env:
      # Route testcontainers pulls through the in-cluster Harbor proxy
      # cache (claude-rdc-hetzner-dc#463; project `dockerhub-proxy` public,
      # anonymous consumer auth, wired into runner DinD via
      # meho-internal#75). The test code reads these env vars with a
      # docker.io short-name default — see backend/tests/test_db_engine.py
      # `MEHO_TEST_PGVECTOR_IMAGE`, backend/tests/test_broadcast_client.py
      # `MEHO_TEST_VALKEY_IMAGE`, backend/tests/integration/
      # test_connectors_vmware_rest_vcsim.py `MEHO_TEST_VCSIM_IMAGE` —
      # so the env-only swap requires no source-code changes.
      # `docker/login-action` below stays load-bearing until #78's Half
      # B sees a green cache-hit week and retires it.
      MEHO_TEST_PGVECTOR_IMAGE: harbor.evba.lab/dockerhub-proxy/pgvector/pgvector:pg16
      MEHO_TEST_VALKEY_IMAGE: harbor.evba.lab/dockerhub-proxy/valkey/valkey:8
      MEHO_TEST_VCSIM_IMAGE: harbor.evba.lab/dockerhub-proxy/vmware/vcsim:latest
      # Vault dev-mode container for the G3.3-T7 kv/sys/auth e2e suite
      # (backend/tests/integration/test_connectors_vault_dev_e2e.py).
      # Same env-knob shape as the rows above: the test reads this with
      # a docker.io short-name default (`hashicorp/vault:1.18`), so the
      # Harbor-proxy swap is config-only — no source change. Pinned to
      # the 1.18 LTS minor (not `:latest`) so an upstream Vault release
      # never breaks an unrelated PR.
      MEHO_TEST_VAULT_IMAGE: harbor.evba.lab/dockerhub-proxy/hashicorp/vault:1.18
    defaults:
      run:
        # backend/ is the only Python project today; pyproject.toml
        # and uv.lock both live here.
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Docker Hub login (for testcontainers pulls)
        # Pulls inside the DinD daemon (testcontainers PostgresContainer
        # spinning up pgvector/pgvector:pg16 for test_db_engine.py /
        # test_migration_rollback.py / tests/integration/*, plus
        # vmware/vcsim for the G3.1-T8 vmware-rest acceptance tests
        # under tests/acceptance/test_vmware_rest_*.py) share the
        # ARC cluster's NAT egress IP, which exhausts Docker Hub's
        # 100/6h anonymous bucket. Authenticated Personal-tier doubles
        # it to 200/6h
        # (https://docs.docker.com/docker-hub/usage/pulls/). Same
        # org-level secrets security-scan.yml uses, provisioned at
        # the evoila org level (visibility `all`) with 1Password
        # vault custody — see meho-internal#74 for the regression
        # context this addresses. Long-term, the in-cluster proxy
        # cache from claude-rdc-hetzner-dc#463 retires this step.
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install uv
        # uv is the project's canonical Python toolchain (pyproject.toml
        # locks a uv.lock, not a requirements.txt). enable-cache: true
        # opts into the action's built-in cache for the uv download
        # cache directory, keyed by uv.lock — repeat installs on the
        # same lockfile are near-instant. version unset -> latest, which
        # is fine because uv ships a strict resolver and the lockfile
        # pins every transitive dep.
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Sync Python environment (locked)
        # --locked refuses to update uv.lock; if pyproject.toml drifted
        # from the lock, CI fails here rather than silently bumping
        # deps. --all-groups pulls dev tools (ruff, mypy, pytest, etc.)
        # declared in [dependency-groups.dev].
        run: uv sync --locked --all-groups

      - name: Ruff check (lint)
        # ruff config lives in backend/pyproject.toml [tool.ruff.lint].
        # Targets the src/ + tests/ trees the project ships.
        run: uv run ruff check src/ tests/

      - name: Ruff format --check
        # Format gate — non-zero exit if any file would be reformatted.
        # Authors run `uv run ruff format` locally before pushing.
        run: uv run ruff format --check src/ tests/

      - name: Mypy (strict)
        # [tool.mypy] in pyproject.toml is `strict = true` against
        # files = ["src"]. Per-dep ignores (authlib, hvac, requests)
        # are already declared there.
        run: uv run mypy src/

      - name: Cache fastembed model (drift-guard + slow-lane)
        # The drift-guard below downloads the ~67 MB default ONNX model
        # from HuggingFace. Without this cache every run re-fetches it
        # unauthenticated over the cluster's shared NAT egress (HF
        # rate-limits anonymous pulls) — pure repeated cost on the
        # slowest required job. Key on uv.lock: fastembed's version is
        # pinned there, so a fastembed bump (which can remap the HF
        # source/filename) misses the cache and the model re-downloads
        # exactly once, then re-saves. restore-keys lets an unrelated
        # lock change still reuse the prior model blob.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ${{ github.workspace }}/.fastembed-cache
          key: fastembed-model-${{ runner.os }}-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            fastembed-model-${{ runner.os }}-

      - name: Embedding-model drift guard (evoila/meho#574)
        # Regression guard for #574: actually instantiate
        # TextEmbedding(DEFAULT_EMBEDDING_MODEL) + run one real embed,
        # so a fastembed<->model-repo drift (the model repo dropping
        # `model_optimized.onnx`, fastembed remapping the HF source,
        # an incompatible fastembed bump, …) fails THIS PR instead of
        # CrashLooping in production on a clean deploy. Green ci.yml on
        # a runtime-fetched model cannot catch this; this step does.
        # The image build runs the same module to BAKE the model
        # (backend/Dockerfile); here we only assert, into the cached
        # workspace dir (the runner sandbox can't write `/opt`).
        # HF_TOKEN (if the secret is configured) authenticates the
        # download for higher HF rate limits + faster pulls; absent →
        # empty → anonymous (current behaviour, no regression).
        env:
          MEHO_WARM_CACHE_DIR: ${{ github.workspace }}/.fastembed-cache
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run python -m meho_backplane.retrieval.warm

      - name: Provision spaCy NLP model for Presidio Tier-2 (#1072)
        # G11.4-T3 (#1072) ships the Tier-2 Presidio NER adapter
        # (capability-flagged per policy). The acceptance gate
        # (``Tier-2 redacts a free-text field containing a person
        # name / IP / FQDN``) requires a spaCy model on the host;
        # spaCy ships no model out of the box and Presidio's
        # AnalyzerEngine raises ``Tier2NotAvailableError`` without one.
        # ``en_core_web_sm`` (~12 MB) is the fast-CI choice; production
        # Docker images bake ``en_core_web_lg`` (~560 MB, the Presidio
        # documented default for higher NER recall). The acceptance
        # tests in tests/test_redaction_presidio.py and the Tier-2
        # middleware test gate on ``spacy.util.is_package(...)``,
        # accepting either model -- so this step suffices for the
        # unit lane's correctness signal without paying the ``lg``
        # download wall every run.
        #
        # ``MEHO_REDACTION_SPACY_MODEL`` is the runtime override the
        # presidio.py adapter reads; setting it here pins the unit
        # job's engine to the ``sm`` model regardless of the
        # adapter's default. Production deployments leave the env
        # unset and let the adapter pick the documented default.
        run: |
          uv run python -m spacy download en_core_web_sm
          # Smoke-test the import path so a presidio<->spacy model-
          # version mismatch fails THIS PR, not the integration lane.
          MEHO_REDACTION_SPACY_MODEL=en_core_web_sm \
            uv run python -c "from meho_backplane.redaction import get_engines; get_engines('en')"

      - name: Pytest (unit + coverage)
        env:
          # Pin Tier-2's spaCy model to the unit-lane choice so the
          # acceptance tests in test_redaction_presidio.py + the
          # tier2 path in test_redaction_middleware.py exercise the
          # real engine path instead of skipping. The integration
          # lane stays on the adapter's documented default
          # (en_core_web_lg) once that lane provisions the heavier
          # model.
          MEHO_REDACTION_SPACY_MODEL: en_core_web_sm
        # PARALLELIZED via pytest-xdist (#585 unblocked this). The
        # serial sweep was the job's dominant cost (~49 min in CI vs
        # ~5 min local). #585 added process-wide global-registry
        # snapshot/restore + deterministic MCP-module import in
        # tests/conftest.py, eliminating the cross-module isolation
        # leaks that previously made `-n auto` red on
        # test_mcp_registry / test_audit_middleware. Controlled
        # same-commit proof (acceptance of #585): serial 2007/0/0 and
        # `-n auto --dist loadscope` 2007/0/0 — identical, empty
        # failure set; local wall-clock serial 10:18 → xdist 6:14
        # (limited by core count; CI multi-core gets the ~49→~10 min).
        # -n 6: pinned, matched to the dedicated `meho-runners-ci-heavy`
        # scale set's 6000m guaranteed cores (#761). History: -n auto
        # was inconsistent on the shared 4-core pool (run 26164020459
        # reported 4 workers, a later same-day push reported 8 — cgroup
        # detection drift), so #726 pinned -n 3 (N-1, leaving a core for
        # the coordinator + DinD on the burstable 4-core pool). The heavy
        # pool is QoS Guaranteed (requests=limits=6000m), so the
        # host-core-detection ambiguity is gone and the headroom math
        # changes: 6 workers fully subscribe the pod. The xdist
        # coordinator is mostly IPC-blocked and DinD is near-idle during
        # pure-CPU test execution (testcontainers pgvector/valkey only
        # burst at spin-up — see MEHO_TEST_PGVECTOR_IMAGE env above), so
        # full subscription is the intended trade. If the #761 wall/
        # variance measurement shows oversubscription symptoms (high
        # variance, wall not improving vs -n 3), drop to -n 5 (N-1) as
        # the fallback. --dist loadscope: a module's
        # tests stay on one worker so module-/session-scoped fixtures
        # (testcontainers PG, embedding service) instantiate per
        # worker, not per test. --maxfail=1 preserves the old `-x`
        # fast-fail (xdist ignores `-x`). --ignore=tests/integration →
        # the container-heavy subtree runs in the sibling
        # `python-integration` job. Coverage is the unit sweep only;
        # combined cov is #564.
        # Coverage runs on BOTH push and PR. #726 had gated --cov to
        # push-only on the belief that pytest-cov was the unit job's
        # dominant cost; the #771 diagnostic (#793) disproved that — the
        # real cost was per-test descriptor re-embedding (fixed #799),
        # not coverage. With that fixed + sysmon, --cov adds only ~1 min
        # (pytest ~8m33s with cov vs ~7m35s without; run 26245676016),
        # so the job stays ~9.3 min — under the Goal #11 10-min budget —
        # while PRs regain SonarCloud Clean-as-You-Code new-code-coverage
        # decoration (no more "no data" on the PR widget) instead of it
        # updating one merge late. quality-gate.yml stays whole-job
        # continue-on-error, so a missing/late artifact still never
        # blocks merge. --cov-report is xml only — term is purely
        # cosmetic and serializes through xdist workers.
        # COVERAGE_CORE=sysmon swaps coverage.py's default C tracer
        # (per-line `sys.settrace` callbacks) for the PEP 669
        # `sys.monitoring` backend (Python 3.12+, coverage.py 7.4+; lock
        # pins 7.14). sysmon's event-driven model roughly halves the
        # tax; locally the line counts matched the C tracer exactly
        # (2913/11832 in both), which is what SonarCloud parity needs.
        # Branch-coverage is OFF in this project (no `--cov-branch`, no
        # `[tool.coverage.run] branch=true`), so the sysmon branch-
        # coverage caveat (requires `env.PYBEHAVIOR.branch_right_left`)
        # does not apply.
        run: |
          # Perf-budget guard — early warning for CI-perf creep (the #898 / G3.6
          # timeout class). The Goal #11 unit budget is 10 min, but it was
          # aspirational (comment-only): the G3.6 batch crept 9.3 -> 19 min and
          # nothing failed until the 20-min `timeout-minutes` cliff, blocking a
          # release. This step measures the pytest wall, always prints it (trend
          # visibility), and FAILS at the budget — well below the hard cap, so a
          # regression is caught at the PR that causes it, not at release time.
          # `timeout-minutes` stays as the hang backstop.
          # MEASURE before raising budget_s (see #793/#827/#898): re-run with
          #   MEHO_FIXTURE_TIMING_FILE=/tmp/fixt MEHO_LIFESPAN_TIMING=/tmp/lifespan
          # then `uv run python tests/_perf_timing_report.py` to attribute the wall.
          budget_s=600
          start=$(date +%s)
          COVERAGE_CORE=sysmon uv run pytest -n 6 --dist loadscope --maxfail=1 --ignore=tests/integration \
            --cov=meho_backplane --cov-report=xml tests/
          dur=$(( $(date +%s) - start ))
          echo "::notice title=Unit pytest wall::${dur}s (budget ${budget_s}s = Goal #11 10-min; hard cap = job timeout-minutes)"
          if [ "$dur" -gt "$budget_s" ]; then
            echo "::error title=Unit perf budget exceeded::unit pytest ${dur}s > budget ${budget_s}s. Early-warning gate for CI-perf creep (#898 / G3.6 class). MEASURE the slow path before raising budget_s: MEHO_FIXTURE_TIMING_FILE + MEHO_LIFESPAN_TIMING + tests/_perf_timing_report.py (#793/#827). Amortize the cost; do not just bump the budget."
            exit 1
          fi

      - name: Upload Python coverage artifact
        # Consumed by quality-gate.yml (`workflow_run` -> SonarCloud).
        # Lossy artifact: a missing upload (network, runner eviction)
        # degrades the SonarCloud signal to "no coverage for this run"
        # but never invalidates the test outcome. continue-on-error is
        # appropriate ONLY for this step — every preceding linter /
        # type check / test is fail-loud.
        if: always() && hashFiles('backend/coverage.xml') != ''
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: python-coverage
          path: backend/coverage.xml
          retention-days: 7
          if-no-files-found: warn

  python-integration:
    name: Python (integration testcontainers)
    # Sibling of python-lint-test. Holds the container-heavy
    # tests/integration/ subtree (pgvector/valkey/k3d/vcsim
    # testcontainers) that made the combined serial sweep blow every
    # timeout cap (see python-lint-test comment). Separated so the
    # required lint+mypy+unit gate stays fast and deterministic while
    # integration runs on every PR.
    # **Required merge gate as of 2026-05-20 (#698).** This job's
    # context ("Python (integration testcontainers)") is in
    # ``branches/main/protection.required_status_checks.contexts``;
    # promoting it was the structural corrective to the v0.2 / G3.4
    # green-but-hollow incidents (#634 / #697) — the lane that
    # exercises real connector dispatch, k3d / bind9-container /
    # vcsim / federated-write acceptance, must be merge-blocking so
    # red integration cannot ship to ``main`` again.
    # 60-min cap: container pulls + DinD spin-up + the serial
    # integration sweep. pytest-xdist loadgroup parallelization to
    # bring this well under cap is tracked in #564.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: meho-runners-ci
    timeout-minutes: 60
    env:
      MEHO_TEST_PGVECTOR_IMAGE: harbor.evba.lab/dockerhub-proxy/pgvector/pgvector:pg16
      MEHO_TEST_VALKEY_IMAGE: harbor.evba.lab/dockerhub-proxy/valkey/valkey:8
      MEHO_TEST_VCSIM_IMAGE: harbor.evba.lab/dockerhub-proxy/vmware/vcsim:latest
      MEHO_TEST_VAULT_IMAGE: harbor.evba.lab/dockerhub-proxy/hashicorp/vault:1.18
      # G3.2-T6 (#326) — k3s container fixture for the K8s typed-connector
      # E2E acceptance harness (tests/integration/test_connectors_k8s_e2e.py
      # and the existing tests/integration/test_connectors_k8s_k3d.py).
      # Pinned to the same minor the k3d/k3s fixture's in-code default
      # uses (rancher/k3s:v1.32.5-k3s1) so the Harbor proxy serves the
      # exact tag the testcontainers fixture asks for, without a docker.io
      # round-trip.
      MEHO_TEST_K3S_IMAGE: harbor.evba.lab/dockerhub-proxy/rancher/k3s:v1.32.5-k3s1
      # G11.2-T7 (#1098) — Keycloak 26.x container fixture for the
      # live-IdP integration test
      # (backend/tests/integration/test_auth_keycloak_client_credentials.py).
      # Unlike the rows above this one has **no docker.io short-name
      # default** in the fixture: the Keycloak image is ~600 MB and an
      # unauthenticated docker.io pull would reliably exhaust the
      # cluster's shared NAT egress bucket, so the fixture skips when
      # MEHO_TEST_KEYCLOAK_IMAGE is unset rather than falling back. The
      # Harbor-proxied tag is the only path that runs the suite to
      # pass; everywhere else (local dev sandboxes, agent sandboxes,
      # any future fork PR job that doesn't see this env) the test
      # skips cleanly with a clear remediation message.
      MEHO_TEST_KEYCLOAK_IMAGE: harbor.evba.lab/dockerhub-proxy/keycloak/keycloak:26.0
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Docker Hub login (for testcontainers pulls)
        # Same rationale as python-lint-test's login step — the
        # integration subtree is the heaviest testcontainers consumer
        # (pgvector/valkey/k3d/vcsim), so authenticated pulls are
        # load-bearing here in particular.
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Sync Python environment (locked)
        run: uv sync --locked --all-groups

      - name: Pytest (integration testcontainers)
        # Only the tests/integration/ subtree. No --cov here: coverage
        # is emitted by the unit job (see its NOTE); combined coverage
        # is a #564 follow-up. -x for fast-fail on the first broken
        # integration case. Deliberately NOT parallelized: the unit
        # job is the ~49min bottleneck (now split-parallelized); this
        # job is ~6min and its container-heavy fixtures under xdist
        # are unverified — out of scope for the perf change.
        run: uv run pytest -x tests/integration/

  go-lint-test:
    name: Go (golangci-lint + go test)
    # Fork-PR guard mirrors the Python job — same rationale.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: meho-runners-ci
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        # Same version + cache shape as cli-release.yml so a single
        # supply-chain audit covers both. cache-dependency-path keys
        # the Go module cache off cli/go.sum, the only Go module in
        # the tree today.
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          # Tracks `cli/go.mod`'s `go 1.25.8` directive. golangci-lint
          # invokes `go/packages` which honors the go.mod-required Go
          # version; running an older Go than go.mod requires fails with
          # `go.mod requires go >= X` (CI run 25680051917).
          # Bumped from 1.23 → 1.25 because charm.land/huh/v2 v2.0.3's
          # transitive deps raised the minimum to go 1.25.8 (PR #640).
          go-version: '1.25'
          cache-dependency-path: cli/go.sum

      - name: golangci-lint
        # v9.2.0: cli/.golangci.yml was migrated from v1 to v2 schema in
        # PR #640 (alongside the go 1.25 bump) so the action major upgrade
        # is now safe. golangci-lint v2.12.2 is compiled with Go 1.25,
        # resolving the "go language version used to build golangci-lint
        # is lower than the targeted Go version" failure that v1.64.8
        # (built with Go 1.24) produced once go-version was bumped to 1.25.
        # golangci-lint-action v7+ refuses v1.x binaries; v9.2.0 requires
        # golangci-lint >= v2.x and fully supports the v2 config schema.
        # SHA pinned to v9.2.0 commit (devops_best_practices: pin to
        # immutable SHA). Dependabot ignore list updated to track v9.x
        # minor/patch bumps rather than the now-retired v6 pin.
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
        with:
          version: v2.12.2
          working-directory: cli

      - name: Go build
        # Smoke build of every package — fails fast on a broken import
        # graph or a typo before the test gate touches anything. cwd is
        # cli/ so `./...` resolves to the CLI module's packages only.
        working-directory: cli
        run: go build ./...

      - name: Ensure C toolchain is available (for cgo race runtime)
        # `go test -race` links the cgo-based race runtime, which needs
        # a working C toolchain — both `gcc` (or any cc) AND libc
        # development headers (`<stdlib.h>` etc.). The `meho-runners-ci`
        # self-hosted pool ships a minimal image without either, so
        # the race test would fail with one of:
        #   - `cgo: C compiler "gcc" not found` (no gcc), or
        #   - `_cgo_export.c:3:10: fatal error: stdlib.h: No such file
        #     or directory` (gcc installed, no libc6-dev — caught
        #     after the first iteration of this PR's CI).
        #
        # Install both as a unit. We check `<stdlib.h>` (not just
        # `gcc`) because a half-provisioned runner (gcc, no headers)
        # is exactly the state the previous fix iteration produced.
        # The probe compiles a one-liner via `cpp` so a future runner
        # with a non-gcc cc (e.g. clang) still passes the check.
        #
        # `sudo -n` keeps the step fail-fast on a runner that doesn't
        # grant passwordless sudo — that's a runner-pool config gap
        # better surfaced loudly here than buried in a confusing
        # later `cgo:` error. `--no-install-recommends` keeps the
        # install fast and minimal: gcc + libc6-dev only, no
        # editors/manpages/etc. The proper long-term fix is to bake
        # the C toolchain into the meho-runners-ci base image; until
        # then this step keeps PR CI green without expanding the
        # workflow's blast radius.
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          have_cc=0
          if command -v cc >/dev/null 2>&1 || command -v gcc >/dev/null 2>&1; then
            have_cc=1
          fi
          have_headers=0
          if echo '#include <stdlib.h>' | cpp -E - >/dev/null 2>&1; then
            have_headers=1
          fi
          if [ "${have_cc}" = "1" ] && [ "${have_headers}" = "1" ]; then
            echo "C toolchain ready: $(gcc --version 2>/dev/null | head -1 || cc --version | head -1)"
            exit 0
          fi
          echo "C toolchain incomplete (cc=${have_cc} headers=${have_headers}); installing gcc + libc6-dev via apt..."
          sudo -n DEBIAN_FRONTEND=noninteractive apt-get update -y
          sudo -n DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends gcc libc6-dev

      - name: Go test (race + coverage)
        # -race catches data races the CLI may hit when the
        # async-token-refresh code (internal/auth) is exercised from
        # parallel tests. -coverprofile writes a merged profile consumed
        # by the downstream SonarCloud scan (sonar.go.coverage.reportPaths)
        # so the Clean-as-You-Code new-code-coverage gate sees Go coverage,
        # not 0%. -covermode=atomic is required under -race.
        #
        # CGO_ENABLED=1 is required: `go test -race` is implemented in
        # the cgo-based race runtime and refuses to run otherwise
        # (`go: -race requires cgo; enable cgo by setting CGO_ENABLED=1`).
        # The `meho-runners-ci` self-hosted pool defaults to CGO_ENABLED=0,
        # so the flag must be set explicitly here. The preceding step
        # ensures `gcc` is on PATH so the race runtime can actually
        # link. Scoped to this step only — the build/lint steps work
        # fine with cgo off and don't need the C toolchain dependency.
        working-directory: cli
        env:
          CGO_ENABLED: '1'
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload Go coverage artifact
        # Consumed by quality-gate.yml (`workflow_run` -> SonarCloud).
        # Lossy like the Python sibling: a missing upload degrades the
        # SonarCloud signal to "no Go coverage for this run" but never
        # invalidates the test outcome. continue-on-error is appropriate
        # ONLY for this step.
        if: always() && hashFiles('cli/coverage.out') != ''
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: go-coverage
          path: cli/coverage.out
          retention-days: 7

  cli-api-snapshot-freshness:
    name: CLI API snapshot freshness
    # Fork-PR guard mirrors the other jobs — needs the internal runner pool.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: meho-runners-ci
    timeout-minutes: 10
    steps:
      - name: Checkout
        # persist-credentials: false — this job only does a read-only
        # checkout + a working-tree `git diff`; it never pushes, so it
        # has no need for the checkout token persisted in local git config.
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        # `make generate` runs the pinned oapi-codegen (installed by the
        # Makefile `tools` target) which needs Go. Same version + cache
        # shape as the go-lint-test lane.
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.25'
          cache-dependency-path: cli/go.sum

      - name: Ensure make is available
        # The minimal meho-runners-ci image ships no `make` (the Go lane
        # never needed it — it calls `go` directly). Install it via apt so
        # this job can drive the canonical Makefile targets rather than
        # duplicating their commands (which would drift from the Makefile).
        # Same `sudo -n apt-get` pattern as the go-lint-test C-toolchain
        # step; baking make into the base image is the long-term fix.
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          if command -v make >/dev/null 2>&1; then
            echo "make ready: $(make --version | head -1)"
            exit 0
          fi
          echo "make missing; installing via apt..."
          sudo -n DEBIAN_FRONTEND=noninteractive apt-get update -y
          sudo -n DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends make

      - name: Install uv
        # `make snapshot-openapi` drives the backplane FastAPI app via
        # `uv run` (cli/api/snapshot-openapi.py imports meho_backplane.main
        # and calls app.openapi()), so the backend env must resolve. Same
        # action + cache shape as the Python lanes.
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true

      - name: Sync backend environment (locked)
        working-directory: backend
        run: uv sync --locked --all-groups

      - name: Regenerate OpenAPI snapshot + Go client
        # Run the same Make targets the maintainer runs so the drift check
        # compares like-for-like. snapshot-openapi writes cli/api/openapi.json
        # (downgrading OpenAPI 3.1->3.0 for oapi-codegen v2, see the script
        # header); generate (which depends on `tools`) rebuilds
        # cli/internal/api/client.gen.go from it. The regen is idempotent,
        # so a clean tree means the committed artifacts are already current.
        working-directory: cli
        run: |
          make snapshot-openapi
          make generate

      - name: Fail if the committed snapshot / client are stale
        # The snapshot + generated client are checked-in artifacts derived
        # from the backend OpenAPI document. If a backend route changed
        # without re-running the two targets above, the working tree now
        # differs from HEAD — fail with the remediation command. Same
        # rationale as a `go mod tidy` / `uv.lock --locked` drift gate.
        run: |
          if ! git diff --exit-code -- cli/api/openapi.json cli/internal/api/client.gen.go; then
            echo "::error title=CLI API snapshot stale::cli/api/openapi.json and/or cli/internal/api/client.gen.go are out of date relative to the backend OpenAPI document. Run 'cd cli && make snapshot-openapi && make generate' and commit the result."
            exit 1
          fi

  helm-lint-template:
    name: Helm (lint + template + kubeconform)
    # Fork-PR guard mirrors the other jobs.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: meho-runners-ci
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Helm
        # Same version pin as chart.yml's validate + publish jobs so
        # the central CI check exercises the same Helm binary the
        # publish pipeline uses. >=3.8 ships OCI helm push (irrelevant
        # here — this job never pushes — but kept aligned).
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v3.16.4

      - name: Install kubeconform
        # kubeconform validates rendered manifests against Kubernetes
        # JSON Schemas offline. Pin to v0.6.7 by SHA256 — same shape
        # chart.yml uses (devops_best_practices: no `curl|sh` of
        # unpinned binaries). Install to $HOME/.local/bin because the
        # self-hosted meho-runners-ci pool runs as a non-root user that
        # cannot write to /usr/local/bin (regression caught in PR #173
        # / CI run 25644668781). Appending to $GITHUB_PATH surfaces
        # the binary to subsequent steps without relying on the install
        # step's frozen PATH.
        run: |
          set -euo pipefail
          KC_VER=v0.6.7
          KC_SHA=95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KC_VER}/kubeconform-linux-amd64.tar.gz"
          echo "${KC_SHA}  /tmp/kubeconform.tar.gz" | sha256sum -c -
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp/ kubeconform
          mkdir -p "${HOME}/.local/bin"
          install -m 0755 /tmp/kubeconform "${HOME}/.local/bin/kubeconform"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/kubeconform" -v

      - name: Helm lint
        # The chart ships safe-by-default empty fields that
        # values.schema.json rejects at lint time on purpose; the same
        # override set chart.yml uses keeps the lint exercising the
        # typed schema end-to-end. Any drift between the CI override
        # set and chart.yml means one of the two is wrong — kept in
        # sync intentionally.
        run: |
          helm lint deploy/charts/meho/ \
            --set image.tag=test \
            --set ingress.host=meho.test \
            --set ingress.tls.secretName=meho-tls \
            --set postgres.credentialsSecret=meho-postgres \
            --set vault.address=https://vault.test \
            --set keycloak.issuer=https://keycloak.test/realms/meho \
            --set config.keycloakIssuerUrl=https://keycloak.test/realms/meho \
            --set config.keycloakAudience=meho-backplane \
            --set config.vaultAddr=https://vault.test \
            --set networkPolicy.postgresCIDR=10.0.1.0/24 \
            --set networkPolicy.vaultCIDR=10.0.2.0/24 \
            --set networkPolicy.keycloakCIDR=10.0.3.0/24

      - name: Helm template + kubeconform
        # Render then validate. -strict rejects unknown fields;
        # -kubernetes-version 1.28.0 matches the chart's kubeVersion
        # floor (also matches chart.yml). CRDs (ExternalSecret etc.)
        # are not validated upstream so -ignore-missing-schemas keeps
        # the gate from failing on missing CRD schemas while still
        # catching every core API drift.
        run: |
          helm template test deploy/charts/meho/ \
            --set image.tag=test \
            --set ingress.host=meho.test \
            --set ingress.tls.secretName=meho-tls \
            --set postgres.credentialsSecret=meho-postgres \
            --set vault.address=https://vault.test \
            --set keycloak.issuer=https://keycloak.test/realms/meho \
            --set config.keycloakIssuerUrl=https://keycloak.test/realms/meho \
            --set config.keycloakAudience=meho-backplane \
            --set config.vaultAddr=https://vault.test \
            --set networkPolicy.postgresCIDR=10.0.1.0/24 \
            --set networkPolicy.vaultCIDR=10.0.2.0/24 \
            --set networkPolicy.keycloakCIDR=10.0.3.0/24 \
            > /tmp/rendered.yaml

          kubeconform \
            -strict \
            -kubernetes-version 1.28.0 \
            -ignore-missing-schemas \
            -summary \
            /tmp/rendered.yaml
