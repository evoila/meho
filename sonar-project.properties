# SonarCloud project configuration. Project + organization persist across
# the orphan-commit reset (external state keyed by repo identifier).
# Coverage paths are added when language toolchains start producing them.

sonar.projectKey=evoila_meho
sonar.organization=evoila
sonar.host.url=https://sonarcloud.io

# Production source roots vs. test code. Test code is declared via
# `sonar.tests` so it is scored under the lighter test rule profile
# instead of as production source. Without this split, test fixtures
# (fake tokens/passwords, /tmp paths, float-equality asserts) dominate
# the reliability + security ratings with false positives — they are
# the entire reason both ratings sit at E. Python tests live in a clean
# `backend/tests/**` tree (declared below); Go `*_test.go` files are
# co-located with their package and stay under `sonar.sources` (their
# duplication is carved out via `sonar.cpd.exclusions`).
sonar.sources=backend/src,backend/Dockerfile,cli,deploy,scripts
sonar.tests=backend/tests

# Paths excluded from analysis entirely. Generated code and vendored
# trees never warrant code-quality scoring — the file is not authored
# by humans, so smells / duplication / complexity findings can't be
# acted on without being reverted on the next regen.
#
# `**/*.gen.go` covers oapi-codegen output (e.g.
# `cli/internal/api/client.gen.go`, marked with the standard
# `DO NOT EDIT` header). The generator emits one Do/DoWithBody/
# WithResponse trio per endpoint — the bodies are near-identical by
# design.
#
# `cli/api/openapi.json` is the CLI's committed OpenAPI snapshot
# (regenerated by `cli/ make snapshot-openapi`, ~27k lines of generated
# JSON). Counting it as `sonar.sources` inflated ncloc by ~27k and let a
# machine-authored artifact dominate the size metric; it is not
# hand-edited, so any finding on it can't be acted on without a revert on
# the next regen.
sonar.exclusions=.github/**,**/node_modules/**,**/dist/**,**/build/**,**/*.gen.go,cli/api/openapi.json

# Copy-paste-detection (CPD) carve-out for test scaffolds. Test fakes
# are inherently duplicative across suites — each fake stub re-declares
# the same dataclass surface (login knobs, KV-version overrides, payload
# fields) because pytest collects suites in isolation and shared
# fixtures would force every consuming test to add a fixture parameter
# for no behavioural benefit. The src tree (`backend/src/**`) is *not*
# excluded, so the production duplication metric still applies; only
# `backend/tests/**` skips CPD. `**/*.gen.go` is also listed here as
# belt-and-braces against any analyzer that skips `sonar.exclusions`
# for CPD but honours `sonar.cpd.exclusions`. Standard SonarSource
# pattern — see
# https://docs.sonarsource.com/sonarqube/latest/project-administration/analysis-scope/.
#
# `**/*_test.go` is excluded too: Go table-driven command tests re-declare
# near-identical request/response scaffolding per verb (the CLI command
# suites run 44–57% duplicated by design). Production Go duplication still
# scores because the non-test command files are NOT excluded — that real
# signal is tracked separately (the per-vendor dispatch-boilerplate
# refactor).
sonar.cpd.exclusions=backend/tests/**,**/*_test.go,**/*.gen.go

# ---------------------------------------------------------------------------
# Coverage
# ---------------------------------------------------------------------------
# Python coverage is produced by CI's `Pytest (unit + coverage)` step
# (`--cov=meho_backplane --cov-report=xml` -> backend/coverage.xml),
# uploaded as the `python-coverage` artifact, and downloaded back into
# backend/ by quality-gate.yml before this scan runs. `relative_files`
# (backend/pyproject.toml [tool.coverage.run]) keeps the report paths
# portable across the two jobs.
#
# coverage.py emits an empty <source></source> with filenames relative to
# backend/ (e.g. `src/meho_backplane/...`); SonarCloud resolves from the
# repo root, so quality-gate.yml's "Point coverage report at the backend/
# source root" step injects <source>backend</source> before the scan,
# making paths resolve to backend/src/meho_backplane/... (the #920 merge
# run imported 0% without it). Non-blocking either way (continue-on-error).
sonar.python.version=3.12, 3.13
sonar.python.coverage.reportPaths=backend/coverage.xml
# sonar.javascript.lcov.reportPaths=meho_frontend/coverage/lcov.info

# Go coverage is produced by CI's `Go test (race + coverage)` step
# (`go test -covermode=atomic -coverprofile=coverage.out ./...` -> cli/
# coverage.out), uploaded as the `go-coverage` artifact, and downloaded
# back into cli/ by quality-gate.yml. The Go profile uses module import
# paths (github.com/evoila/meho/cli/...), which SonarCloud's Go sensor
# resolves via cli/go.mod — so unlike the Python report it needs no path
# rewrite. Without this the Clean-as-You-Code new-code-coverage gate read
# Go diffs as 0% (the #937/#938 refactors tripped it).
sonar.go.coverage.reportPaths=cli/coverage.out

# Files excluded from the COVERAGE denominator only (issue analysis on
# them continues — this is not `sonar.exclusions`). `**/*_test.go` are Go
# test files, never covered by the Go coverage profile, so counting them
# as uncovered production lines dragged the `cli` tree's coverage chip
# far below the real production figure. `scripts/**` is operator/dev
# tooling with no coverage instrumentation. Excluding both from coverage
# lets the chip reflect the production Go/Python that is actually
# measured. See
# https://docs.sonarsource.com/sonarqube-cloud/managing-your-projects/project-analysis/setting-analysis-scope/exclude-from-coverage-duplication.
sonar.coverage.exclusions=**/*_test.go,scripts/**

# ---------------------------------------------------------------------------
# Test-scoped issue suppressions (belt-and-braces with sonar.tests above)
# ---------------------------------------------------------------------------
# These rules are pure false positives *in test code* and would otherwise
# keep the security/reliability ratings pinned at E:
#   S2068 / S6418 — "hard-coded secret" on fake fixture tokens/passwords
#   S5443         — "publicly writable directory" on /tmp paths in tests
#   S1244         — float `==` in test asserts (intentional fixture
#                   comparisons). Scoped to backend/tests/** so production
#                   float-equality bugs are STILL flagged.
#   S1313         — hard-coded IPs in Go `*_test.go` fixtures (loopback /
#                   RFC-5737 documentation addresses in table-driven tests).
#                   Scoped to `**/*_test.go`; production Go S1313 hits are
#                   STILL flagged. This entry drops the MQR security-impact
#                   count from 43 to 12 (31 of the 43 were Go test IPs).
# Every pattern is path-scoped to test code — production is untouched.
# S930 ("wrong arguments") is deliberately NOT suppressed here: the six
# open hits are all PRODUCTION-side stale-stub false positives (verified
# 2026-07-15 — the analyzer resolves a superseded overload signature), not
# test-code noise, so they are dispositioned individually in SonarCloud
# rather than blanket-muted by a resourceKey pattern.
sonar.issue.ignore.multicriteria=t_creds,t_secret,t_tmpdir,t_float,t_ip
sonar.issue.ignore.multicriteria.t_creds.ruleKey=python:S2068
sonar.issue.ignore.multicriteria.t_creds.resourceKey=backend/tests/**
sonar.issue.ignore.multicriteria.t_secret.ruleKey=python:S6418
sonar.issue.ignore.multicriteria.t_secret.resourceKey=backend/tests/**
sonar.issue.ignore.multicriteria.t_tmpdir.ruleKey=python:S5443
sonar.issue.ignore.multicriteria.t_tmpdir.resourceKey=backend/tests/**
sonar.issue.ignore.multicriteria.t_float.ruleKey=python:S1244
sonar.issue.ignore.multicriteria.t_float.resourceKey=backend/tests/**
sonar.issue.ignore.multicriteria.t_ip.ruleKey=go:S1313
sonar.issue.ignore.multicriteria.t_ip.resourceKey=**/*_test.go
