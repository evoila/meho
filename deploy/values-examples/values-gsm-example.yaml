#
# Minimal GSM-backend (Vault-free) chart-values example — Initiative #2227.
#
# This is the GCP-native counterpart to values-rdc-example.yaml: it selects
# the GCP Secret Manager credential backend (config.credentialBackend: gsm)
# so target credentials and the /api/v1/health federation proof resolve
# through Secret Manager instead of Vault. `vault.address` / `config.vaultAddr`
# are deliberately left blank — the root-level conditional in
# values.schema.json requires them ONLY when config.credentialBackend is
# `vault`, so a GSM install passes schema validation without a Vault address.
#
# Prerequisites on the GCP side:
#   * MEHO runs under a GKE Workload Identity service account (no SA JSON
#     keys — config.gsmImpersonateSa optionally impersonates a reader SA).
#   * The federation-proof secret exists:
#       projects/<gsmProject>/secrets/meho-test-federation
#     with a JSON-object value (e.g. {"ok":"true"}). The health deep-check
#     reads `gsm:<gsmProject>/meho-test-federation` to prove the chain.
#   * Per-target credential secrets are stored as JSON objects and referenced
#     from targets via `gsm:<project>/<secret>[#field]` secret_refs.
#
# The SA-direct GSM backend is Phase 1 (#2230); per-operator GCP token
# exchange (Workload Identity Federation) is Phase 2 (#2232), configured
# through the gsm.workloadIdentityFederation.* keys below (chart-wired in
# #2642). This example leaves them empty, i.e. SA-direct.
#
# Background dispatch (#2642). Sensor evaluations, scheduled topology
# refreshes and runbook verify dispatch run on a background tick with no
# calling operator, so they have no JWT to federate. This example is fine
# as-is: with WIF unconfigured, they read Secret Manager under the pod's own
# Workload Identity ADC. If you enable per-operator WIF, background dispatch
# needs an identity of its own — an ambient pod identity (which GKE Workload
# Identity gives you) or the checkRunner service principal below. On an
# on-prem cluster with no ambient GCP identity, the checkRunner block is
# REQUIRED or no credentialed Sensor can evaluate.
#
# Connector probe() / fingerprint() are NOT covered by either lever: they
# dispatch with a non-empty placeholder JWT, so they take the WIF branch and
# the STS exchange rejects it whichever of the two you configure. See
# docs/deploying.md § GSM / Vault-free.
#
# Replace every value marked "# CHANGE ME" before applying.

image:
  # An immutable tag from the image pipeline — never :latest / :main.
  tag: "v0.1.0" # CHANGE ME

ingress:
  enabled: true
  host: meho.gsm.example # CHANGE ME
  tls:
    enabled: true
    secretName: meho-tls # CHANGE ME

postgres:
  host: postgres.gsm.example # CHANGE ME
  credentialsSecret: meho-postgres # CHANGE ME (Secret holding DATABASE_URL at key `url`)

keycloak:
  issuer: https://keycloak.gsm.example/realms/meho # CHANGE ME
  audience: meho-backplane

config:
  keycloakIssuerUrl: https://keycloak.gsm.example/realms/meho # CHANGE ME (must match keycloak.issuer)
  keycloakAudience: meho-backplane
  # --- GSM credential backend (Initiative #2227) ---
  credentialBackend: gsm
  gsmProject: my-gcp-project # CHANGE ME (project hosting MEHO secrets + the probe secret)
  # Optional: impersonate a dedicated reader SA instead of reading directly
  # under the pod's Workload Identity ADC. Leave "" for direct ADC.
  gsmImpersonateSa: "" # e.g. meho-secret-reader@my-gcp-project.iam.gserviceaccount.com
  # --- Operator console (/ui/*) OAuth (#2594, Goal #336) ---
  # Public client_id of the confidential `meho-web` Keycloak client the
  # browser BFF login runs its authorization-code grant against. Leave
  # commented (empty) to keep the browser console disabled — /api/* and the
  # `meho login` CLI are unaffected. Uncomment together with the uiConsole
  # block below to light up the console. See
  # deploy/values-examples/README.md § operator-console (browser BFF).
  # uiKeycloakClientId: meho-web # CHANGE ME (client_id of the meho-web client)

# Operator console (/ui/*) confidential OAuth credentials (#2594). On a
# GSM/no-Vault deploy, provision ONE Kubernetes Secret holding both the
# meho-web client secret and the session encryption key, then point the
# chart at it here. Leave commented to keep the browser console disabled.
# Recipe (Secret creation + session-key generation) is in
# deploy/values-examples/README.md § operator-console (browser BFF).
# uiConsole:
#   enabled: true
#   secretName: meho-ui-oauth # CHANGE ME (Secret with client_secret + session_encryption_key)
#   clientSecretKey: client_secret
#   sessionEncryptionKey: session_encryption_key

gsm:
  enabled: true
  project: my-gcp-project # CHANGE ME (typically identical to config.gsmProject)
  # Per-operator Workload Identity Federation (#2232). A non-empty `audience`
  # switches credential reads onto the operator's identity — GCP's audit log
  # then names the operator instead of MEHO's platform SA. Empty (as here)
  # keeps the SA-direct Phase-1 path.
  workloadIdentityFederation:
    audience: "" # e.g. //iam.googleapis.com/projects/<number>/locations/global/workloadIdentityPools/<pool>/providers/<provider>
    poolId: ""
    providerId: ""
    serviceAccount: ""
    subjectTokenType: "" # "" => urn:ietf:params:oauth:token-type:jwt

# In-process check-runner service principal (#2642). Uncomment when you turn
# on per-operator WIF above AND the pod has no ambient GCP identity: the
# runner mints a client_credentials token for this Keycloak client and
# presents it as the WIF subject token, so scheduled Sensor evaluations can
# resolve credentials. Provision the Secret yourself (the secret is wired via
# secretKeyRef only — never a plaintext chart value).
# checkRunner:
#   enabled: true
#   clientId: meho-check-runner # CHANGE ME (confidential Keycloak client)
#   clientSecret:
#     secretName: meho-check-runner # CHANGE ME (Secret holding the client secret)
#     secretKey: client_secret

networkPolicy:
  enabled: true
  postgresCIDR: 10.0.1.0/24 # CHANGE ME
  # Vault egress is unused on a GSM install, but the CIDR is still required
  # by the schema when networkPolicy.enabled is true. Point it at a harmless
  # unused subnet (no Vault egress rule is exercised without a Vault backend).
  vaultCIDR: 10.0.2.0/24 # CHANGE ME (unused on GSM; kept to satisfy the schema)
  keycloakCIDR: 10.0.3.0/24 # CHANGE ME
