#
# Curated connector-spec catalog (Goal #214 raw-REST ingest on-ramp; Task #743).
#
# This is the machine-readable map of (product, version) -> recommended
# OpenAPI spec source(s) + the registered connector class that covers the
# version label. It turns the implicit, commit-message-and-tribal-knowledge
# ingest workflow into a discoverable artifact: an operator (or the
# `meho connector catalog list` / `ingest --catalog` CLI verbs in #915)
# resolves an entry here instead of hand-typing the triple + spec URLs.
#
# WHERE THIS FILE LIVES. The Task body asked for `docs/connector-specs/
# catalog.yaml`, but the backend image build context is `backend/` (see
# every docker `context: backend` in .github/workflows/*.yml) and the
# wheel only packages `src/meho_backplane`, so a repo-root `docs/` file is
# NOT present at runtime. To keep the catalog loadable at startup and over
# `GET /api/v1/connectors/catalog` in a deployed container, it ships as
# package data colocated with its loader (catalog.py), resolved via
# `importlib.resources` -- the same pattern as alembic.ini/alembic
# (find_alembic_ini in db/migrations.py). docs/cross-repo/connector-catalog.md
# is the operator-facing pointer.
#
# FIELD CONTRACT (validated by catalog.py / ConnectorSpecEntry):
#   product / version / impl_id  -- the connector triple; (product, version)
#       is the `--catalog <product>/<version>` lookup key and is unique.
#   requires_connector_class     -- the registered connector class __name__
#       that covers this version label. A regression test asserts every
#       value here exists in all_connectors_v2() (Task #743 criterion b).
#   upstream                     -- public URL(s) where the vendor hosts the
#       spec; operators/CLI fetch directly (MEHO does not redistribute).
#       null == typed connector (no ingestable spec).
#   spec_info_version            -- the spec.info.version observed when MEHO
#       smoke-tested the spec; PEP 440 when present. null until a connector's
#       spec has actually been ingest-verified through MEHO (these are
#       empirical values, not guesses -- populate on first verified ingest).
#   spec_info_versions_compatible -- optional opt-in compatibility range for
#       label-vs-spec ingest. List of patterns -- glob (`"1.x"`, `"9.0.x"`)
#       or PEP 440 specifier set (`">=1.0,<2.0"`). When set, the validator
#       passes an ingest whose spec `info.version` matches any pattern even
#       if it differs from the catalog `version` label. Used when the
#       catalog `version` is a product-line label divergent from the spec's
#       documentation version (G0.16-T5 #1307 -- gh/3 vs `info.version=1.x.x`).
#   sha256                       -- advisory content hash MEHO smoke-tested
#       against; optional, not enforced. null until smoke-tested.
#   notes                        -- operator context: sharp edges, version
#       quirks, appliance-served vs portal-hosted, curation status.

entries:
  # --- Generic-ingested connectors (Layer 2: ingest the vendor OpenAPI) ---

  - product: vmware
    version: "9.0"
    impl_id: vmware-rest
    requires_connector_class: VmwareRestConnector
    # #1964 T2 (#1976): profile-backed shipped-spec row. The Broadcom
    # Developer Portal pages that host the full vSphere specs serve
    # text/html and the appliance URL is fqdn-templated, so the backend
    # cannot dereference an ``upstream`` -- catalog-driven ingest used to
    # 422 ``catalog_entry_upstream_not_spec`` and force a manual --spec
    # upload (G0.18-T8 #1361, RDC #789 N8). A MEHO-authored minimal spec
    # now ships as package data (spec_resource) so ``meho connector ingest
    # --catalog vmware/9.0`` works without that upload, and a reviewed
    # ExecutionProfile (profile_resource) fills the dispatch auth slot.
    upstream: null
    # Shipped OpenAPI spec + ExecutionProfile, both force-included in the
    # wheel and dry-run-parsed at boot by validate_shipped_artifacts.
    spec_resource: vmware_rest_minimal.yaml
    profile_resource: vmware_rest_minimal.yaml
    catalog_ingest: supported
    spec_info_version: null
    # G0.16-T6 Finding H (#1312). vSphere's full appliance spec ships its
    # ``info.version`` under the explicit-quadruple ``"9.0.0.0"`` form
    # while the catalog ``version`` is the product-line label ``"9.0"``.
    # The PEP-440 prefix-match in ``_classify_version_match`` already
    # treats ``9.0`` <-> ``9.0.0.0`` as "exact" (release tuple ``(9, 0)``
    # is a prefix of ``(9, 0, 0, 0)``); this declaration is
    # belt-and-suspenders for an operator who later re-ingests the full
    # appliance spec under that finer variant. Per api-shape-conventions.md
    # section 9.
    spec_info_versions_compatible:
      - "9.0.x"
    sha256: null
    notes: >-
      Profile-backed shipped-spec row (#1964 T2 #1976). The shipped
      spec_resource (vmware_rest_minimal.yaml) is a MEHO-authored minimal,
      Apache-2.0 OpenAPI 3.0 description of the vCenter inventory READ ops
      MEHO surfaces -- it is NOT the full vendor surface. The full vSphere
      specs (vcenter.yaml ~961 paths + vi-json.yaml ~2,195 paths) stay the
      provenance pointers below for a full-surface re-ingest off the
      appliance via the explicit-quadruple --spec shape:
      https://developer.broadcom.com/xapis/vsphere-automation-api/latest/
      and
      https://developer.broadcom.com/xapis/virtual-infrastructure-json-api/latest/
      (both served by the appliance at https://<vcenter-fqdn>/, mirrored on
      the HTML Broadcom Developer Portal). VmwareRestConnector handles
      dispatch (typed). See #743 / connector-ingestion.md.

  - product: sddc
    version: "9.0"
    impl_id: sddc-rest
    requires_connector_class: SddcManagerConnector
    # #1964 T2 (#1976): profile-backed shipped-spec row, same on-ramp as
    # vmware/9.0 above. The SDDC Manager API is documented on the HTML
    # Broadcom Developer Portal and served by the appliance at an
    # fqdn-templated URL the backend cannot dereference, so catalog-driven
    # ingest used to 422 ``catalog_entry_upstream_not_spec`` and force a
    # manual --spec upload (G0.18-T8 #1361, RDC #789 N8). A MEHO-authored
    # minimal spec + reviewed ExecutionProfile now ship as package data.
    upstream: null
    # Shipped OpenAPI spec + ExecutionProfile, both force-included in the
    # wheel and dry-run-parsed at boot by validate_shipped_artifacts.
    spec_resource: sddc_manager_minimal.yaml
    profile_resource: sddc_manager_minimal.yaml
    catalog_ingest: supported
    spec_info_version: null
    sha256: null
    notes: >-
      Profile-backed shipped-spec row (#1964 T2 #1976). The shipped
      spec_resource (sddc_manager_minimal.yaml) is a MEHO-authored minimal,
      Apache-2.0 OpenAPI 3.0 description of the nine SDDC Manager inventory
      + lifecycle READ ops MEHO surfaces -- it is NOT the full vendor
      surface. The full SDDC Manager API stays the provenance pointer for a
      full-surface re-ingest off the appliance via the explicit-quadruple
      --spec shape:
      https://developer.broadcom.com/xapis/sddc-manager-api/latest/ (served
      by the appliance at https://<sddc-manager-fqdn>/v1/, documented on the
      HTML Broadcom Developer Portal). SddcManagerConnector handles dispatch
      (typed). Product realigned from `sddc-manager` to the short,
      dispatch-canonical `sddc` token in #1814 (Initiative #1810). See #743.

  - product: harbor
    version: "2.x"
    impl_id: harbor-rest
    requires_connector_class: HarborConnector
    upstream:
      - "https://raw.githubusercontent.com/goharbor/harbor/v2.11.0/api/v2.0/swagger.yaml"
    spec_info_version: null
    sha256: null
    notes: >-
      Generic-ingested. goharbor publishes the API spec at
      api/v2.0/swagger.yaml (info.version observed: 2.0). SHARP EDGE: that
      file is Swagger 2.0, while the G0.7 ingest parser targets OpenAPI
      3.0/3.1 -- convert before ingest. spec_info_version left null pending an
      OpenAPI-3-converted, MEHO-verified ingest. See #743 / harbor-onboarding.md.

  - product: nsx
    version: "9.0"
    impl_id: nsx-rest
    requires_connector_class: NsxConnector
    upstream:
      - "https://<nsx-mgr-fqdn>/api/v1/spec/openapi/nsx_api.yaml"
      - "https://developer.broadcom.com/xapis/nsx-data-center-rest-api/latest/"
    # G0.18-T8 (#1361, RDC #789 N8): the first upstream is fqdn-
    # templated (placeholder ``<nsx-mgr-fqdn>``); the second is the
    # Broadcom Developer Portal text/html landing page. Neither
    # supports catalog-driven ingest server-side. Operators fetch
    # from the appliance and pass via ``--spec``.
    catalog_ingest: spec-only
    # #1530: NSX-T 4.x was renumbered onto the VCF train at VCF 9.0;
    # a live VCF-9 appliance reports NSX 9.0.x and serves a spec
    # whose info.version is in the 9.x scheme (e.g. 9.1.0.0). The
    # catalog version label tracks the VCF-9-aligned "9.0" product
    # line; NsxConnector's supported_version_range (">=4.0,<10.0")
    # keeps the standalone NSX-T 4.x line dispatchable through the
    # same class. The 9.x band is declared compatible so an operator
    # who ingests under the appliance's finer 9.x info.version clears
    # the spec/label gate without a catalog hand-edit.
    spec_info_versions_compatible:
      - "9.x.x"
    spec_info_version: null
    sha256: null
    notes: >-
      Generic-ingested. NSX Manager serves the OpenAPI spec at
      /api/v1/spec/openapi/nsx_api.yaml (appliance-served, fqdn-templated);
      the Broadcom Developer Portal mirrors the reference. NSX-T 4.x was
      renumbered onto the VCF train at VCF 9.0 (#1530) -- a VCF-9 appliance
      reports NSX 9.0.x and the spec's info.version is in the 9.x scheme;
      NsxConnector covers both 4.x and 9.x via supported_version_range
      ">=4.0,<10.0". spec_info_version pending first verified ingest.
      See #743 / #1530.

  - product: gh
    version: "3"
    impl_id: gh-rest
    requires_connector_class: GitHubRestConnector
    upstream:
      - "https://raw.githubusercontent.com/github/rest-api-description/main/descriptions/api.github.com/api.github.com.json"
    spec_info_version: "1.1.4"
    # G0.16-T5 (#1307): catalog version "3" is the product-line label;
    # the spec's info.version tracks the OpenAPI description's own
    # documentation versioning (currently 1.1.4, growing). Without this
    # opt-in the validator's spec_label_mismatch fires on every upstream
    # 1.x bump until an operator hand-edits the catalog. The compat
    # range accepts the full 1.x band -- once GitHub publishes a 2.x
    # description an operator decides whether to extend this range,
    # cut a new catalog row, or take action specific to the bump.
    spec_info_versions_compatible:
      - "1.x.x"
    sha256: null
    notes: >-
      Generic-ingested. GitHub REST API (Apache-2.0, machine-generated
      from production at https://github.com/github/rest-api-description).
      The upstream is OpenAPI 3.0.3 -- direct-resolvable
      raw.githubusercontent.com JSON (not HTML-portal-templated like
      vmware/9.0), so it works with the G0.14-T9 #1182 {catalog_entry}
      server-resolve flow without preprocessing. spec_info_version
      1.1.4 observed 2026-05-27 against the main branch tip; ~784 paths
      grouped into ~49 tags (repos, pulls, issues, actions, projects,
      releases, ...). VERSION-FIELD CONVENTION (G3.11-T8 #1242): the
      version field stores the digit-prefix form "3" (Resolution A as
      of 2026-05-27), matching the registry triple
      ("gh", "3", "gh-rest"). The dispatcher's parse_connector_id pins
      version to ^[0-9][A-Za-z0-9._]*$ (rejects "v3"), so the catalog
      and registry must agree on the digit form for the (product,
      version, impl_id) tuple lookup to resolve cleanly. The upstream
      label "v3" -- which is what github.com itself calls the API in
      its own docs -- is preserved in FingerprintResult.version and in
      docs/cross-repo/github-connector.md (G3.11-T6) for operator
      recognition. Auth shape: GitHub App installation tokens
      (preferred, machine-identity, audit-attributable) or fine-grained
      PAT fallback -- see docs/cross-repo/github-app-credential.md
      (G3.11-T2) and docs/cross-repo/github-connector.md (G3.11-T6).
      VERSION-BUMP PROCEDURE: upstream pins the rest-api-description
      repo's main branch (not a release tag) because the public release
      cadence lags by years (v2.1.0 was published 2022-10; the spec is
      regenerated daily on main from production). Refresh
      spec_info_version + ingest output on operator-cadenced re-ingest
      (typically quarterly, or when a CI canary detects info.version
      drift). The spec is large (~10 MB JSON); ingest takes ~30
      seconds against an operator-class machine.

  # --- Typed connectors (Layer 1: hand-coded; no spec ingestion) ---

  - product: vault
    version: "1.x"
    impl_id: vault
    requires_connector_class: VaultConnector
    upstream: null
    spec_info_version: null
    sha256: null
    notes: >-
      Typed connector (hand-coded; KV-v2 + sys + auth read/list ops). Vault
      publishes an OpenAPI surface, but MEHO ships VaultConnector typed by
      design -- no spec ingestion. See #743.

  - product: k8s
    version: "1.x"
    impl_id: k8s
    requires_connector_class: KubernetesConnector
    upstream: null
    spec_info_version: null
    sha256: null
    notes: >-
      Typed connector (kubernetes_asyncio; 13+ typed read ops; kubeconfig
      from Vault). Per-Kubernetes-minor OpenAPI ingestion is a future Goal
      #214 investigation; no spec ingestion today. See #743.

  - product: bind9
    version: "9.x"
    impl_id: bind9-ssh
    requires_connector_class: Bind9Connector
    upstream: null
    spec_info_version: null
    sha256: null
    notes: >-
      Typed-SSH connector. BIND 9 exposes no REST/OpenAPI surface (named
      driven over SSH with atomic-apply discipline), so spec ingestion is not
      possible. See #743 / bind9-onboarding.md.

  # --- Profile-backed shipped-spec mechanism fixture (#1964 T1 #1975) ---

  - product: _fixture
    version: "1.0"
    impl_id: fixture-rest
    # Profile-backed row: requires_connector_class names the synthesised
    # ProfiledRestConnector subclass T5 (#1971) materialises from the
    # profile. It need not pre-exist in the v2 registry, so
    # validate_catalog_registry_coverage exempts a profile_resource-
    # carrying row from the class-presence + triple-registration checks.
    requires_connector_class: ProfiledRestConnector_fixture_1_0
    # upstream is null AND a shipped spec is present: the spec_resource
    # on-ramp serves products whose upstream the backend can't
    # dereference. _reject_unusable_entry exempts spec_resource rows from
    # the typed-/templated-upstream 422s.
    upstream: null
    # Shipped OpenAPI spec + ExecutionProfile, both force-included in the
    # wheel and dry-run-parsed at boot by validate_shipped_artifacts.
    spec_resource: _fixture_minimal.yaml
    profile_resource: _fixture_minimal.yaml
    spec_info_version: null
    sha256: null
    notes: >-
      MECHANISM FIXTURE, not a shippable connector. Exercises the #1964 T1
      shipped-spec/profile on-ramp end to end: spec_resource +
      profile_resource resolve to package data under
      operations/ingest/specs/ and connectors/profiles/, the
      catalog-driven ingest route loads the spec bytes into
      SpecSource.content (bypassing the null upstream), and the boot-time
      validate_shipped_artifacts dry-run-parses both with the live ingest
      parser. T2 (#1976) authors the real vmware/sddc profile-backed rows;
      this row is the self-test that the mechanism is wired correctly.
