# TruffleHog Secret Scanning
#
# Scans git history for leaked secrets on every push and PR.
# This is a separate workflow from CI so it runs as its own required
# status check -- configure as a required check in GitHub repo settings
# to block merges when secrets are detected.
#
# Uses fetch-depth: 0 to scan full git history. Even with a fresh
# orphan-commit repo, this catches any future commits with secrets.

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0

      - name: TruffleHog Scan
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26  # v3.95.2
        with:
          extra_args: --results=verified,unknown
