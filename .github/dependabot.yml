# Dependabot configuration.
#
# Initial v0.1 scope: GitHub Actions only. Pip / npm / docker
# ecosystems land when their manifests do (pyproject.toml,
# package.json, Dockerfile). Adding them now would silently no-op
# but invites confusion when manifests appear later — the schedule
# would already be running.

version: 2
updates:
  # Pin-bumps for third-party Actions used in .github/workflows/.
  # Runs weekly; PRs land with `chore(deps):` prefix matching the
  # repo's Conventional Commits convention.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # golangci-lint-action v7+ refuses to install golangci-lint v1.x
      # binaries; the in-tree cli/.golangci.yml is still on the v1
      # config schema. Until the schema migration ships as a separate
      # follow-up, major bumps of this action would break CI (and
      # already did once via PR #198). Minor / patch bumps within v6
      # still come through. See the long comment in .github/workflows/
      # ci.yml's golangci-lint step for context.
      - dependency-name: "golangci/golangci-lint-action"
        update-types:
          - "version-update:semver-major"

  # Backend Python deps live at backend/pyproject.toml + backend/uv.lock.
  # Without this block, Dependabot security updates default to `/` and
  # fail with `dependency_file_not_found: { "file-path": "/" }` (Dependabot
  # job 1360360077). The `uv` ecosystem covers the uv.lock format the
  # project uses (Dependabot supports it natively since 2025).
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"

  # When other language manifests land, add per-ecosystem blocks below.
  # Reference (MEHO.X conventions):
  #
  # - package-ecosystem: "pip"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
  #     day: "monday"
  #   labels: ["dependencies", "python"]
  #   commit-message:
  #     prefix: "chore(deps)"
  #
  # - package-ecosystem: "npm"
  #   directory: "/<frontend-path>"
  #   schedule:
  #     interval: "weekly"
  #     day: "monday"
  #   labels: ["dependencies", "frontend"]
  #   commit-message:
  #     prefix: "chore(deps)"
  #
  # - package-ecosystem: "docker"
  #   directory: "/<docker-context>"
  #   schedule:
  #     interval: "weekly"
  #     day: "monday"
  #   labels: ["dependencies", "docker"]
  #   commit-message:
  #     prefix: "chore(deps)"
