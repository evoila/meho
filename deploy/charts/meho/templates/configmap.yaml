apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "meho.fullname" . }}-config
  labels:
    {{- include "meho.labels" . | nindent 4 }}
  # Pre-install / pre-upgrade hook so the ConfigMap exists before the
  # migration Job's Pod is created. The migration Job (weight -10)
  # mounts this ConfigMap via `envFrom`, so without the hook
  # annotation the Pod hits `Error: configmap "<release>-config" not
  # found` and the entire `helm install --atomic` rolls back before
  # the Deployment ever renders (issue #205).
  #
  # Weight -20 (lower than the migration Job's -10) sequences the
  # ConfigMap first within the pre-install phase.
  # `before-hook-creation` means each upgrade replaces the previous
  # ConfigMap cleanly; the Pod's envFrom is read at Pod start so the
  # brief delete-recreate window doesn't affect a running backplane.
  #
  # Lifecycle implication: hook resources are not tracked by the
  # release manifest. `helm get manifest` won't list this ConfigMap,
  # and `helm uninstall` won't garbage-collect it. The trade-off is
  # acceptable for v0.1 (the Deployment in the release manifest
  # references the ConfigMap by name, which exists because the hook
  # ran; uninstall is rare and `kubectl delete cm <release>-config`
  # cleans up). v0.2 may split this into two ConfigMaps (a
  # migration-only hook + a release-tracked one for the Deployment)
  # if leak-on-uninstall becomes load-bearing.
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation
data:
  # Non-secret env vars consumed by the backplane via `envFrom` in the
  # Deployment. Keys follow `backend/src/meho_backplane/settings.py`'s
  # `os.environ.get` mapping exactly — the env-var names are the contract.
  # Secrets (DATABASE_URL, Keycloak client secret, Vault role bindings)
  # live in Kubernetes Secrets and are wired via `valueFrom.secretKeyRef`
  # in the Deployment template.
  KEYCLOAK_ISSUER_URL: {{ .Values.config.keycloakIssuerUrl | quote }}
  KEYCLOAK_AUDIENCE: {{ .Values.config.keycloakAudience | quote }}
  # G0.9.1-T9 (#789, RDC Signal #16). Public OAuth client_id surfaced
  # to `meho login` via `GET /api/v1/auth-config` as `cli_client_id`.
  # Unconditionally emitted so the env-var contract stays stable
  # across deploys; when the operator hasn't wired the value the
  # backplane sends an empty string and the CLI surfaces an
  # actionable public-client error rather than silently misusing
  # `KEYCLOAK_AUDIENCE` (the confidential resource-server id).
  KEYCLOAK_CLI_CLIENT_ID: {{ .Values.config.keycloakCliClientId | quote }}
  KEYCLOAK_JWKS_CACHE_TTL_SECONDS: {{ .Values.config.keycloakJwksCacheTtlSeconds | quote }}
  KEYCLOAK_JWT_LEEWAY_SECONDS: {{ .Values.config.keycloakJwtLeewaySeconds | quote }}
  # Emitted only for a Vault-backend install (Initiative #2227). A
  # GCP-native (`config.credentialBackend: gsm`) deploy leaves
  # `config.vaultAddr` empty and runs no Vault, so the key is omitted
  # entirely — the backplane coerces a missing/blank VAULT_ADDR to None
  # and boots Vault-free.
  {{- if .Values.config.vaultAddr }}
  VAULT_ADDR: {{ .Values.config.vaultAddr | quote }}
  {{- end }}
  VAULT_OIDC_ROLE: {{ .Values.config.vaultOidcRole | quote }}
  VAULT_OIDC_MOUNT_PATH: {{ .Values.config.vaultOidcMountPath | quote }}
  VAULT_TIMEOUT_SECONDS: {{ .Values.config.vaultTimeoutSeconds | quote }}
  # Credential backend surface (Initiative #2227). `CREDENTIAL_BACKEND`
  # names the store a schemeless target `secret_ref` and the
  # `/api/v1/health` federation proof resolve through (`vault` default,
  # `gsm` for a GCP-native install). `GSM_PROJECT` / `GSM_IMPERSONATE_SA`
  # are read by the GSM backend (`connectors/_shared/gsm_creds.py`) and are
  # harmless empty strings on a Vault install. The env-var names are the
  # backplane's contract (`backend/src/meho_backplane/settings.py`).
  CREDENTIAL_BACKEND: {{ .Values.config.credentialBackend | quote }}
  GSM_PROJECT: {{ .Values.config.gsmProject | quote }}
  GSM_IMPERSONATE_SA: {{ .Values.config.gsmImpersonateSa | quote }}
  DATABASE_POOL_SIZE: {{ .Values.config.databasePoolSize | quote }}
  DATABASE_POOL_TIMEOUT: {{ .Values.config.databasePoolTimeout | quote }}
  # G0.4-T2 (#259) — retrieval substrate fastembed model + on-disk cache
  # path. The cache path here is the env-var contract the backplane
  # honours. The chart default `/opt/meho/model-cache` is the image
  # layer the default model is BAKED INTO at build time (evoila/meho#574)
  # — no PVC, no runtime HuggingFace download for the shipped default.
  # Only repoint this (and enable `retrieval.modelCache`) when overriding
  # `retrievalEmbeddingModel` to a non-default model fetched at runtime;
  # if you point it at a writable PVC mountPath, that PVC is what
  # survives restarts (and is subject to the #574 partial-cache caveat
  # documented on `retrieval.modelCache`).
  RETRIEVAL_EMBEDDING_MODEL: {{ .Values.config.retrievalEmbeddingModel | quote }}
  RETRIEVAL_MODEL_CACHE_DIR: {{ .Values.config.retrievalModelCacheDir | quote }}
  # #101 (L8 + L14) — root the server-side kb bulk ingest
  # (`POST /api/v1/kb/ingest`, `meho kb ingest`) is confined to. The
  # ingest directory is resolved (symlinks followed) and rejected
  # unless it lands within this root, so a `tenant_admin` cannot read
  # an arbitrary `.md` elsewhere on the host (path-traversal / LFI).
  # The chart does NOT pre-create or mount this path — mount the
  # operator's kb content (a checked-out consumer repo / CI artefact)
  # under it via `extraVolumes`, or repoint `config.kbIngestRoot` to
  # wherever the content lives.
  KB_INGEST_ROOT: {{ .Values.config.kbIngestRoot | quote }}
  # Issue #730 (Signal #3, RDC dogfood 2026-05-20). Restricts the
  # connecting peers uvicorn trusts as upstream proxies when parsing
  # `X-Forwarded-Proto` / `X-Forwarded-For`. uvicorn reads
  # `FORWARDED_ALLOW_IPS` natively — equivalent to the
  # `--forwarded-allow-ips` CLI flag (omitted from the Dockerfile CMD
  # so the operator-tunable env var stays the single source of truth).
  # See `deploy/charts/meho/values.yaml` (`config.forwardedAllowIps`)
  # for the operator-facing override and
  # `docs/cross-repo/reverse-proxy-contract.md` for the trust
  # contract.
  FORWARDED_ALLOW_IPS: {{ .Values.config.forwardedAllowIps | quote }}
  # v0.20.0 (PR #2191) target-destination SSRF guard. The backplane
  # refuses to register or dial a target that resolves to a non-public
  # address; this env var is the operator's scoped opt-out. Read per
  # request from the environment by
  # `backend/src/meho_backplane/targets/ssrf_guard.py`
  # (`TARGET_SSRF_ALLOWLIST_ENV`) — NOT via settings.py. Rendered
  # unconditionally: the default `""` is a genuine no-op (the guard
  # stays default-deny). Comma-separated CIDRs / bare IPs / hostname
  # literals. See `deploy/charts/meho/values.yaml`
  # (`config.targetSsrfAllowlist`) and `docs/codebase/target-ssrf-guard.md`.
  MEHO_TARGET_SSRF_ALLOWLIST: {{ .Values.config.targetSsrfAllowlist | quote }}
  # Initiative #2405 net.* diagnostics probe allowlist — the INVERTED
  # sibling of the SSRF guard above: allow-only-what-is-listed, so the
  # default `""` denies every probe (the connector is inert until an
  # operator opts a range in). Read per probe from the environment by
  # `backend/src/meho_backplane/connectors/net/allowlist.py`
  # (`PROBE_ALLOWLIST_ENV`) — NOT via settings.py. Rendered
  # unconditionally: the default `""` keeps the connector fail-closed.
  # Comma-separated CIDRs / bare IPs / hostname literals. See
  # `deploy/charts/meho/values.yaml` (`netdiag.probeAllowlist`) and
  # `docs/codebase/connectors-net-diagnostics.md`.
  MEHO_NETDIAG_PROBE_ALLOWLIST: {{ .Values.netdiag.probeAllowlist | quote }}
  # Async ingest-job watchdog budget (#2318, hardens #2275). #2275
  # time-boxes each background OpenAPI-ingest job in `asyncio.timeout(...)`
  # so a wedged pipeline can't sit at `status=running` until a pod restart;
  # this is the operator's override for that wall-clock ceiling (seconds),
  # read once at import by `_load_ingest_job_timeout_seconds`
  # (`backend/src/meho_backplane/operations/ingest/jobs.py`) — NOT via
  # settings.py. Rendered ONLY when set: the empty default omits the key so
  # the backend's unset→default (1800 s) path runs silently. An
  # always-rendered `""` (the SSRF-allowlist pattern above) would instead
  # hit `float("")` and log a spurious `ingest_job_timeout_env_invalid`
  # warning on every boot, so the timeout knob is guarded. A non-finite
  # (`inf`/`nan`), non-positive, or malformed value is rejected at the
  # backend and falls back to 1800 s with a warning. See
  # `deploy/charts/meho/values.yaml` (`config.ingestJobTimeoutSeconds`)
  # and `docs/codebase/spec-ingestion.md`.
  {{- if .Values.config.ingestJobTimeoutSeconds }}
  INGEST_JOB_TIMEOUT_SECONDS: {{ .Values.config.ingestJobTimeoutSeconds | quote }}
  {{- end }}
  # G0.8-T4 (#633) — the /mcp router is mounted unconditionally; an MCP
  # request's Bearer token must carry `aud == MCP_RESOURCE_URI`. The
  # documented default is `${BACKPLANE_URL}/mcp`, but on a deploy that
  # sets neither the resolved audience is empty and every /mcp request
  # 401s with no signal. These keys are only emitted when an effective
  # value resolves — explicit `config.backplaneUrl` / `config.mcpResourceUri`,
  # or derived from the Ingress host for the common ingress-fronted
  # deploy (see `meho.backplaneUrl` / `meho.mcpResourceUri` helpers).
  # #2394 — when nothing resolves we `fail` at render time (mirroring the
  # eso/agent guards in externalsecrets.yaml + _helpers.tpl) instead of
  # emitting an empty audience and letting the pod crash-loop at startup on
  # `audience_not_configured` (`_assert_mcp_resource_uri_configured` in
  # main.py). The guard fires only on the ingress-less, nothing-set path —
  # the ingress-derived default and explicit-value installs both resolve a
  # non-empty URI and render unchanged. There is deliberately no
  # `allowNoMcpResourceUri` escape hatch: an operator who wants a
  # bring-up before ingress/DNS exists sets a placeholder
  # `config.backplaneUrl` (the documented workaround), which keeps /mcp
  # per-request fail-closed without a new chart tunable.
  {{- $backplaneUrl := include "meho.backplaneUrl" . }}
  {{- $mcpResourceUri := include "meho.mcpResourceUri" . }}
  {{- if not $mcpResourceUri }}
  {{- fail "MCP resource URI is unresolvable: the /mcp audience is empty, so every /mcp request would fail closed and the backplane refuses to boot (audience_not_configured). Resolve it one of three ways: set config.backplaneUrl=<https://your-host> (audience derived as <url>/mcp), set config.mcpResourceUri=<https://your-host/mcp> explicitly, or enable ingress with ingress.host set (audience derived from the ingress host). For a deliberate MCP-less bring-up before ingress/DNS exists, set a placeholder config.backplaneUrl — /mcp stays per-request fail-closed regardless." }}
  {{- end }}
  {{- if $backplaneUrl }}
  BACKPLANE_URL: {{ $backplaneUrl | quote }}
  {{- end }}
  {{- if $mcpResourceUri }}
  MCP_RESOURCE_URI: {{ $mcpResourceUri | quote }}
  {{- end }}
  # G5.2-T1 (#623) — memory layer knobs. `userDefaultTtlDays` is consumed
  # by G5.2-T2 (#624) on `POST /api/v1/memory`; `expiryTickIntervalSeconds`
  # + `expiryEnabled` gate the in-process memory-expiry sweeper started
  # by the FastAPI lifespan. The env-var names are the backplane's
  # contract (`backend/src/meho_backplane/settings.py`); the chart
  # converts the YAML values to strings via `quote` (booleans included)
  # so the ConfigMap stays string-typed end-to-end.
  MEMORY_USER_DEFAULT_TTL_DAYS: {{ .Values.memory.userDefaultTtlDays | quote }}
  MEMORY_EXPIRY_TICK_INTERVAL_SECONDS: {{ .Values.memory.expiryTickIntervalSeconds | quote }}
  MEMORY_EXPIRY_ENABLED: {{ .Values.memory.expiryEnabled | quote }}
  # G9.3-T6 (#858) — topology history retention knobs. The env-var
  # names are the backplane's contract
  # (`backend/src/meho_backplane/settings.py`). `historyRetentionDays: 0`
  # is the keep-forever sentinel; `historyPruneEnabled: false` skips
  # starting the in-process prune loop entirely.
  TOPOLOGY_HISTORY_RETENTION_DAYS: {{ .Values.topology.historyRetentionDays | quote }}
  TOPOLOGY_HISTORY_PRUNE_INTERVAL_SECONDS: {{ .Values.topology.historyPruneIntervalSeconds | quote }}
  TOPOLOGY_HISTORY_PRUNE_ENABLED: {{ .Values.topology.historyPruneEnabled | quote }}
  # Broadcast v2 T2 (#2547) — durable-announcement retention knobs. The
  # env-var names are the backplane's contract
  # (`backend/src/meho_backplane/settings.py`). `retentionDays: 0` is the
  # keep-forever sentinel; `pruneEnabled: false` skips starting the
  # in-process prune loop entirely.
  BROADCAST_ANNOUNCEMENT_RETENTION_DAYS: {{ .Values.broadcastAnnouncement.retentionDays | quote }}
  BROADCAST_ANNOUNCEMENT_PRUNE_INTERVAL_SECONDS: {{ .Values.broadcastAnnouncement.pruneIntervalSeconds | quote }}
  BROADCAST_ANNOUNCEMENT_PRUNE_ENABLED: {{ .Values.broadcastAnnouncement.pruneEnabled | quote }}
