# Semgrep static analysis.
#
# Runs on every push and PR. Uses Semgrep's curated registry packs
# (p/python, p/typescript, p/security-audit, p/owasp-top-ten) rather
# than vendored rules. The registry-packs trade-off — registry-side
# changes can silently move suppression behavior — does not bite yet
# because the codebase has no suppressions to break. When suppressions
# accumulate, vendor a curated rule set under .semgrep/rules/ and
# switch the --config flag.
#
# SARIF is uploaded to GitHub Code Scanning (continue-on-error: true
# on the upload step so a not-yet-enabled Code Scanning UI doesn't
# block the workflow). The Semgrep step itself fails on ERROR-severity
# findings (--error --severity ERROR).
#
# Per evoila-bosnia/MEHO.X#712: pip-audit and npm-audit jobs deferred
# until pyproject.toml / package.json exist (their suppression lists
# are deeply tied to MEHO.X's specific dependency graph; carrying
# them over to an empty repo is signal decay).

name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # required for SARIF upload to Code Scanning

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: meho-runners
    timeout-minutes: 15
    # Pulled through the in-cluster Harbor proxy cache
    # (claude-rdc-hetzner-dc#463; project `dockerhub-proxy` is public,
    # anonymous consumer auth — no `credentials:` block needed).
    # Harbor preserves Docker Hub's namespace, so the `semgrep/semgrep`
    # path appears verbatim under the cache prefix. The cache itself
    # authenticates upstream against Docker Hub via the credential
    # provisioned by claude-rdc-hetzner-dc#472, so cache-miss fetches
    # don't share MEHO's anonymous bucket either.
    #
    # The earlier iteration of this workflow (evoila/meho#447 + #507)
    # used GHA `container.credentials:` with the `evoila` org-level
    # `DOCKERHUB_USERNAME` + `DOCKERHUB_TOKEN` secrets to authenticate
    # directly against Docker Hub. That mechanism cannot coexist with
    # the cache prefix: GHA's runner interprets `credentials:` as
    # "log into the registry hosting this image", which is now
    # `harbor.evba.lab`, not `docker.io` — and Docker Hub creds don't
    # authenticate to Harbor (which is anonymous anyway). The
    # `credentials:` block is therefore removed in the same edit as
    # the prefix swap; the org-level secrets stay provisioned
    # (Harbor's upstream uses them via #472), and `ci.yml`'s pytest
    # job still uses them via `docker/login-action`.
    #
    # If Harbor is ever unreachable (cluster outage, cert rotation,
    # etc.), this job fails fast at "Initialize containers" with a
    # clear connection error — that's the intended loud-failure
    # signal, not a silent fall-back to docker.io.
    #
    # Bump cadence: monthly review or on advisory.
    container:
      image: harbor.evba.lab/dockerhub-proxy/semgrep/semgrep:1.160.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Semgrep
        run: >
          semgrep scan
          --config p/python
          --config p/typescript
          --config p/security-audit
          --config p/owasp-top-ten
          --sarif
          -o semgrep-results.sarif
          --error
          --severity ERROR

      - name: Upload SARIF as job artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        continue-on-error: true  # tolerate org artifact-storage quota; SARIF goes to Code Scanning regardless
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
          retention-days: 14

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v3
        if: always()
        continue-on-error: true  # graceful fallback if Code Scanning not enabled
        with:
          sarif_file: semgrep-results.sarif
