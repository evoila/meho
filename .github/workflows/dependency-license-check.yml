# Dependency license check.
#
# Verifies all Python and npm dependencies are compatible with the
# project's outbound license: **Apache 2.0** (per evoila-bosnia/MEHO.X
# decision #701 / #727). Apache 2.0 is permissive and combines cleanly
# with most permissive and weak-copyleft licenses; the explicit forbid
# list is AGPL (would force the combined work to AGPL), proprietary
# EULAs, SSPL, BUSL, Elastic License v2, CC-BY-NC.
#
# Both jobs guard with hashFiles() so the workflow no-ops on the
# placeholder repo (no pyproject.toml / package.json yet). When
# manifests land, the checks fire automatically.
#
# When the dependency graph reveals license identifiers not in the
# allow-list (e.g. `Apache Software License` vs `Apache-2.0` — pip
# emits various forms), expand the allow-list specifically rather
# than broadening it.

name: Dependency License Check

on:
  push:
    branches: [main]
    paths:
      - '**/pyproject.toml'
      - '**/package.json'
      - '**/package-lock.json'
      - '.github/workflows/dependency-license-check.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/pyproject.toml'
      - '**/package.json'
      - '**/package-lock.json'
      - '.github/workflows/dependency-license-check.yml'
  # Fires when a PR enters the GitHub merge queue. Required so the
  # `Python License Check` and `NPM License Check` status contexts —
  # required checks in branch protection — report against the
  # synthesised merge commit, not just the PR head. Bare `merge_group:`
  # is intentional: the `merge_group` event does not support `paths:`
  # filtering (GitHub docs only allow `types:`), so the license jobs
  # run on every queue admission. The `hashFiles()` guards on each
  # step already make the jobs no-op when manifests are unchanged, so
  # the redundant runs are cheap. Same rationale as ci.yml's
  # merge_group trigger (#769).
  merge_group:
  workflow_dispatch:

concurrency:
  # Mirrors ci.yml's pattern (#769): event-suffixed group key so
  # pull_request / push / merge_group runs don't collide, and
  # cancel-in-progress is scoped OFF for merge_group because a
  # cancelled queue check fails the merge attempt and defeats the
  # queue. Workflow-name-specific group prefix so this workflow's
  # cancellation domain stays distinct from ci.yml's.
  group: dependency-license-check-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'merge_group' }}

permissions:
  contents: read

jobs:
  python-licenses:
    name: Python License Check
    runs-on: meho-runners-ci
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        if: hashFiles('**/pyproject.toml') != ''
        with:
          python-version: "3.13"
      - name: Install pip-licenses
        if: hashFiles('**/pyproject.toml') != ''
        # 5.5.5 reads PEP 639 ``License-Expression`` metadata; 5.0.0 did
        # not, so the allow-only gate progressively failed across every
        # modern transitive dep that has migrated to PEP 639
        # (MarkupSafe / cffi / pycparser / cryptography / pydantic /
        # fastapi / starlette / …). Upgrading collapses the
        # ``--ignore-packages`` set from a chain back to a single entry
        # for the last holdout (py_rust_stemmers — see comment below).
        run: pip install pip-licenses==5.5.5
      - name: Install project deps
        if: hashFiles('**/pyproject.toml') != ''
        # Only Python project today is backend/. Promote to a matrix when more land.
        run: pip install -e ./backend
      - name: Verify license compatibility
        if: hashFiles('**/pyproject.toml') != ''
        # Apache 2.0 outbound: permissive + weak-copyleft inbound is fine.
        # AGPL inbound is forbidden (would flip combined work to AGPL).
        # Multiple identifier forms covered because pip-licenses falls back
        # from PEP 639 License-Expression to Classifier to raw License field.
        #
        # --ignore-packages "py_rust_stemmers fastembed tiktoken": three
        # holdouts even with pip-licenses 5.5.5's PEP 639 support.
        # py_rust_stemmers (fastembed's tokeniser) ships no license
        # metadata at all — the crate is MIT in its repo
        # (github.com/Maxlinn/py-rust-stemmers). fastembed itself
        # reports its license as "Other/Proprietary License" in PyPI
        # metadata even though the upstream source
        # (github.com/qdrant/fastembed) is Apache-2.0 — a packaging
        # bug, not a real licensing issue. Both packages are widely
        # vetted via the rest of the retrieval substrate. MIT and
        # Apache-2.0 are already in the allowlist below; skipping
        # these two line-items is safer than broadening to UNKNOWN /
        # Other/Proprietary. Remove either entry when upstream
        # license metadata is corrected. ``--ignore-packages`` accepts
        # ``nargs=*`` (space-separated), NOT a semicolon-joined string.
        #
        # tiktoken (transitive of ``openai>=2.29.0`` pulled in by the
        # ``[openai]`` extra in G11.5-T3 #1077) is MIT-licensed upstream
        # (github.com/openai/tiktoken) but its PyPI 0.13.0 metadata ships
        # the full MIT license *text* in the ``License`` field instead of
        # a clean SPDX identifier — pip-licenses surfaces that multi-line
        # blob, which fails the allow-only gate that keys on exact license
        # identifiers. Adding the literal license-text blob to
        # ``--allow-only`` would force the allowlist to absorb arbitrary
        # multi-line payloads and weaken every other entry; the
        # minimum-diff fix is the ignore-line, mirroring the
        # py_rust_stemmers / fastembed pattern. Remove when tiktoken
        # publishes an SPDX identifier in its packaging metadata.
        #
        # ``EPL-2.0 OR GPL-2.0-or-later``: asyncssh (G0.2-T4, an existing
        # accepted dependency) reports this PEP 639 dual-license expression
        # under pip-licenses 5.5.5. The EPL-2.0 arm is weak (file-level)
        # copyleft, which this workflow's policy explicitly permits inbound
        # against the Apache-2.0 outbound (see header); we consume asyncssh
        # unmodified as an SSH transport library. Allowing the exact emitted
        # expression keeps the gate specific rather than broadening it.
        #
        # ``Apache-2.0 AND CNRI-Python``: regex (a transitive dep of
        # presidio-analyzer, added in G11.4-T3 #1072) emits this PEP 639
        # dual-license expression under pip-licenses 5.5.5. CNRI-Python
        # is the original CPython license from CNRI — BSD-style permissive,
        # OSI-approved (https://opensource.org/license/cnri-python). Allowing
        # the exact emitted expression keeps the gate specific rather than
        # broadening to either arm alone or to bare ``CNRI-Python``.
        run: >
          pip-licenses --format=plain --ignore-packages py_rust_stemmers fastembed tiktoken --allow-only="
          Apache Software License;
          Apache-2.0;
          Apache 2.0;
          Apache License 2.0;
          MIT License;
          MIT;
          BSD License;
          BSD-2-Clause;
          BSD-3-Clause;
          3-Clause BSD License;
          ISC License (ISCL);
          ISC;
          Python Software Foundation License;
          PSF-2.0;
          0BSD;
          The Unlicense (Unlicense);
          Unlicense;
          Mozilla Public License 2.0 (MPL 2.0);
          MPL-2.0;
          CC0-1.0;
          Zlib;
          MIT-CMU;
          HPND;
          Apache-2.0 OR BSD-2-Clause;
          Apache-2.0 OR BSD-3-Clause;
          Apache-2.0 AND BSD-2-Clause;
          Apache-2.0 AND CNRI-Python;
          Apache-2.0 AND MIT;
          BSD-3-Clause AND 0BSD AND MIT AND Zlib AND CC0-1.0;
          MIT AND PSF-2.0;
          MIT OR Apache-2.0;
          MPL-2.0 AND MIT;
          EPL-2.0 OR GPL-2.0-or-later;
          "

  npm-licenses:
    name: NPM License Check
    runs-on: meho-runners-ci
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        if: hashFiles('**/package-lock.json') != ''
        with:
          node-version: "20"
      - name: Install license-checker
        if: hashFiles('**/package-lock.json') != ''
        run: npm install -g license-checker@25.0.1
      - name: Verify license compatibility
        if: hashFiles('**/package-lock.json') != ''
        run: >
          license-checker --onlyAllow "Apache-2.0;MIT;BSD-2-Clause;BSD-3-Clause;ISC;CC0-1.0;0BSD;Unlicense;MPL-2.0"
          --excludePrivatePackages
