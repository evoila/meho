[tool.mypy]
python_version = "3.13"
plugins = ["pydantic.mypy", "sqlalchemy.ext.mypy.plugin"]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
strict_equality = true
# Exclude auto-generated Alembic migrations
exclude = [
    "^.*/alembic/versions/.*\\.py$",
    "^.*/alembic/env\\.py$"
]

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true

[[tool.mypy.overrides]]
module = [
    "qdrant_client.*",
    "pydantic_ai.*",
    "yaml.*",
    "zeep.*",
    "aiohttp.*",
    "kubernetes_asyncio.*",
    "slack_bolt.*",
    "slack_sdk.*",
    "docker.*",
    "proxmoxer.*",
    "slowapi.*",
    "croniter.*",
    "rank_bm25.*",
    "nltk.*",
    "jose.*",
    "apscheduler.*",
    "crawl4ai.*",
    "tabulate.*",
    "google.cloud.*",
    "aiodns.*",
    "pyvmomi.*",
    "pyVmomi.*",
    "pyVim.*",
    "rapidocr_onnxruntime.*",
    "pymupdf4llm.*",
    "pdfplumber.*",
    "markdown.*",
    "requests.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
asyncio_mode = "auto"
markers = [
    "unit: Unit tests (mocks only, no external services)",
    "integration: Integration tests (requires PostgreSQL with pgvector)",
    "e2e: End-to-end tests (requires full stack)",
    "smoke: Smoke tests (basic import and config checks)",
    "contract: API contract tests (schema validation, no external deps)",
    "performance: Performance benchmarks",
    "slow: Tests that take > 5 seconds",
    "serial: Tests that must not run in parallel",
    "real_llm: Tests that make real LLM API calls (requires API key)",
    "failure: Failure scenario tests",
]
addopts = "--strict-markers --timeout=30 -q"
timeout = 30

[tool.vulture]
min_confidence = 80
paths = ["meho_app"]
exclude = [
    "meho_app/alembic/",
    ".venv/",
    "test_venv/",
]
sort_by_size = true

[dependency-groups]
dev = [
    "ruff>=0.15.0",
    "mypy>=1.19.1",
    "types-redis>=4.6.0",
    "pre-commit>=3.5.0",
    "ipython>=8.18.0",
    "debugpy>=1.8.18",
]

test = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0,<1.0",
    "pytest-cov>=5.0.0",
    "pytest-timeout>=2.1.0",
    "pytest-watch>=4.2.0",
    "pytest-mock>=3.11.0",
    "faker>=20.0.0",
    "factory-boy>=3.3.0",
    "httpx-sse>=0.4.0",  # For SSE testing in E2E tests
]

