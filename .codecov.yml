# Codecov configuration for MEHO project
# Updated: meho_core/ consolidated into meho_app/ (v2.3 Phase 89)

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: error

    patch:
      default:
        target: 80%
        threshold: 5%

comment:
  layout: "header, diff, flags, components, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "tests/"
  - "meho_mock_systems/"
  - "**/alembic/**"
  - "**/*test*.py"
  - "meho_frontend/src/test/"
  - "meho_frontend/coverage/"
  - "**/__pycache__/"
  - "**/*.pyc"

flags:
  backend-unit:
    paths:
      - meho_app/

  frontend:
    paths:
      - meho_frontend/src/
