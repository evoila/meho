# Helm chart package + OCI publish + cosign-sign pipeline.
#
# Locked artefact location (Goal #11 — chart contract section 2):
#   oci://ghcr.io/evoila/meho-chart          (public OCI Helm chart)
#
# Tag scheme:
#   pull_request -> main : lint + template + kubeconform; NO push (validation gate).
#   push to main         : push :0.1.<YYYYMMDD>-<short-sha>   (calver, immutable).
#   push tag v*          : push :<x.y.z>                       (semver, immutable).
#
# The artefact name `meho-chart` (not `meho`) is derived from the chart's
# `name` field in deploy/charts/meho/Chart.yaml. The umbrella sets
# `nameOverride: meho` in values.yaml so rendered resources retain
# `app.kubernetes.io/name: meho` — the rename is purely a publish-coordinate
# concern. The image package at ghcr.io/evoila/meho (Task #33) and the chart
# package at ghcr.io/evoila/meho-chart are intentionally distinct GHCR
# packages so visibility, retention, and signing identities can be managed
# independently.
#
# Cosign keyless signing (ADR 0006, Task #34 precedent):
#   - id-token: write at workflow level lets the runner mint a GitHub Actions
#     OIDC token. cosign exchanges it at Fulcio for a ~10-minute x509 cert,
#     signs the chart's OCI manifest digest, and uploads {signature,
#     certificate} to the public Rekor transparency log.
#   - The signature binds to the digest, so every tag alias of the same
#     digest is covered by one `cosign sign` invocation.
#   - The certificate identity an operator verifies against is the workflow
#     file path + ref pattern:
#       https://github.com/evoila/meho/.github/workflows/chart.yml@<ref>
#     where <ref> is `refs/heads/main` for main pushes or `refs/tags/v*` for
#     tag pushes. Operator copy-paste verification lives in backend/README.md.
#
# Anonymous-pull verification (Goal #11 DoD):
#   A separate `verify` job runs after `publish` on main/tag pushes only.
#   It uses azure/setup-helm in a clean environment and intentionally does
#   NOT call `helm registry login`, so a successful
#   `helm pull oci://ghcr.io/evoila/meho-chart --version <ver>` proves the
#   package is reachable without GHCR credentials. The first time the chart
#   is pushed the GHCR package is created PRIVATE by default; a maintainer
#   must flip visibility to public ONCE via
#     gh api --method PATCH /orgs/evoila/packages/container/meho-chart \
#       -f visibility=public
#   (or the GHCR UI). README.md documents the one-time step. Until the flip,
#   the verify job will fail with `unauthorized` — that is the intended fail-
#   closed signal, not a workflow bug.

name: chart

on:
  pull_request:
    branches: [main]
    paths:
      - 'deploy/charts/meho/**'
      - '.github/workflows/chart.yml'
  push:
    # No `paths:` filter here. Path filtering applies to BOTH branch and tag
    # pushes when set, which would cause a v* tag annotating a non-chart
    # commit on main to skip the chart publish. Releases must always publish;
    # mirrors the same decision documented in image.yml.
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  # `packages: write` (GHCR push) and `id-token: write` (cosign OIDC) are
  # granted per-job on `publish` only. validate and verify-anonymous-pull
  # inherit the workflow-default `contents: read` with no elevation, which
  # satisfies SonarCloud githubactions:S8233/S8264 (least-privilege per job)
  # and CodeRabbit's same finding. See the `publish` job below.

concurrency:
  # On main/tag pushes: keep one in-flight publish per ref so a fast follow-up
  # commit cancels its predecessor. On PRs: scoped by PR ref the same way.
  group: chart-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint + template + kubeconform (PR build gate)
    # Fork-PR guard: never execute chart logic from a fork on the self-hosted
    # runner pool. Mirrors image.yml's stance — `runs-on` is internal infra,
    # so fork PRs are skipped entirely. push events (main, v*) short-circuit
    # the OR.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: meho-runners-ci
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v3.16.4  # pin at execution time; >=3.8 ships OCI helm push

      - name: Install kubeconform
        # kubeconform validates rendered manifests against Kubernetes JSON
        # Schemas (offline; no API server needed). Pinned to v0.6.7 by SHA256
        # to match devops_best_practices.md's no-`curl|sh`-unpinned rule.
        # The shasum line is the upstream-published checksum for the
        # linux-amd64 tarball of v0.6.7.
        #
        # Install target is `$HOME/.local/bin` — a runner-owned directory —
        # rather than `/usr/local/bin`, because the self-hosted `meho-runners-ci`
        # pool runs as a non-root user that cannot write to system paths
        # (writing /usr/local/bin returned `Permission denied` in CI run
        # 25644668781). Appending the directory to `$GITHUB_PATH` is the
        # documented GitHub Actions mechanism for surfacing the binary to
        # *subsequent* steps' PATH; within this step we invoke kubeconform
        # by its full path for the smoke check so the verification doesn't
        # depend on PATH propagation that hasn't happened yet.
        run: |
          set -euo pipefail
          KC_VER=v0.6.7
          KC_SHA=95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            "https://github.com/yannh/kubeconform/releases/download/${KC_VER}/kubeconform-linux-amd64.tar.gz"
          echo "${KC_SHA}  /tmp/kubeconform.tar.gz" | sha256sum -c -
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp/ kubeconform
          mkdir -p "${HOME}/.local/bin"
          install -m 0755 /tmp/kubeconform "${HOME}/.local/bin/kubeconform"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          # Smoke test the freshly installed binary. PATH for *this* step
          # was frozen before $GITHUB_PATH was appended above, so call by
          # the absolute path; subsequent steps pick it up via PATH.
          "${HOME}/.local/bin/kubeconform" -v

      - name: Verify kubeconform on PATH for subsequent steps
        # Independent of the install step's own shell. By the time this
        # step starts, the runner has merged `$GITHUB_PATH` into PATH, so
        # `kubeconform` must resolve via plain command lookup. Failure here
        # means the install step "succeeded" but downstream steps would
        # still hit `kubeconform: command not found` — the exact regression
        # B1 is meant to prevent. This is the authoritative end-to-end
        # check that the self-hosted runner fix works.
        run: |
          set -euo pipefail
          which kubeconform
          kubeconform -v

      - name: Helm lint
        # The chart ships safe-by-default empty fields that values.schema.json
        # rejects at lint time on purpose; we pass the same overrides
        # docs/codebase/devops.md uses in its Verification block so the lint
        # exercises the typed-schema contract end-to-end.
        run: |
          helm lint deploy/charts/meho/ \
            --set image.tag=test \
            --set ingress.host=meho.test \
            --set ingress.tls.secretName=meho-tls \
            --set postgres.credentialsSecret=meho-postgres \
            --set vault.address=https://vault.test \
            --set keycloak.issuer=https://keycloak.test/realms/meho \
            --set config.keycloakIssuerUrl=https://keycloak.test/realms/meho \
            --set config.keycloakAudience=meho-backplane \
            --set config.vaultAddr=https://vault.test \
            --set networkPolicy.postgresCIDR=10.0.1.0/24 \
            --set networkPolicy.vaultCIDR=10.0.2.0/24 \
            --set networkPolicy.keycloakCIDR=10.0.3.0/24

      - name: Helm template + kubeconform
        # Render the chart with the same override set, then validate every
        # manifest against upstream Kubernetes JSON Schemas. The schemas
        # source is the community-maintained
        # https://github.com/yannh/kubernetes-json-schema mirror — same
        # source kubeconform defaults to. `--strict` rejects unknown fields;
        # `--kubernetes-version 1.28.0` matches Chart.yaml's kubeVersion
        # floor. CRDs (ExternalSecret) are not validated upstream so we add
        # `--schema-location` pointing at the ESO repo's published schema
        # mirror, falling back to `ignore_missing_schemas` for any CRD
        # without a hosted schema.
        run: |
          helm template test deploy/charts/meho/ \
            --set image.tag=test \
            --set ingress.host=meho.test \
            --set ingress.tls.secretName=meho-tls \
            --set postgres.credentialsSecret=meho-postgres \
            --set vault.address=https://vault.test \
            --set keycloak.issuer=https://keycloak.test/realms/meho \
            --set config.keycloakIssuerUrl=https://keycloak.test/realms/meho \
            --set config.keycloakAudience=meho-backplane \
            --set config.vaultAddr=https://vault.test \
            --set networkPolicy.postgresCIDR=10.0.1.0/24 \
            --set networkPolicy.vaultCIDR=10.0.2.0/24 \
            --set networkPolicy.keycloakCIDR=10.0.3.0/24 \
            > /tmp/rendered.yaml

          kubeconform \
            -strict \
            -kubernetes-version 1.28.0 \
            -ignore-missing-schemas \
            -summary \
            /tmp/rendered.yaml

          # G0.8-T4 (#633): with no config.backplaneUrl / config.mcpResourceUri
          # set, the chart MUST derive MCP_RESOURCE_URI from the Ingress host
          # so the documented `${BACKPLANE_URL}/mcp` default actually
          # materialises for the common ingress-fronted deploy. The override
          # set above pins ingress.host=meho.test + ingress.tls — so the
          # derived value is https://meho.test/mcp. A regression here
          # silently re-darkens the /mcp surface.
          grep -Eq '^[[:space:]]*MCP_RESOURCE_URI:[[:space:]]*"https://meho\.test/mcp"[[:space:]]*$' /tmp/rendered.yaml \
            || { echo "::error::chart did not derive MCP_RESOURCE_URI from ingress.host (G0.8-T4 #633 regression)"; exit 1; }
          grep -Eq '^[[:space:]]*BACKPLANE_URL:[[:space:]]*"https://meho\.test"[[:space:]]*$' /tmp/rendered.yaml \
            || { echo "::error::chart did not derive BACKPLANE_URL from ingress.host (G0.8-T4 #633 regression)"; exit 1; }

      - name: Assert Deployment carries CHART_VERSION env (#631)
        # GET /version reports a real chart_version only if the chart's
        # Deployment injects CHART_VERSION from .Chart.Version. Render the
        # chart and assert the env var is present with the in-tree
        # Chart.yaml `version` value (0.1.0 on a fresh checkout; the
        # publish job rewrites it to the calver at package time, but the
        # template binding — `value: {{ .Chart.Version | quote }}` — is
        # what this gate proves). grep -F on the exact `name:`/`value:`
        # pair fails the job loud if the env binding ever regresses.
        run: |
          set -euo pipefail
          CHART_VER="$(grep -E '^version:' deploy/charts/meho/Chart.yaml \
            | head -1 | awk '{print $2}')"
          echo ">> Chart.yaml version = ${CHART_VER}"
          grep -F -A1 'name: CHART_VERSION' /tmp/rendered.yaml \
            | grep -F "value: \"${CHART_VER}\"" \
            || { echo "::error title=CHART_VERSION env missing::Deployment must inject CHART_VERSION=${CHART_VER} from .Chart.Version (#631)" >&2; exit 1; }
          echo ">> CHART_VERSION env present with value ${CHART_VER}"

  helm-test:
    name: helm install + helm test (pgvector preflight)
    # G0.4-T6 (#263) -- spins up a kind cluster, installs a
    # pgvector-enabled Postgres sidecar, helm-installs the meho chart
    # against it, and runs ``helm test`` against the deployed release.
    # The test Pod (``templates/tests/test-pgvector.yaml``) asserts the
    # ``vector`` extension is enabled and the ``documents`` table is
    # reachable -- the second-line guard against post-deploy drift
    # the migration Job's own ``CREATE EXTENSION`` doesn't catch.
    #
    # G6.1-T8 (#432) -- two image-availability fixes so the job runs
    # to completion on PR builds (image.yml only pushes ``:test`` on
    # main, so on PRs the migration Job would hang on
    # ``ImagePullBackOff`` without these):
    #
    #   1. Build the backplane image locally (single-arch amd64; kind
    #      nodes on GitHub-hosted runners are amd64) and
    #      ``kind load docker-image`` it into the cluster. The chart's
    #      default ``image.pullPolicy: IfNotPresent`` then uses the
    #      locally-loaded image without trying GHCR.
    #   2. Pre-pull + ``kind load`` the Valkey image too. The broadcast
    #      subchart's ``valkey/valkey:9.0-alpine`` ships from Docker
    #      Hub, and kind's anonymous pull is the same path that's
    #      tripped Docker Hub's rate-limit on this repo's other CI
    #      lanes -- pre-loading sidesteps it.
    #
    # ``continue-on-error: true`` is the v0.2 transitional posture:
    # the job runs on every chart-affecting PR + push but does not
    # block merge while operators iterate on kind/k3d wiring nuances
    # (image-pull caches, runner-side Docker permissions, etc.). A
    # follow-up issue lands the hardening pass that removes
    # continue-on-error once we have ~10 green runs (per G6.1-T8 AC).
    #
    # Runs on ``ubuntu-latest`` (NOT ``meho-runners-ci``) because kind
    # needs Docker-in-Docker support that the self-hosted runner
    # pool isn't configured for; the GitHub-hosted runners ship
    # Docker pre-installed and helm/kind-action works out of the box.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v3.16.4

      - name: Create kind cluster
        # helm/kind-action provisions a single-node kind cluster with
        # Docker as the container backend. The default node image
        # (kindest/node:v1.32.x at action HEAD) is fine for our
        # Kubernetes 1.28+ chart target.
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: meho-helm-test

      - name: Set up Docker Buildx
        # Required by docker/build-push-action to use buildkit. Same
        # version digest image.yml pins for the same action so the
        # two lanes converge on a single buildx version.
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Build backplane image locally (load into Docker, not push)
        # ``load: true`` (= ``--output=type=docker``) leaves the image
        # in the local Docker daemon so the next step can ``kind load``
        # it into the cluster. PR builds don't push ``:test`` to GHCR
        # (image.yml line 177 gates push on non-pull_request), so the
        # only way to get a usable ``ghcr.io/evoila/meho:test`` here
        # is to build it in-line. Single-arch amd64 because kind nodes
        # on GitHub-hosted ubuntu-latest runners are amd64-only --
        # multi-arch with ``load: true`` would error out
        # ("docker exporter does not currently support exporting
        # manifest lists").
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: backend
          platforms: linux/amd64
          load: true
          tags: ghcr.io/evoila/meho:test
          # Share the gha-backed cache with the image.yml lane so
          # warm PR builds reuse layers from main-push runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Load images into kind
        # The chart's default ``image.pullPolicy: IfNotPresent`` (per
        # deploy/charts/meho/values.yaml:30) means kind will use the
        # locally-loaded images and skip the upstream pull entirely.
        # Three images get sideloaded:
        #
        #   - ghcr.io/evoila/meho:test         locally built above
        #   - valkey/valkey:9.0-alpine         broadcast subchart pod
        #   - bitnami/postgresql:16            helm-test ``pgvector-check``
        #                                      container (psql client) --
        #                                      see note below
        #
        # Pre-loading the Docker Hub images sidesteps Docker Hub's
        # anonymous-pull rate-limit that's tripped this repo's other
        # CI lanes (Python lane, image build, Semgrep) on busy days.
        #
        # ``bitnami/postgresql:16`` deprecation workaround: Bitnami
        # moved its Docker Hub catalog to the ``bitnamilegacy/``
        # namespace in August 2025; ``docker pull bitnami/postgresql:16``
        # now returns 404. The chart's
        # templates/tests/test-pgvector.yaml still references the
        # original tag. We pull from the new namespace and re-tag
        # to the chart's expected reference before sideloading --
        # keeps the chart untouched (its ``imagePullPolicy: IfNotPresent``
        # resolves the loaded image locally by name). The proper fix
        # belongs in a follow-up that updates the chart's test pod
        # image to ``postgres:16-alpine`` (no Bitnami dependency); T8
        # stays workflow-only.
        run: |
          docker pull valkey/valkey:9.0-alpine
          docker pull bitnamilegacy/postgresql:16
          docker tag bitnamilegacy/postgresql:16 bitnami/postgresql:16
          kind load docker-image \
            ghcr.io/evoila/meho:test \
            valkey/valkey:9.0-alpine \
            bitnami/postgresql:16 \
            --name meho-helm-test

      - name: Deploy pgvector sidecar (Postgres + extension)
        # Install pgvector/pgvector:pg16 as a single-pod Deployment in
        # the cluster, expose it on a Service the chart's
        # ``postgres.host`` points at. Inline manifest keeps the test
        # self-contained -- no Helm subchart wrangling for the
        # sidecar.
        run: |
          kubectl create namespace meho-test
          kubectl -n meho-test apply -f - <<'EOF'
          apiVersion: v1
          kind: Service
          metadata:
            name: pgvector
          spec:
            selector:
              app: pgvector
            ports:
              - port: 5432
                targetPort: 5432
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: pgvector
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: pgvector
            template:
              metadata:
                labels:
                  app: pgvector
              spec:
                containers:
                  - name: pg
                    image: pgvector/pgvector:pg16
                    env:
                      - name: POSTGRES_PASSWORD
                        value: test-pw-not-secret
                      - name: POSTGRES_USER
                        value: meho
                      - name: POSTGRES_DB
                        value: meho
                    ports:
                      - containerPort: 5432
                    readinessProbe:
                      exec:
                        command: ["pg_isready", "-U", "meho"]
                      initialDelaySeconds: 5
                      periodSeconds: 5
          EOF
          kubectl -n meho-test rollout status deploy/pgvector --timeout=120s

      - name: Create chart-side Secret (postgres credentials)
        # The chart references ``postgres.credentialsSecret`` by name
        # and looks for a ``url`` key. The asyncpg DSN points at the
        # in-cluster pgvector service we just created.
        run: |
          kubectl -n meho-test create secret generic meho-postgres \
            --from-literal=url='postgresql+asyncpg://meho:test-pw-not-secret@pgvector:5432/meho'

      - name: Pre-create ServiceAccount referenced by the migration Job hook
        # G6.1-T8 (#432) — chart hook-ordering workaround.
        #
        # The migration Job at templates/migration-job.yaml is a
        # ``pre-install`` Helm hook (hook-weight: -10). Its Pod
        # template references the ``meho-test`` ServiceAccount via
        # ``serviceAccountName: {{ include "meho.serviceAccountName" . }}``.
        #
        # The ServiceAccount itself (templates/serviceaccount.yaml)
        # is NOT a hook — it's a regular release resource. Helm 3
        # applies pre-install hooks BEFORE main release manifests
        # (https://helm.sh/docs/topics/charts_hooks/), so when the
        # migration Job tries to create its Pod the SA doesn't
        # exist yet. Kubernetes' ServiceAccount admission controller
        # rejects the Pod creation silently — the Job stays in a
        # ``status.ready: 0`` state with no active / succeeded /
        # failed counters because the controller can't create a Pod
        # to count. ``helm install --wait-for-jobs`` then times out
        # after 5 minutes and rolls back.
        #
        # The clean fix lives in the chart (add ``helm.sh/hook:
        # pre-install,pre-upgrade`` + ``hook-weight: -20`` to the
        # ServiceAccount template so it precedes the migration Job),
        # but that's a chart-template change affecting production
        # deploys. T8's scope is the workflow only; pre-creating
        # the SA here unblocks helm-test now and the chart-template
        # follow-up lands separately (filed as adjacent for the
        # post-merge backlog).
        run: |
          kubectl -n meho-test create serviceaccount meho-test
          kubectl -n meho-test annotate serviceaccount meho-test \
            kubernetes.io/enforce-mountable-secrets=false
          # Tell Helm this resource is owned by the release so the
          # chart's own ServiceAccount template (which renders with
          # the same name) doesn't trip ``conflicts with existing
          # resource``. The chart applies its SA AFTER hooks, but
          # using the ``meta.helm.sh/release-name`` label lets
          # Helm 3.14+ adopt the existing resource cleanly.
          kubectl -n meho-test label serviceaccount meho-test \
            app.kubernetes.io/managed-by=Helm
          kubectl -n meho-test annotate serviceaccount meho-test \
            meta.helm.sh/release-name=meho-test \
            meta.helm.sh/release-namespace=meho-test

      - name: Helm install meho chart
        # ``--wait-for-jobs`` blocks until every hook Job (the
        # migration Job in our case) completes successfully or fails.
        # We don't ``--wait`` for Pods because the backplane's
        # readiness probe needs real Keycloak + Vault, which we
        # don't mock in this minimal preflight -- only the migration
        # Job + the test Pod matter. The migration Job alone proves
        # the chart + pgvector glue works; ``helm test`` proves the
        # post-deploy assertion fires.
        #
        # G6.1-T8 (#432): broadcast subchart is enabled (default per
        # values.yaml). The Valkey Deployment is part of the helm-
        # installed release and gates the chaos-arm follow-up in
        # G6.1-T9 (#433); a separate ``rollout status`` step below
        # blocks until it's healthy because ``--wait-for-jobs`` only
        # covers hook Jobs, not Deployments / StatefulSets.
        run: |
          helm install meho-test ./deploy/charts/meho \
            --namespace meho-test \
            --wait-for-jobs \
            --timeout 5m \
            --set image.tag=test \
            --set ingress.enabled=false \
            --set networkPolicy.enabled=false \
            --set postgres.credentialsSecret=meho-postgres \
            --set postgres.host=pgvector \
            --set vault.address=https://vault.test \
            --set keycloak.issuer=https://keycloak.test/realms/meho \
            --set config.keycloakIssuerUrl=https://keycloak.test/realms/meho \
            --set config.keycloakAudience=meho-backplane \
            --set config.vaultAddr=https://vault.test \
            --set retrieval.modelCache.enabled=false

      - name: Wait for broadcast (Valkey) Deployment to roll out
        # G6.1-T8 (#432) AC: ``meho-test-broadcast-valkey`` pod is
        # healthy at helm-test time. ``helm install --wait-for-jobs``
        # only blocks on hook Jobs (the migration Job), so the
        # broadcast Deployment may still be coming up when we hand
        # off to ``helm test``. ``kubectl rollout status`` blocks
        # until ``.status.readyReplicas`` matches ``.spec.replicas``
        # (1 in v0.1 per the chart's hard cap), or the timeout fires.
        #
        # The Deployment name follows ``broadcast.fullname``:
        # ``<release>-<chart-name>`` -> ``meho-test-broadcast``.
        run: |
          kubectl -n meho-test rollout status \
            deployment/meho-test-broadcast \
            --timeout=120s

      - name: Run helm test (pgvector preflight Job)
        # G0.4-T6 acceptance: the Helm test Pod must pass.
        #
        # G6.1-T8 (#432) note on ``--logs``: the chart's test pod has
        # ``helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded``,
        # so on success Helm deletes the pod immediately. ``helm test
        # --logs`` then tries to fetch logs from a now-missing pod and
        # exits 1 with "pods ... not found", masking a successful
        # test as a failure. On FAILED test the pod sticks (hook-succeeded
        # only deletes successes), so logs are still reachable via the
        # diagnostic step below. Dropping ``--logs`` lets the success
        # path exit 0 cleanly and the failure path falls back to the
        # diagnostics dump.
        run: |
          helm test meho-test \
            --namespace meho-test \
            --timeout 2m

      - name: Broadcast load + chaos verification (G6.1-T9)
        # G6.1-T9 (#433) acceptance:
        #
        #   AC #1 — Load harness runs against the helm-installed
        #           broadcast subchart: 1500 XADDs are accepted by
        #           the chart-deployed Valkey Service. (The strict
        #           50 RPS / 30 s / p99 < 5 s rate-shape is verified
        #           at the application layer by shape #1, the
        #           ``backend/tests/integration/test_broadcast_load.py``
        #           slow-lane harness — this kind-cluster equivalent
        #           verifies the chart wiring, not the rate-shape.)
        #
        #   AC #2 — Valkey-pod restart resilience: a forced kill
        #           mid-load asserts pipeline RECOVERY (not data
        #           preservation; the chart's broadcast configmap
        #           ships ``save ""`` + ``appendonly no`` per the v0.1
        #           ephemeral-streams contract — see
        #           ``deploy/charts/meho/charts/broadcast/templates/configmap.yaml``
        #           and the Phase-4 pushback resolution on #433).
        #           Three recovery conditions:
        #             (1) Broadcast Deployment returns to Ready
        #                 within 30 s of the kill.
        #             (2) ``XADD`` succeeds against the restarted Pod.
        #             (3) ``XLEN`` returns the post-restart entry.
        #
        # Implementation shape: one Pod runs 1500 XADDs in a tight
        # bash loop (no rate-limit; the rate-shape contract is
        # shape #1's domain). At t=5 s a subprocess kills the
        # broadcast Pod. After the load Pod completes, we wait for
        # the new broadcast Pod to be Ready, then a second Pod
        # exercises XADD + XLEN to prove the pipeline recovered.
        run: |
          set -euo pipefail

          # ─── Phase A — start the load runner (1500 XADDs) ─────────
          # Pod runs inside the cluster so it talks to the
          # ClusterIP service directly (no port-forward needed).
          # The Valkey image is already pre-loaded into kind via
          # the "Load images into kind" step above.
          kubectl -n meho-test apply -f - <<'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: broadcast-load-runner
            labels:
              role: broadcast-load-runner
          spec:
            restartPolicy: Never
            containers:
              - name: load
                image: valkey/valkey:9.0-alpine
                imagePullPolicy: IfNotPresent
                command:
                  - sh
                  - -c
                  - |
                    set -eu
                    # Settle for ~1s so we see post-pod-create XADDs
                    # land BEFORE the chaos kills the broadcast pod.
                    sleep 1
                    fails=0
                    for i in $(seq 1 1500); do
                      if ! redis-cli -h meho-test-broadcast \
                          XADD meho:feed:tenant-a '*' \
                          event "{\"i\":$i}" >/dev/null 2>&1; then
                        fails=$((fails + 1))
                      fi
                    done
                    echo "load-runner: 1500 attempted, $fails failed during chaos window"
                    # We don't fail the Pod on connection errors mid-chaos --
                    # those are expected per the reframed AC #2. The
                    # pipeline-recovery probe below is the real assertion.
                    exit 0
          EOF

          # ─── Phase B — chaos: kill the broadcast pod mid-load ─────
          # Capture the victim pod name BEFORE the kill so the chaos
          # subprocess deletes by name, not by label. A label-selector
          # miss returns non-zero from ``kubectl delete``; we want
          # the chaos arm to fail loudly in that case, not silently
          # no-op into a false-positive PASS on the recovery probe
          # below (review B1 on this PR).
          VICTIM_POD="$(kubectl -n meho-test get pod \
            -l app.kubernetes.io/name=broadcast \
            -o jsonpath='{.items[0].metadata.name}')"
          if [ -z "$VICTIM_POD" ]; then
            echo "FAIL: no broadcast pod found to kill"
            exit 1
          fi
          echo "chaos victim: $VICTIM_POD"

          # Background subprocess fires at t=5s so it lands while
          # the load runner is mid-stream. AC #2 condition 1 — "pod
          # returns to Ready within 30s of the kill" — is enforced
          # INSIDE this subprocess so the 30s timer is anchored at
          # the kill, not at the rollout-status invocation. A
          # post-load rollout-status check would start the timer at
          # the wrong point (the new pod could be Ready 5s after
          # kill and the post-load check 25s later would still pass,
          # but the contract is "30s from kill" specifically).
          (
            sleep 5
            echo "chaos: killing broadcast pod $VICTIM_POD..."
            # --wait=true (the default) blocks until the API server
            # has removed the Pod. That's the synchronization point
            # we anchor the 30s SLA timer at.
            kubectl -n meho-test delete pod "$VICTIM_POD" \
              --grace-period=0 --wait=true
            kubectl -n meho-test rollout status \
              deployment/meho-test-broadcast --timeout=30s
          ) &
          CHAOS_PID=$!

          # ─── Phase C — wait for load runner to complete ───────────
          # ``wait --for=jsonpath`` is the modern kubectl idiom for
          # "Pod has terminated" without flapping on intermediate
          # states. Generous timeout because the load-runner Pod
          # retries XADDs through the entire chaos + recovery window.
          kubectl -n meho-test wait pod/broadcast-load-runner \
            --for=jsonpath='{.status.phase}=Succeeded' \
            --timeout=180s

          # ─── Phase D — reap the chaos subprocess ──────────────────
          # Dropping ``|| true`` is load-bearing: any chaos-arm
          # failure (delete miss, rollout-status timeout exceeding
          # the 30s SLA) now fails the step.
          wait "$CHAOS_PID"
          echo "load-runner logs:"
          kubectl -n meho-test logs pod/broadcast-load-runner

          # ─── Phase E — AC #2 conditions 2 + 3: XADD + XLEN work ───
          # Spin a second Pod that exercises a single round-trip
          # against the restarted broadcast Pod. Stream was purged
          # by the pod restart (no persistence per the chart's v0.1
          # contract), so the only entry XLEN should see is the one
          # this recovery probe XADDs.
          kubectl -n meho-test apply -f - <<'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: broadcast-recovery-probe
          spec:
            restartPolicy: Never
            containers:
              - name: probe
                image: valkey/valkey:9.0-alpine
                imagePullPolicy: IfNotPresent
                command:
                  - sh
                  - -c
                  - |
                    set -eu
                    # AC #2 condition 2: producer can XADD post-restart.
                    redis-cli -h meho-test-broadcast \
                      XADD meho:feed:tenant-a '*' \
                      event "{\"post_restart\":true}" >/dev/null \
                      || { echo "FAIL: post-restart XADD rejected"; exit 1; }

                    # AC #2 condition 3: consumer can XLEN / XREAD
                    # post-restart. With no persistence, XLEN equals
                    # the count of post-restart adds (= 1 here, just
                    # the line above).
                    LEN=$(redis-cli -h meho-test-broadcast \
                            XLEN meho:feed:tenant-a)
                    if [ "$LEN" -lt 1 ]; then
                      echo "FAIL: XLEN returned $LEN, expected >= 1"
                      exit 1
                    fi
                    echo "PASS: pipeline recovered (XADD + XLEN = $LEN post-restart)"
          EOF
          kubectl -n meho-test wait pod/broadcast-recovery-probe \
            --for=jsonpath='{.status.phase}=Succeeded' \
            --timeout=60s
          echo "recovery-probe logs:"
          kubectl -n meho-test logs pod/broadcast-recovery-probe

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "=== Helm release status ==="
          helm status meho-test --namespace meho-test || true
          echo "=== Pods ==="
          kubectl -n meho-test get pods -o wide || true
          echo "=== Namespace events (sorted by lastTimestamp) ==="
          # Events surface admission-rejection / scheduling / pull
          # failures that ``get -o yaml`` on the Job hides. Sorting
          # by lastTimestamp puts the relevant signal at the bottom
          # of the dump.
          kubectl -n meho-test get events --sort-by=.lastTimestamp || true
          echo "=== Jobs ==="
          kubectl -n meho-test get jobs -o yaml || true
          echo "=== Migration Job describe (controller events) ==="
          # ``describe`` includes the Job controller's per-event log
          # (e.g. ``FailedCreate``, ``SuccessfulCreate`` on Pod
          # creation attempts) which ``get -o yaml`` strips.
          kubectl -n meho-test describe job/meho-test-migrate || true
          echo "=== Deployments ==="
          kubectl -n meho-test get deployments -o wide || true
          echo "=== Migration Job logs (current + previous) ==="
          # ``--previous`` catches container logs from a Pod that
          # restarted and was garbage-collected between the failure
          # and this diagnostic step.
          kubectl -n meho-test logs -l job-name=meho-test-migrate || true
          kubectl -n meho-test logs -l job-name=meho-test-migrate --previous || true
          echo "=== pgvector logs ==="
          kubectl -n meho-test logs deploy/pgvector || true
          echo "=== broadcast (Valkey) logs ==="
          kubectl -n meho-test logs deploy/meho-test-broadcast || true
          echo "=== broadcast load-runner Pod (G6.1-T9) ==="
          # The load-runner Pod is the producer in the chaos test;
          # its logs show how many XADDs failed during the chaos
          # window. ``describe`` carries the scheduling + restart
          # trail if it never reached the load loop.
          kubectl -n meho-test describe pod/broadcast-load-runner || true
          kubectl -n meho-test logs pod/broadcast-load-runner || true
          echo "=== broadcast recovery-probe Pod (G6.1-T9) ==="
          # The recovery-probe Pod runs the AC #2 conditions 2+3
          # check; its logs show why the post-restart XADD or XLEN
          # failed (e.g. broadcast Service ClusterIP not yet routing).
          kubectl -n meho-test describe pod/broadcast-recovery-probe || true
          kubectl -n meho-test logs pod/broadcast-recovery-probe || true
          echo "=== kind cluster loaded images ==="
          docker exec meho-helm-test-control-plane crictl images || true
          echo "=== Namespace labels (Pod Security Standards) ==="
          # PSS labels on the namespace gate the strict
          # ``runAsNonRoot/runAsUser=1001/seccomp=RuntimeDefault``
          # securityContext the migration Job inherits.
          kubectl get namespace meho-test -o yaml | grep -A2 labels || true

  publish:
    name: Package + push + sign chart
    # Skip on pull_request entirely — PRs don't push. The same fork-PR guard
    # would never fire here because the trigger above already filters PRs,
    # but the explicit `if` makes intent visible.
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: meho-runners-ci
    timeout-minutes: 15
    permissions:
      # Per-job scope: only `publish` needs to push to GHCR and mint an OIDC
      # token for cosign keyless signing. validate (lint+kubeconform) and
      # verify-anonymous-pull (anonymous helm pull) get neither.
      contents: read
      packages: write       # push to ghcr.io/evoila/meho-chart
      id-token: write       # cosign keyless OIDC (ADR 0006)
    outputs:
      chart_version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # short-sha derivation needs at least the HEAD commit; default
          # fetch-depth: 1 is sufficient because we only ever read HEAD.
          fetch-depth: 1

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v3.16.4

      - name: Ensure envsubst (gettext-base) — cosign-installer dep
        # sigstore/cosign-installer's signature-verification bootstrap shells
        # out to `envsubst`. github-hosted ubuntu-latest ships it preinstalled;
        # the actions-runner-controller scale-set image is minimal and omits
        # gettext-base, which makes the next step exit 127.
        shell: bash
        run: |
          if command -v envsubst >/dev/null 2>&1; then exit 0; fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y --no-install-recommends gettext-base
          else
            apt-get update -q && apt-get install -y --no-install-recommends gettext-base
          fi

      - name: Install cosign
        # Pinned to cosign-installer v4.1.2 (ships cosign v3.0.6 by default).
        # v4.x dropped pre-2.0 cosign support; v3.x of cosign has
        # keyless-by-default semantics — no COSIGN_EXPERIMENTAL=1 needed.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Log in to GHCR (Helm registry)
        # GITHUB_TOKEN is piped via stdin so the secret never lands in
        # `ps`/process listings (devops_best_practices: "No secrets in logs").
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_PASS: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GHCR_PASS}" | helm registry login ghcr.io \
            --username "${GHCR_USER}" --password-stdin

      - name: Log in to GHCR (Docker config — for cosign sign)
        # `helm registry login` above writes to ~/.config/helm/registry/config.json,
        # which `cosign sign` does NOT read. cosign reads ~/.docker/config.json.
        # Without this step the "Sign chart with cosign" step below fails with
        #   UNAUTHORIZED: unauthenticated: User cannot be authenticated with the token provided
        # even though the helm push above succeeds (helm uses its own auth file).
        # Mirrors the working pattern in image.yml; same SHA so a single
        # supply-chain audit covers both pipelines.
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute chart version (calver or tag)
        id: ver
        env:
          REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ "${REF}" == refs/tags/v* ]]; then
            # v* tag push: strip the leading `v` so the chart version is plain
            # semver (Helm rejects a leading-v in Chart.yaml's version field).
            VERSION="${REF#refs/tags/v}"
          else
            # main branch push: calver = 0.1.<YYYYMMDD>-<short-sha>. Sortable,
            # immutable per commit, no ambiguity with semver-tagged releases.
            DATE="$(date -u +%Y%m%d)"
            SHA="$(git rev-parse --short HEAD)"
            VERSION="0.1.${DATE}-${SHA}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Chart version: ${VERSION}"

      - name: Ensure PyYAML — chart-stamp dep on ARC runners
        # The actions-runner-controller scale-set image is minimal: it
        # ships python3 but not pip (so `pip install pyyaml` exits with
        # "No module named pip") and not PyYAML itself. Use the apt
        # package `python3-yaml` — same shape as the envsubst install
        # in image.yml / chart.yml / cli-release.yml.
        shell: bash
        run: |
          python3 -c "import yaml" 2>/dev/null && exit 0
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y --no-install-recommends python3-yaml
          else
            apt-get update -q && apt-get install -y --no-install-recommends python3-yaml
          fi

      - name: Stamp Chart.yaml with version + appVersion
        # `helm package` reads `name`, `version`, and `appVersion` from
        # Chart.yaml. We rewrite version (chart calver) and appVersion (git
        # sha — the deployable image tag) in place; the in-tree Chart.yaml
        # placeholders (`0.1.0` / `"0.1.0"`) exist only so `helm lint` /
        # `helm template` succeed on a fresh checkout.
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Use python3+pyyaml on the self-hosted runner so we don't pull in
          # an extra `yq` dependency for two field edits. yaml.safe_dump
          # strips comments and may reorder keys vs the source file (we pass
          # sort_keys=False to suppress reordering); for our purposes that
          # is fine because the stamped Chart.yaml is workflow-local — it is
          # consumed by `helm package` in the next step and never committed
          # back to the repo. The in-tree Chart.yaml retains its hand-tuned
          # form (comments and all).
          python3 - <<'PY'
          import os
          import yaml

          path = "deploy/charts/meho/Chart.yaml"
          with open(path, "r", encoding="utf-8") as f:
              data = yaml.safe_load(f)
          data["version"] = os.environ["VERSION"]
          data["appVersion"] = os.environ["GIT_SHA"]
          with open(path, "w", encoding="utf-8") as f:
              yaml.safe_dump(data, f, sort_keys=False)
          PY
          echo "--- Chart.yaml after stamp ---"
          cat deploy/charts/meho/Chart.yaml

      - name: Helm package
        id: package
        # The in-tree broadcast subchart at deploy/charts/meho/charts/broadcast/
        # is already unpacked (Chart.yaml dependency block declares
        # `repository: ""` per the documented local-subchart shape). No
        # `helm dependency update` is needed and running it would fail — the
        # subchart is not on a remote registry.
        run: |
          set -euo pipefail
          mkdir -p /tmp/charts
          helm package deploy/charts/meho/ -d /tmp/charts/
          TARBALL="$(ls /tmp/charts/*.tgz)"
          echo "tarball=${TARBALL}" >> "${GITHUB_OUTPUT}"
          echo "Packaged: ${TARBALL}"

      - name: Helm push to OCI
        id: push
        # `helm push <tgz> oci://ghcr.io/evoila` lands the artefact at
        # ghcr.io/evoila/<chart-name>:<chart-version> — Helm derives the
        # basename from Chart.yaml's `name` field (which we keep as
        # `meho-chart` permanently in-tree to give the published artefact a
        # distinct GHCR package from the backplane image at
        # ghcr.io/evoila/meho).
        run: |
          set -euo pipefail
          OUTPUT="$(helm push "${{ steps.package.outputs.tarball }}" oci://ghcr.io/evoila 2>&1)"
          echo "${OUTPUT}"
          # `helm push` prints a `Digest: sha256:...` line on success. Grep
          # is anchored to the line start so a chart name containing the
          # word "Digest" can't confuse the parser. `awk` extracts the
          # digest field directly.
          DIGEST="$(printf '%s\n' "${OUTPUT}" | awk '/^Digest:/ {print $2; exit}')"
          if [[ -z "${DIGEST}" ]]; then
            echo "::error::Could not parse digest from helm push output" >&2
            exit 1
          fi
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"
          echo "Pushed digest: ${DIGEST}"

      - name: Sign chart with cosign (keyless OIDC)
        # Keyless signing flow: cosign requests an OIDC token from GitHub
        # Actions (id-token: write), Fulcio mints a ~10-min x509 cert bound
        # to the workflow identity, cosign signs the chart's OCI manifest
        # digest and uploads {signature, certificate} to Rekor. --yes is
        # the non-interactive confirmation (CI has no TTY).
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/evoila/meho-chart@${DIGEST}"

      - name: Emit verification summary
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "## Chart published"
            echo ""
            echo "- Package: \`oci://ghcr.io/evoila/meho-chart\`"
            echo "- Version: \`${VERSION}\`"
            echo "- Digest: \`${DIGEST}\`"
            echo ""
            echo "### Pull"
            echo ""
            echo '```bash'
            echo "helm pull oci://ghcr.io/evoila/meho-chart --version ${VERSION}"
            echo '```'
            echo ""
            echo "### Verify signature"
            echo ""
            echo '```bash'
            echo "cosign verify ghcr.io/evoila/meho-chart:${VERSION} \\"
            echo "  --certificate-identity-regexp '^https://github\\.com/evoila/meho/\\.github/workflows/chart\\.yml@.*\$' \\"
            echo "  --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' | jq ."
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

  verify-anonymous-pull:
    name: "Verify anonymous pull (Goal #11 DoD)"
    # Runs only on push events (main / v*) — anonymous-pull verification of a
    # PR build makes no sense (PRs don't push). We split this into its own
    # job rather than running inside `publish` so the `helm registry login`
    # state from the push step cannot accidentally satisfy the pull. A fresh
    # job ships a clean filesystem with no GHCR credentials anywhere — a
    # successful `helm pull` here can only mean the GHCR package is public.
    if: github.event_name != 'pull_request'
    needs: publish
    runs-on: meho-runners-ci
    timeout-minutes: 10
    steps:
      - name: Install Helm (no checkout — keeps env scrubbed of repo state)
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
        with:
          version: v3.16.4

      - name: Pull chart anonymously
        # No `helm registry login` step. If the GHCR package is private,
        # this step fails with `unauthorized` and surfaces the missing
        # one-time visibility-flip step (documented in backend/README.md).
        env:
          VERSION: ${{ needs.publish.outputs.chart_version }}
        run: |
          set -euo pipefail
          # Isolate Helm from any persisted runner-local auth/config.
          # The self-hosted `meho-runners-ci` pool does not guarantee a clean
          # HOME between jobs (https://docs.github.com/en/actions/hosting-your-own-runners);
          # Helm 3.8+ falls back to ~/.docker/config.json for OCI creds when
          # HELM_REGISTRY_CONFIG isn't set (helm/helm#7776), so deleting only
          # Helm's own config can false-pass this DoD check if a prior job
          # left a docker login behind. A throwaway HOME forces Helm to see
          # an empty config tree regardless of what persists on the runner.
          HOME="$(mktemp -d)"
          export HOME
          export XDG_CONFIG_HOME="${HOME}/.config"
          export XDG_CACHE_HOME="${HOME}/.cache"
          mkdir -p "${XDG_CONFIG_HOME}" "${XDG_CACHE_HOME}"
          # Visibility: log the sandbox so CI output proves it is truly empty.
          echo "HOME=${HOME}"
          ls -la "${HOME}"
          helm registry list 2>/dev/null || true
          mkdir -p /tmp/anon-pull
          cd /tmp/anon-pull
          helm pull "oci://ghcr.io/evoila/meho-chart" --version "${VERSION}"
          ls -l "meho-chart-${VERSION}.tgz"
          echo "Anonymous pull OK: meho-chart-${VERSION}.tgz"
