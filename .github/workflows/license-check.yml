# Dependency License Compliance Check
#
# Verifies all Python and npm dependencies are compatible with AGPL-3.0-only.
# AGPL is copyleft: all dependencies must be AGPL-compatible (MIT, BSD, Apache-2.0,
# LGPL, ISC, PSF, 0BSD are compatible; GPL-2.0-only without "or later" is NOT).
#
# Blocking mode: WARN mode lifted after the initial audit (python-licenses.csv,
# npm-licenses.csv) and allow-list reconciliation (#648) confirmed the current
# dep tree is AGPL-compatible.
#
# All third-party actions are pinned to commit SHAs per supply chain best practice.

name: License Check

on:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'meho_frontend/package.json'
      - 'meho_frontend/package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'meho_frontend/package.json'
      - 'meho_frontend/package-lock.json'
  workflow_dispatch:

# Prevent redundant checks on rapid pushes
concurrency:
  group: license-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-licenses:
    name: Python License Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version-file: ".python-version"
          enable-cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Install project dependencies
        run: uv sync
        env:
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          REDIS_URL: "redis://localhost:6379"
          CREDENTIAL_ENCRYPTION_KEY: "test-encryption-key-32-chars-minimum-length"
          JWT_SECRET_KEY: "test-jwt-secret-key-32-characters-minimum"
          APP_ENVIRONMENT: "test"
          KEYCLOAK_URL: "http://localhost:8080"
          KEYCLOAK_REALM: "test"
          KEYCLOAK_CLIENT_ID: "test"

      - name: Check Python dependency licenses
        run: |
          echo "=== All dependency licenses ==="
          # pip-licenses pinned <5.0: 5.x changed --format output in ways B4 reverted.
          # `uv run --with ...` overlays pip-licenses onto the project .venv so it
          # can see every installed dependency.
          uv run --with "pip-licenses<5.0" pip-licenses --format=plain --with-urls

          echo ""
          echo "=== Checking for AGPL-incompatible licenses ==="
          # AGPL-3.0-only allow-list. Every string below is one pip-licenses<5.0
          # actually emits against this dep tree on ubuntu-latest. A single
          # license surfaces under multiple strings because pip-licenses falls
          # back from PKG-INFO Classifier to the raw License field (e.g. Apache:
          # "Apache Software License", "Apache-2.0", "Apache 2.0", "Apache2.0",
          # "Apache License 2.0"). python-licenses.csv records the per-package
          # mapping and is regenerated on Linux so the audit matches CI.
          #
          # UNKNOWN is allow-listed because pip-licenses<5.0 cannot read PEP 639
          # License-Expression metadata; ~77 deps with clear OSI-approved
          # licenses surface as UNKNOWN regardless. python-licenses.csv is the
          # manual audit record for those packages. Migrating to pip-licenses
          # 5.x is the proper fix and is tracked as a separate task.
          #
          # --ignore-packages rationale:
          # pymupdf-layout: pulled in transitively via pymupdf4llm. Dual-licensed
          #   Polyform-Noncommercial / Artifex-Commercial — neither side fits an
          #   AGPL-3.0 commercial product cleanly. Ignored pending the dependency
          #   disposition decision (separate follow-up task).
          # tiktoken: MIT-licensed, but PKG-INFO License is the full 1078-char
          #   license text (not an SPDX identifier) and Classifier is UNKNOWN,
          #   so no allow-only string can match. Ignore is the only option.
          # meho: this project's own package; mirrors npm-side --excludePackages.
          uv run --with "pip-licenses<5.0" pip-licenses \
            --allow-only="MIT License;MIT;BSD License;BSD-2-Clause;BSD-3-Clause;3-Clause BSD License;BSD-3-Clause, Apache-2.0, dependency licenses;Apache Software License;Apache-2.0;Apache 2.0;Apache License 2.0;Apache2.0;Apache-2.0 AND MIT;ISC License (ISCL);Python Software Foundation License;LGPLv3+;GNU Library or Lesser General Public License (LGPL);Mozilla Public License 2.0 (MPL 2.0);The Unlicense (Unlicense);UNKNOWN;Dual Licensed - GNU AFFERO GPL 3.0 or Artifex Commercial License;Apache Software License; BSD License;Apache Software License; MIT License;Apache Software License; MIT License; Mozilla Public License 2.0 (MPL 2.0);MIT License; Mozilla Public License 2.0 (MPL 2.0)" \
            --ignore-packages meho pymupdf-layout tiktoken \
            --format=plain

  npm-licenses:
    name: Frontend License Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: meho_frontend/package-lock.json

      - name: Install dependencies
        working-directory: meho_frontend
        run: npm ci

      - name: Check npm dependency licenses
        working-directory: meho_frontend
        run: |
          echo "=== All dependency licenses ==="
          npx license-checker@25.0.1 --summary

          echo ""
          echo "=== Checking for AGPL-incompatible licenses ==="
          # meho_frontend@0.0.0 is the project root; UNLICENSED is expected for private packages.
          # MPL-2.0: axe-core, lightningcss — copyleft but AGPL-compatible.
          # MIT-0: @csstools/* — MIT variant with no attribution requirement.
          # EPL-2.0: elkjs — GPL-compatible per FSF; AGPL-3.0 is a GPL superset.
          # (MIT OR CC0-1.0): type-fest — SPDX dual-license; both sides are permissive.
          npx license-checker@25.0.1 \
            --onlyAllow "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;CC0-1.0;Unlicense;CC-BY-4.0;CC-BY-3.0;Python-2.0;BlueOak-1.0.0;MPL-2.0;MIT-0;EPL-2.0;(MIT OR CC0-1.0)" \
            --excludePackages "meho_frontend@0.0.0"
