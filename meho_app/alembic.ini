# ============================================================================
# Unified Alembic configuration for the MEHO monolith.
#
# This is the only Alembic config in the repository. The previous nine
# per-module trees (meho_app/modules/*/alembic.ini) have been merged here.
# A single linear migration history covers every module.
#
# Run from the repository root:
#   alembic -c meho_app/alembic.ini upgrade head
#
# DATABASE_URL is read from the environment by env.py and overrides the
# placeholder below at runtime, so this file does not need real credentials.
# ============================================================================

[alembic]
script_location = %(here)s/alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
truncate_slug_length = 40
sqlalchemy.url = postgresql+asyncpg://meho:password@localhost:5432/meho

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
