# Security Scanning Pipeline
#
# Runs Semgrep SAST, pip-audit, and npm audit on every push to main and PR.
# Three independent jobs run in parallel. Semgrep uploads SARIF to GitHub
# Code Scanning. pip-audit and npm audit block PRs with HIGH/CRITICAL vulns.
#
# IMPORTANT: Do NOT use container-scanning GitHub Actions with known supply
# chain compromises (March 2026). Use Semgrep for code scanning instead.
#
# All third-party actions are pinned to commit SHAs per supply chain best practice.

name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent redundant scans on rapid pushes to the same branch
concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # Required for SARIF upload to GitHub Code Scanning

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run Semgrep
        run: >
          semgrep scan
          --config p/python
          --config p/typescript
          --config p/security-audit
          --config p/owasp-top-ten
          --sarif
          -o semgrep-results.sarif
          --error
          --severity ERROR
        # --error + --severity ERROR = fail only on ERROR-level findings
        # WARNING-level findings are reported but don't block the PR

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699  # v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif

  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install production dependencies only
        run: |
          python -m pip install --upgrade pip
          pip install -e "."
        env:
          # Dummy values to satisfy config validation during install
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          REDIS_URL: "redis://localhost:6379"
          CREDENTIAL_ENCRYPTION_KEY: "test-encryption-key-32-chars-minimum-length"
          JWT_SECRET_KEY: "test-jwt-secret-key-32-characters-minimum"
          APP_ENVIRONMENT: "test"
          KEYCLOAK_URL: "http://localhost:8080"
          KEYCLOAK_REALM: "test"
          KEYCLOAK_CLIENT_ID: "test"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: pip-audit --desc
        # --desc includes vulnerability descriptions
        # Exit code 1 = vulnerabilities found (blocks PR)
        # If a specific vuln is a known false positive, add: --ignore-vuln PYSEC-XXXX

  npm-audit:
    name: Frontend Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: meho_frontend/package-lock.json

      - name: Install dependencies
        working-directory: meho_frontend
        run: npm ci

      - name: Audit npm dependencies
        working-directory: meho_frontend
        run: npm audit --audit-level=high
        # --audit-level=high = only fail on HIGH and CRITICAL severity
        # MODERATE and LOW are reported but don't block
