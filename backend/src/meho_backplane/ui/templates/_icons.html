  Inline SVG icon macro — the console's only icon mechanism (replaces
  the chassis emoji). Server-rendered markup, no JS, no icon font, no
  sprite fetch: each call emits a complete <svg> inheriting
  currentColor, so per-call Tailwind classes drive size + colour.

  The `data-icon="<name>"` attribute is a deliberate, style-independent
  hook for tests (e.g. test_ui_broadcast_filters asserts
  data-icon="lock" instead of the old U+1F512 entity).

  Artwork: path data copied from Lucide (https://lucide.dev),
  ISC License, Copyright (c) Lucide Contributors — see the
  "Embedded icon artwork" section of ../static/src/vendor/VENDOR.md.

  Usage:
    {% from "_icons.html" import icon %}
    {{ icon("radio-tower") }}
    {{ icon("lock", class="size-3.5 text-warning") }}

  StrictUndefined makes an unknown name fail loudly at render time —
  exactly what we want in dev.
#}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="{{ class }}" data-icon="{{ name }}" aria-hidden="true">{{ _PATHS[name] | safe }}</svg>
{%- endmacro %}
