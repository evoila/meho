# MEHO Docker Release Pipeline
#
# Publishes Docker images to GHCR on tagged releases (v*).
# Builds backend (full + slim variants) and frontend images for linux/amd64 and linux/arm64.
# Creates a GitHub Release with auto-generated notes after all images are pushed.
#
# SPDX-License-Identifier: AGPL-3.0-only
# Copyright (c) 2026 evoila Group

name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write    # GitHub Release creation
  packages: write    # GHCR push

env:
  REGISTRY: ghcr.io

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a release

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Validate tag shape
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Canonical SemVer 2.0 regex from https://semver.org/spec/v2.0.0.html
          # (BNF in the annex), with the leading 'v' added and build metadata
          # via '+' deliberately excluded — Docker image tags cannot contain '+'
          # and docker/metadata-action would silently mangle it.
          SEMVER='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[a-zA-Z-][a-zA-Z0-9-]*)(\.(0|[1-9][0-9]*|[a-zA-Z-][a-zA-Z0-9-]*))*))?$'
          if ! echo "$TAG" | grep -qE "$SEMVER"; then
            echo "::error::Tag '$TAG' does not match SemVer 2.0 'v<MAJOR>.<MINOR>.<PATCH>(-<prerelease>)'. Build metadata via '+' is rejected for image-tag compatibility; leading zeros and empty pre-release identifiers are rejected per SemVer 2.0 §2 and §9."
            exit 1
          fi

      - name: Verify pyproject version match
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG#v}"
          PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.+)"/\1/')
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag version '$TAG_VERSION' does not match pyproject.toml '$PYPROJECT_VERSION'"
            exit 1
          fi

      - name: Verify CHANGELOG entry exists
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG#v}"
          # awk literal prefix-match — TAG_VERSION contains regex metacharacters
          # (dots in versions, optional dots/hyphens in pre-release identifiers)
          # that would behave as wildcards in a grep -E pattern. Keep a Changelog
          # 1.1.0 headings have trailing content (`## [<version>] - <date>`), so
          # we match against the literal prefix anchored at column 1 rather than
          # requiring whole-line equality.
          if ! awk -v prefix="## [$TAG_VERSION]" 'index($0, prefix) == 1 { found=1 } END { exit !found }' CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${TAG_VERSION}]' heading. Graduate [Unreleased] first."
            exit 1
          fi

  build-backend:
    name: Backend (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: [validate-tag]
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        variant: [full, slim]
        include:
          - variant: full
            build_args: "INCLUDE_DOCLING=true"
            suffix: ""
          - variant: slim
            build_args: "INCLUDE_DOCLING=false"
            suffix: "-slim"

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392  # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804  # v5.7.0
        with:
          images: ghcr.io/evoila/meho-backend${{ matrix.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ matrix.variant == 'full' }}

      - name: Build and push
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: docker/Dockerfile.meho
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: [validate-tag]
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392  # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804  # v5.7.0
        with:
          images: ghcr.io/evoila/meho-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: docker/Dockerfile.meho-frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "MEHO $RELEASE_TAG" \
            --generate-notes
