apiVersion: v1
kind: Service
metadata:
  name: {{ include "broadcast.fullname" . }}
  labels:
    {{- include "broadcast.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: redis
      port: {{ .Values.service.port }}
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "broadcast.selectorLabels" . | nindent 4 }}
