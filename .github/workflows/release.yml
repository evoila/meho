# MEHO Docker Release Pipeline
#
# Publishes Docker images to GHCR on tagged releases (v*).
# Builds backend (full + slim variants) and frontend images for linux/amd64 and linux/arm64.
# Pushes the tag and creates a GitHub Release on the PUBLIC repo (evoila/meho)
# after all images are pushed — never on the private workflow repo.
#
# SPDX-License-Identifier: AGPL-3.0-only
# Copyright (c) 2026 evoila Group

name: Release

on:
  push:
    tags: ['v*']

# `contents: read` is sufficient: this workflow does not write to its own
# repository. GHCR push uses `packages: write`. Tag push and Release creation
# go to evoila/meho via secrets.PUBLIC_REPO_PAT — independent of these
# workflow-scoped permissions. The `id-token: write` permission needed for
# cosign keyless OIDC signing is granted per-job on build-backend and
# build-frontend only — least privilege.
permissions:
  contents: read
  packages: write    # GHCR push

env:
  REGISTRY: ghcr.io

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a release

jobs:
  validate-tag:
    name: Validate tag
    runs-on: ubuntu-latest
    # Run only on the canonical CI repo. `release.yml` is mirrored to
    # `evoila/meho` via the public-allowlist `.github/` entry, so the tag
    # `publish-to-public-repo` pushes to public would otherwise re-trigger
    # this whole workflow there with a competing cosign cert identity
    # (`evoila/meho/...`). Every other job chains via `needs:` so guarding
    # validate-tag is sufficient.
    if: github.repository == 'evoila-bosnia/MEHO.X'
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Validate tag shape
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Canonical SemVer 2.0 regex from https://semver.org/spec/v2.0.0.html
          # (BNF in the annex), with the leading 'v' added and build metadata
          # via '+' deliberately excluded — Docker image tags cannot contain '+'
          # and docker/metadata-action would silently mangle it.
          SEMVER='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[a-zA-Z-][a-zA-Z0-9-]*)(\.(0|[1-9][0-9]*|[a-zA-Z-][a-zA-Z0-9-]*))*))?$'
          if ! echo "$TAG" | grep -qE "$SEMVER"; then
            echo "::error::Tag '$TAG' does not match SemVer 2.0 'v<MAJOR>.<MINOR>.<PATCH>(-<prerelease>)'. Build metadata via '+' is rejected for image-tag compatibility; leading zeros and empty pre-release identifiers are rejected per SemVer 2.0 §2 and §9."
            exit 1
          fi

      - name: Verify pyproject version match
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG#v}"
          PYPROJECT_VERSION=$(grep -E '^version = ' pyproject.toml | head -1 | sed -E 's/version = "(.+)"/\1/')
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag version '$TAG_VERSION' does not match pyproject.toml '$PYPROJECT_VERSION'"
            exit 1
          fi

      - name: Verify CHANGELOG entry exists and has content
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG#v}"
          # awk literal prefix-match — TAG_VERSION contains regex metacharacters
          # (dots in versions, optional dots/hyphens in pre-release identifiers)
          # that would behave as wildcards in a grep -E pattern. Keep a Changelog
          # 1.1.0 headings have trailing content (`## [<version>] - <date>`), so
          # we match against the literal prefix anchored at column 1 rather than
          # requiring whole-line equality.
          if ! awk -v prefix="## [$TAG_VERSION]" 'index($0, prefix) == 1 { found=1 } END { exit !found }' CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${TAG_VERSION}]' heading. Graduate [Unreleased] first."
            exit 1
          fi
          # Heading exists; require non-empty content under it. Catches the
          # mistake where a maintainer adds the heading but forgets to move
          # the [Unreleased] body. Shares one extraction implementation with
          # publish-to-public-repo via scripts/extract-changelog-section.sh —
          # any drift would surface as an empty release body, but the shared
          # script removes the drift surface entirely. Failing here saves
          # ~30 min of image builds.
          BODY=$(scripts/extract-changelog-section.sh "$TAG_VERSION")
          if ! printf '%s' "$BODY" | grep -q '[^[:space:]]'; then
            echo "::error::CHANGELOG.md '## [${TAG_VERSION}]' section has no content. Graduate [Unreleased] entries into it first."
            exit 1
          fi

  build-backend:
    name: Backend (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: [validate-tag]
    timeout-minutes: 60

    # `id-token: write` is required for cosign keyless OIDC signing
    # (sigstore/cosign-installer + `cosign sign --yes`). Scoped to this job
    # only — validate-tag and publish-to-public-repo never need it.
    permissions:
      contents: read
      packages: write
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        variant: [full, slim]
        include:
          - variant: full
            build_args: "INCLUDE_DOCLING=true"
            suffix: ""
          - variant: slim
            build_args: "INCLUDE_DOCLING=false"
            suffix: "-slim"

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392  # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804  # v5.7.0
        with:
          images: ghcr.io/evoila/meho-backend${{ matrix.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ matrix.variant == 'full' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: docker/Dockerfile.meho
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign published image
        # Keyless OIDC signing — no private key custody. The GitHub-issued
        # OIDC token (id-token: write) is exchanged for a short-lived Fulcio
        # certificate; the signature is recorded in the Sigstore Rekor public
        # transparency log. Verifiers later assert the cert's identity matches
        # this workflow's URL at the triggering ref. We sign every tag pushed
        # by the build step, scoped to the immutable digest the registry just
        # accepted (so a tag-overwrite attack would not silently revalidate).
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # docker/metadata-action emits one tag per line; build an array so
          # quoting stays shellcheck-clean (SC2086) without losing the
          # one-arg-per-image semantics cosign needs.
          images=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && images+=("${tag}@${DIGEST}")
          done <<< "$TAGS"
          cosign sign --yes "${images[@]}"

  build-frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: [validate-tag]
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write
      id-token: write    # cosign keyless OIDC

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392  # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2  # v3.10.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804  # v5.7.0
        with:
          images: ghcr.io/evoila/meho-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: docker/Dockerfile.meho-frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign published image
        # See build-backend's matching step for the keyless-OIDC rationale.
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          # docker/metadata-action emits one tag per line; build an array so
          # quoting stays shellcheck-clean (SC2086) without losing the
          # one-arg-per-image semantics cosign needs.
          images=()
          while IFS= read -r tag; do
            [ -n "$tag" ] && images+=("${tag}@${DIGEST}")
          done <<< "$TAGS"
          cosign sign --yes "${images[@]}"

  publish-to-public-repo:
    # Pushes the release tag and creates the GitHub Release on evoila/meho
    # (the public OSS surface) — never on the private workflow repo. The tag
    # cannot be pushed by SHA from private to public because public commits
    # are produced by mirror-to-public.yml as new commits with no SHA
    # relationship to private. We instead locate the public commit whose
    # commit message references this tag's private SHA (the mirror writes
    # "mirror: sync from private <short-sha>" as a single-line message) and
    # push the tag at that commit.
    #
    # Timing: image builds in the preceding jobs take ~30 minutes. The mirror
    # workflow normally lands within ~1 minute of CI green on main, so by
    # the time this job runs the matching public commit is almost always
    # already on public/main. The poll loop covers backed-up mirror queues;
    # a missing match after the timeout is fail-closed (better to fail
    # noisily than silently tag the wrong commit).
    name: Publish tag and release to public repo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          # `persist-credentials: false` prevents git's credential helper from
          # latching onto the ambient GITHUB_TOKEN, which would otherwise
          # override the URL-embedded PAT on push and produce a 403. Same
          # reason the mirror workflow sets it — see
          # docs/codebase/public-mirror.md § Authentication.
          persist-credentials: false

      - name: Locate public commit for tagged private SHA
        id: locate
        env:
          PAT: ${{ secrets.PUBLIC_REPO_PAT }}
          TAGGED_SHA: ${{ github.sha }}
        run: |
          # 7-char prefix matches git's default --short form, which is what
          # mirror-to-public.yml writes into the commit message via
          # `git rev-parse --short HEAD` (single-line `git commit -m`, so
          # the marker lives in the subject — `git log --grep` matches the
          # whole message either way). As the repo grows git may extend the
          # abbreviation to keep prefixes unique, but a 7-char prefix is
          # still a substring of the longer form so --grep matches.
          SHORT_SHA="${TAGGED_SHA:0:7}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add public "https://x-access-token:${PAT}@github.com/evoila/meho.git"

          ATTEMPTS=0
          MAX_ATTEMPTS=30  # 30 * 10s = 5 minutes
          PUBLIC_COMMIT=""
          while [ "$ATTEMPTS" -lt "$MAX_ATTEMPTS" ]; do
            # --depth=50 keeps the bandwidth bill bounded as public history
            # grows; the matching mirror commit is virtually always within
            # the most recent few commits since image builds run for ~30 min
            # while the mirror lands within ~1 min of CI green. --no-tags
            # avoids fetching public's tag refs into the local repo, which
            # would conflict with the local tag actions/checkout already
            # populated for this workflow's triggering tag.
            git fetch public main --depth=50 --no-tags --quiet
            PUBLIC_COMMIT=$(git log public/main \
              --grep="mirror: sync from private ${SHORT_SHA}" \
              --format='%H' -n1)
            if [ -n "$PUBLIC_COMMIT" ]; then
              break
            fi
            ATTEMPTS=$((ATTEMPTS + 1))
            echo "Attempt ${ATTEMPTS}/${MAX_ATTEMPTS}: no public commit yet for ${SHORT_SHA}; sleeping 10s"
            sleep 10
          done

          if [ -z "$PUBLIC_COMMIT" ]; then
            echo "::error::No public commit found referencing private ${SHORT_SHA} after ${MAX_ATTEMPTS} attempts. Verify mirror-to-public.yml has run for this commit."
            exit 1
          fi

          echo "Located public commit ${PUBLIC_COMMIT} for private ${SHORT_SHA}"
          echo "public_commit=${PUBLIC_COMMIT}" >> "$GITHUB_OUTPUT"

      - name: Push tag to public repo
        env:
          TAG: ${{ github.ref_name }}
          PUBLIC_COMMIT: ${{ steps.locate.outputs.public_commit }}
        run: |
          # Push the public SHA directly to the remote tag refspec — no
          # local tag mutation. `actions/checkout@v4` already populated
          # `refs/tags/${TAG}` locally pointing at the *private* commit
          # (its default refspec for tag-push triggers is
          # `+refs/tags/${TAG}:refs/tags/${TAG}`), so a plain
          # `git tag ${TAG} ${PUBLIC_COMMIT}` would exit 128 with
          # "tag already exists". Pushing `<sha>:refs/tags/<name>`
          # creates the tag on the remote without touching local refs.
          # No `--force`: if the public tag already exists from a prior
          # partial publish, fail-closed rather than diverge release
          # artifacts from caches that may have already pulled the tag.
          git push public "${PUBLIC_COMMIT}:refs/tags/${TAG}"

      - name: Compose release notes
        # CHANGELOG section + cosign verify block. The PR-summary half
        # (previously fetched via `POST /releases/generate-notes`) is
        # replaced by a curated extraction from CHANGELOG.md so the
        # release body reflects the maintainer's Keep a Changelog 1.1.0
        # entry rather than raw PR titles. The cosign verify block is
        # preserved verbatim — Initiative #504 DoD requires it on every
        # public release.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG#v}"
          # The full cert identity URL is fully known at release time —
          # static workflow path + the literal tag. Use --certificate-identity
          # (exact match), not --certificate-identity-regexp: the latter
          # would require escaping every '.' in TAG (e.g. v1.2.3-rc.1 → the
          # '.' chars are regex wildcards), and we don't actually need
          # regex semantics anywhere here.
          CERT_ID="https://github.com/evoila-bosnia/MEHO.X/.github/workflows/release.yml@refs/tags/${TAG}"

          # Same extraction validate-tag uses; see the helper script for
          # the awk semantics (literal-prefix match, h2 + link-ref
          # terminators).
          CHANGELOG_BODY=$(scripts/extract-changelog-section.sh "$TAG_VERSION")

          # Defence-in-depth: validate-tag already rejects empty sections,
          # but a corrupted checkout or future workflow refactor could let
          # an empty body through. Failing here is cheap.
          if ! printf '%s' "$CHANGELOG_BODY" | grep -q '[^[:space:]]'; then
            echo "::error::Extracted release notes are empty for ${TAG_VERSION}."
            exit 1
          fi

          {
            printf '%s\n\n' "$CHANGELOG_BODY"
            cat <<EOF
          ## Verify image signatures (cosign)

          Every published image is signed with cosign keyless OIDC. The
          signing certificate's identity references the CI workflow that
          built the image — the private CI repo (\`evoila-bosnia/MEHO.X\`)
          — even though the source mirrors to \`evoila/meho\`. The
          signature is publicly verifiable via Sigstore Rekor without any
          private-repo access. Verify before deploying:

          \`\`\`bash
          cosign verify \\
            --certificate-identity "${CERT_ID}" \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            ghcr.io/evoila/meho-backend:${TAG_VERSION}

          cosign verify \\
            --certificate-identity "${CERT_ID}" \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            ghcr.io/evoila/meho-backend-slim:${TAG_VERSION}

          cosign verify \\
            --certificate-identity "${CERT_ID}" \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \\
            ghcr.io/evoila/meho-frontend:${TAG_VERSION}
          \`\`\`

          A successful verify prints \`Verified OK\` plus the matched
          certificate identity and OIDC issuer. A tampered or unsigned image
          fails with a non-zero exit. Install cosign:
          [docs.sigstore.dev/cosign/installation](https://docs.sigstore.dev/cosign/installation/).
          EOF
          } > /tmp/release-notes.md

      - name: Create GitHub Release on public repo
        env:
          # gh authenticates against evoila/meho with the cross-repo PAT;
          # GITHUB_TOKEN cannot write to a different repository.
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_PAT }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo evoila/meho \
            --title "MEHO $TAG" \
            --notes-file /tmp/release-notes.md
