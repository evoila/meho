#
# golangci-lint config for the meho CLI module.
#
# Scope is intentionally narrow at G2.6-T1: the six default linters
# golangci-lint enables out of the box plus the two formatters that
# Go consensus treats as table stakes (gofmt, goimports) and revive
# for stylistic checks that go vet doesn't cover. We stay away from
# the kitchen-sink presets (gochecknoglobals, exhaustruct, wrapcheck,
# err113) because the scaffold genuinely needs package-level vars for
# ldflags injection and unwrapped sentinel errors are idiomatic for
# CLI exit-status handling.
#
# Schema version: v2 (migrated from v1 alongside PR #640 golangci-lint
# v2.x upgrade; golangci-lint-action v7+ refuses v1.x binaries so v1
# config schema is no longer usable on the supported action versions).
# Key v1→v2 diffs applied here:
#   - `version: "2"` required at root
#   - `linters.disable-all: true` → `linters.default: none`
#   - `gosimple` removed (merged into `staticcheck` in v2)
#   - `linters-settings:` → `linters.settings:` (nested under linters)
#   - `goimports.local-prefixes` → list (was a bare string in v1)
#   - `issues.exclude-rules:` → `linters.exclusions.rules:`
#   - `gofmt`, `goimports` → `formatters.enable` (not `linters.enable`)
#   - `goimports` settings → `formatters.settings` (not `linters.settings`)

version: "2"

run:
  timeout: 5m
  # The CLI module is self-contained; the linter doesn't need to
  # see the Python backplane.
  # Bumped 1.22 → 1.25 because charm.land/huh/v2 v2.0.3's transitive
  # deps raise the go.mod minimum to 1.25.8; golangci-lint typecheck
  # must match or "package requires newer Go version" errors fire.
  go: "1.25"

linters:
  # v2 equivalent of the v1 `disable-all: true` — start from an empty
  # set and opt in only the linters we've explicitly vetted.
  default: none
  enable:
    # Default set (golangci-lint runs these unless told otherwise).
    - errcheck
    # gosimple was merged into staticcheck in golangci-lint v2; no
    # separate enable needed — staticcheck below covers it.
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Style/best-practices supplement to go vet.
    - revive

  # v2: linter settings live under linters.settings (not top-level linters-settings).
  settings:
    revive:
      # Default rules are noisy by themselves; pin an explicit ruleset
      # so future revive releases don't surprise CI with new findings.
      # Keep this list pragmatic — every rule here has paid for itself
      # in production Go CLIs (gh, argocd, flux all enable equivalents).
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unused-parameter
        - name: unreachable-code
        - name: redefines-builtin-id

  # v2: exclusion rules live under linters.exclusions.rules (was issues.exclude-rules in v1).
  exclusions:
    # v2 has no `exclude-use-default`; the EXC0001-style defaults v1
    # applied implicitly (errcheck on resp.Body.Close, fmt.Print*, etc.)
    # are now opt-in via presets. Restore them so pre-existing call sites
    # don't turn this scaffold PR into a tree-wide errcheck cleanup.
    presets:
      - std-error-handling
    rules:
      # Test files routinely use blank identifiers, dot imports, and
      # global state in ways production code shouldn't; relax the
      # strictest rules there without disabling them wholesale.
      - path: _test\.go
        linters:
          - errcheck
          - revive

formatters:
  # v2: gofmt and goimports moved from linters.enable to formatters.enable.
  # Fail-closed so CI catches what `gofmt -d` would.
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      # Group local imports separately from third-party — matches the
      # convention the backplane (Python isort) and the cobra codebase
      # both use, and makes diff review easier when imports churn.
      # v2: local-prefixes is a list (bare string in v1).
      local-prefixes:
        - github.com/evoila/meho/cli

issues:
  # Don't hide legitimate findings behind golangci-lint's default
  # max-issues-per-linter / max-same-issues caps — once CI is wired
  # (G2.7) we want every finding visible.
  max-issues-per-linter: 0
  max-same-issues: 0
