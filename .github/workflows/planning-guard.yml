# Planning Guard -- rejects PRs that touch files under .planning/
#
# Runs on every PR targeting main. Fails the job if the PR diff contains
# any changes under .planning/ (in-flight strategic artifacts, session-scoped,
# not meant to land on main even privately).
#
# .claude/ and .cursor/ are intentionally NOT forbidden -- agent and IDE
# config can land on the private repo freely. The public repo is protected
# separately: the .github/workflows/mirror-to-public.yml allowlist
# (.github/workflows/public-allowlist.txt) is whitelist-based, so .claude/
# and .cursor/ are stripped before anything reaches evoila/meho unless
# explicitly added to the allowlist.

name: Planning Guard

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  check-private-path-changes:
    name: Reject private-path changes in PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Reject .planning/ changes in PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          FORBIDDEN=".planning"
          CHANGED=$(gh pr diff --name-only "$PR_NUMBER")
          FOUND=""
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            for dir in $FORBIDDEN; do
              case "$path" in
                "${dir}/"*)
                  case " $FOUND " in *" $dir "*) ;; *) FOUND="$FOUND $dir" ;; esac
                  ;;
              esac
            done
          done <<< "$CHANGED"
          if [ -n "$FOUND" ]; then
            echo "::error::PR touches files under forbidden private directories:$FOUND"
            echo "Files under .planning/ must not appear in PR diffs."
            echo ".claude/ and .cursor/ are allowed on the private repo; the public mirror's allowlist filters them before they reach evoila/meho."
            exit 1
          fi
          echo "No private-path changes detected."
