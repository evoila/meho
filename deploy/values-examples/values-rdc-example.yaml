#
# Example chart values for the RDC Hetzner dogfooding lab.
#
# The *actual* values-rdc.yaml is environment-private and lives in
# `evoila-bosnia/claude-rdc-hetzner-dc/manifests/meho/values-rdc.yaml`
# (per Goal #11 cross-repo deps). This file is a SANITIZED EXAMPLE
# that other operators copy as a template: no real secrets, no real
# CIDRs, and every site-specific field uses a `<REPLACE: ...>`
# placeholder so a forgotten substitution fails values.schema.json
# validation at `helm install` time instead of CrashLoopBackOff'ing
# silently against the wrong system.
#
# See `deploy/values-examples/README.md` for the substitution recipe
# and the External Secrets Operator (ESO) sync patterns the chart
# expects the consumer to provision before install.
#
# Top-level fields not shown in this example (e.g. `broadcast`,
# `migrationJob`, `securityContext`, `affinity`, `tolerations`) are
# satisfied by chart defaults in `deploy/charts/meho/values.yaml` —
# override here only when the site requires non-default sizing,
# retention, Redis/Valkey config, scheduling, or pod-security
# context. The schema marks `broadcast` and `migrationJob` as
# required at the top level; Helm's values-merge supplies the chart
# defaults so the example doesn't need to redeclare them.

replicaCount: 1

image:
  repository: ghcr.io/evoila/meho
  # MUST be set. Pin to an immutable tag: `sha-<40-char-git-sha>` from CI
  # (preferred for production deploys) or `v<x.y.z>` for a tagged release.
  # `:latest` and `:main` are forbidden by Goal #11 deploy discipline.
  # install.sh injects this via `--set image.tag=...` so the example file
  # leaves it as the schema's reject-empty trigger.
  tag: "<REPLACE: sha-<40-char-git-sha> or v0.1.0>"
  pullPolicy: IfNotPresent

# RDC GHCR pulls are anonymous (public package). No pullSecret needed.
imagePullSecrets: []

serviceAccount:
  # The RDC lab pre-provisions a ServiceAccount named `meho-backplane`
  # via consumer-side ticket #266 (claude-rdc-hetzner-dc). When the lab
  # admin owns the SA's name + RBAC, set `create: false` and `name:
  # <existing-sa>` to wire the chart's Deployment to the existing SA.
  #
  # Greenfield labs that want the chart to create its own SA can flip
  # `create: true` and remove `name` — the chart names the SA after the
  # release (`<release>` — `meho` for the default release name).
  create: false
  name: meho-backplane
  # The RDC lab uses ESO + Vault for secret sync, not workload-identity
  # bindings, so the SA carries no IAM/IRSA annotations.
  annotations: {}

# Pod-level security context inherits from chart defaults (runAsNonRoot,
# runAsUser: 1001, seccompProfile: RuntimeDefault). Overriding here is
# rarely needed and would conflict with the chart's Dockerfile USER.

service:
  type: ClusterIP
  port: 8000
  portName: http

ingress:
  enabled: true
  # rke2-infra ships ingress-nginx as the default IngressClass.
  className: nginx
  # RDC lab hostname. cert-manager (Cluster Issuer `letsencrypt-prod`)
  # publishes the certificate; the Secret name below matches the one the
  # Certificate resource projects.
  host: meho.evba.lab
  path: /
  pathType: Prefix
  # cert-manager-on-Ingress annotation: cert-manager watches Ingress
  # objects and provisions the Certificate + Secret on first reconcile.
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    secretName: meho-tls

probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  readiness:
    httpGet:
      path: /ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

# ConfigMap-sourced env vars. These mirror the vault/keycloak block below
# (the backplane reads its config from the ConfigMap, not from Helm values
# directly) so the two must stay in lockstep. The RDC lab realm name is a
# placeholder — substitute before install.
config:
  keycloakIssuerUrl: "https://keycloak.evba.lab/realms/<REPLACE: realm-name>"
  keycloakAudience: meho-backplane
  # G0.9.1-T9 (#789, RDC Signal #16). Public OAuth client_id `meho
  # login` uses for device-code initiation. Must reference a
  # PRE-CREATED public Keycloak client in the realm above (the
  # deployer creates it before `helm install` — auto-provisioning is
  # tracked as T11 / #791). See `deploy/values-examples/README.md`
  # for the realm-side recipe (device-grant flow enabled, audience
  # mapper -> keycloakAudience, no client secret). Leave empty to
  # keep v0.3.1 behaviour: the backplane still serves the endpoint
  # but `meho login` surfaces an actionable public-client error.
  keycloakCliClientId: meho-cli
  keycloakJwksCacheTtlSeconds: "300"
  keycloakJwtLeewaySeconds: "30"
  vaultAddr: https://vault.evba.lab
  vaultOidcRole: meho-mcp
  vaultOidcMountPath: jwt
  vaultTimeoutSeconds: "10.0"
  databasePoolSize: "10"
  databasePoolTimeout: "30.0"
  # Reverse-proxy trust list (Issue #730, RDC Signal #3). uvicorn's
  # default `127.0.0.1` fails-closed in-cluster — the Ingress
  # controller's pod IP is never the loopback. The rke2-infra RDC
  # cluster runs the default pod CIDR; pin to the ingress controller's
  # pod-CIDR slice if you've subnetted it tighter. See
  # `docs/cross-repo/reverse-proxy-contract.md` for the per-cluster
  # recommended values and the diagnostic walk.
  forwardedAllowIps: "10.42.0.0/16"
  # Target-destination SSRF allowlist (v0.20.0, PR #2191). The default-
  # deny guard refuses to register or dial a target on non-public space,
  # but the RDC lab registers on-prem appliances on RFC 1918 ranges as a
  # matter of course — so scope-open the guard to those ranges or every
  # target create / dispatch is refused. Comma-separated CIDRs / bare
  # IPs / hostname literals; a malformed CIDR fails loudly at runtime.
  # Leave `""` on a chassis-only lab that dials no private-range targets.
  # See `docs/codebase/target-ssrf-guard.md`.
  targetSsrfAllowlist: "10.0.0.0/8,192.168.0.0/16"

postgres:
  # Cluster-internal Postgres on rke2-infra (per Goal #11 cross-repo deps).
  host: postgres.evba.lab
  port: 5432
  database: meho
  # K8s Secret holding DATABASE_URL at key `url`. The consumer's ESO
  # ExternalSecret materialises this Secret from Vault path
  # `secret/meho/postgres` — see deploy/values-examples/README.md for the
  # ExternalSecret manifest.
  credentialsSecret: meho-postgres

vault:
  address: https://vault.evba.lab
  authMethod: oidc
  # Provisioned by the consumer per Goal #11 cross-repo deps (Vault role
  # bound to the Keycloak issuer configured above).
  role: meho-mcp
  paths:
    kv: secret/meho

keycloak:
  # MUST be substituted: the realm segment is environment-specific.
  issuer: "https://keycloak.evba.lab/realms/<REPLACE: realm-name>"
  audience: meho-backplane
  clientSecretSyncFromVault: secret/meho/keycloak/client_secret

# Agent-runtime LLM credentials (G11.1 #803). Off by default — flip
# `enabled: true` only on deploys that intentionally run the bounded
# tool-use loop in `meho_backplane.agent.run`. The `secretName` below
# is the Vault-synced Secret the consumer GitOps repo provisions
# (matches the chart's `eso.agent` ExternalSecret target name if you
# flip both on; pre-existing Secret names also work). Keep `enabled:
# false` on deploys that don't use agents — the backplane's seam
# stays fail-closed and `/api/v1/agent-runs` returns the same "no
# credentials" surface it always has.
agent:
  enabled: false
  # Operator-managed Secret name. When set, the chart skips ESO and
  # references this Secret directly. When empty AND
  # `eso.agent.enabled: true` (below), the chart resolves the
  # ESO-rendered `<release>-agent` Secret automatically.
  secretName: ""
  # Default `api_key`; override only when reusing an existing Secret
  # with a different key.
  secretKey: api_key

# Keycloak Admin API credentials (G11.2 #803) gating agent-principal
# registration (`POST /api/v1/agent-principals`). Off by default —
# flip `enabled: true` only after provisioning the `meho-admin`
# service-account client in Keycloak (see
# `docs/cross-repo/keycloak-agent-client.md` §Step 1) and surfacing
# the client secret to Vault at `secret/meho/keycloak/admin_client_secret`.
keycloakAdmin:
  enabled: false
  # MUST be substituted: realm-scoped Admin REST API base.
  url: "https://keycloak.evba.lab/admin/realms/<REPLACE: realm-name>"
  # MUST match the Keycloak client id provisioned in Step 1.
  clientId: meho-admin
  clientSecret:
    # Operator-managed Secret name OR empty when `eso.keycloakAdmin.enabled:
    # true` (chart resolves the `<release>-keycloak-admin` ESO target).
    secretName: ""
    # Default `client_secret`; override only when reusing an existing Secret.
    secretKey: client_secret

audit:
  # v0.1: audit rows written to PostgreSQL only. The S3 / object-store
  # mirror is v0.2 per Goal #11 scope.
  postgresOnly: true

broadcast:
  # v0.1: chart-bundled Valkey 9.x subchart, single-replica, ephemeral
  # streams (ADR 0005). Operators with an external managed Valkey/Redis
  # flip this to `false` once the externalEndpoint opt-out lands in v0.2.
  enabled: true
  image:
    repository: valkey/valkey
    tag: "9.0-alpine"
    pullPolicy: IfNotPresent
  replicas: 1

connectors:
  # v0.1 ships the chassis only — no connectors enabled by default.
  # The connector surface lands post-Goal-2 with the first product ticket.
  enabled: []

networkPolicy:
  enabled: true
  # rke2-infra labels the controller namespace `ingress-nginx`.
  ingressControllerNamespace: ingress-nginx
  # MUST be substituted: site-specific CIDRs. The schema's IPv4-CIDR
  # pattern rejects `<REPLACE: ...>` literals so a forgotten substitution
  # fails-loud at `helm install` time. Recover the actual CIDRs from
  # `kubectl get endpoints <svc> -n <ns> -o yaml` against the rke2-infra
  # PG / vault.evba.lab / keycloak.evba.lab services.
  postgresCIDR: "<REPLACE: rke2-infra Postgres CIDR, e.g. 10.0.1.0/24>"
  vaultCIDR: "<REPLACE: vault.evba.lab CIDR, e.g. 10.0.2.0/24>"
  keycloakCIDR: "<REPLACE: keycloak.evba.lab CIDR, e.g. 10.0.3.0/24>"

# Optional chart-side ExternalSecret rendering. Default `false` — the
# RDC lab convention (per Goal #11 cross-repo deps) is that the
# consumer's GitOps repo owns the ExternalSecret manifests so that the
# chart stays decoupled from the secret-sync mechanism. Flip to `true`
# only if you want the chart to render ExternalSecret resources for
# `postgres.credentialsSecret` and `keycloak.clientSecretSyncFromVault`
# itself; see deploy/values-examples/README.md for the contract.
#
# The two G11 sub-toggles (`eso.agent`, `eso.keycloakAdmin`) are
# independent of `eso.enabled` — flip them on individually to have
# the chart render an ExternalSecret for the Anthropic API key /
# Keycloak admin client secret without enabling the rest of the
# chart's ESO surface. The `secretStore.name` below is required when
# any of the three toggles is on.
eso:
  enabled: false
  secretStore:
    # Operator-supplied ClusterSecretStore / SecretStore name (the chart
    # does NOT render this — install ESO and create the store first).
    name: ""
    kind: ClusterSecretStore
  agent:
    # G11.1 #803 — when `true`, the chart renders
    # `<release>-agent` (keyed `api_key`) from `secret/meho/agent`.
    # Pairs with `agent.enabled: true` above; leave `agent.secretName`
    # empty so the chart resolves the ESO target automatically.
    enabled: false
  keycloakAdmin:
    # G11.2 #803 — when `true`, the chart renders
    # `<release>-keycloak-admin` (keyed `client_secret`) from
    # `secret/meho/keycloak/admin_client_secret`. Pairs with
    # `keycloakAdmin.enabled: true` above; leave
    # `keycloakAdmin.clientSecret.secretName` empty.
    enabled: false

# Trust bundle for internal-CA-signed Vault + Keycloak + Postgres.
# The RDC lab uses trust-manager (jetstack/trust-manager) to distribute
# an internal-CA-bundle ConfigMap (key `ca.crt`) into every namespace
# that has the `trust.cert-manager.io/include` annotation. The chart
# below mounts that ConfigMap into the backplane Pod AND the migration
# Job Pod, then sets `SSL_CERT_FILE` so Python's default ssl context
# honours it. Without this, the readiness probes' httpx calls to
# Keycloak and the hvac calls to Vault both fail with `SSLError` and
# `/ready` returns 503 even though `/healthz` is green — see Issue #209.
#
# The ConfigMap name (`internal-ca-bundle` here) is whatever the
# trust-manager `Bundle` resource targets in this cluster; check
# `kubectl get cm -n meho` to see the name your lab admin chose.
extraVolumes:
  - name: trust-bundle
    configMap:
      name: internal-ca-bundle
      # `optional: false` (the default) fails Pod admission if the
      # ConfigMap is missing — fails-loud, matching the chart-wide
      # "no silent misconfig" discipline. trust-manager creates it
      # before any Pod can mount it, so this is rare in practice.
      optional: false

extraVolumeMounts:
  - name: trust-bundle
    # `/etc/ssl/extra-certs/` is a convention; nothing else mounts
    # here. `SSL_CERT_FILE` below points at the specific key. The
    # mount is read-only — the bundle is owned by trust-manager, not
    # by anything inside the Pod.
    mountPath: /etc/ssl/extra-certs
    readOnly: true

extraEnv:
  - name: SSL_CERT_FILE
    # Python's `ssl` module honours `SSL_CERT_FILE` as a CA bundle
    # path (see CPython `ssl.get_default_verify_paths()`). This routes
    # httpx (Keycloak readiness probe, JWKS fetch) and hvac (Vault
    # OIDC login, `/sys/health` poll) through the internal CA without
    # the chart having to mutate the OS trust store.
    value: /etc/ssl/extra-certs/ca.crt
