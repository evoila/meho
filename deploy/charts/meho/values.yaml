# Default values for the meho chart.
#
# This file ships **safe-by-default** values: every field that the backplane
# cannot start without (Vault address, Keycloak issuer, DB credentials secret
# name, NetworkPolicy egress CIDRs, image tag, Ingress host + TLS secret) is
# **blank**. The companion `values.schema.json` typed contract rejects empty
# values at `helm install` / `helm upgrade` / `helm template` time with a
# clear error, so a misconfigured release fails up-front instead of
# silently connecting to the wrong system or CrashLoopBackOff'ing at first
# request. Lines tagged `MUST be set` below identify the operator-supplied
# fields the schema enforces.
#
# v0.1 deliberately ships single-replica (HA + PodDisruptionBudget +
# topologySpreadConstraints are explicitly deferred to v0.2 per Goal #11
# scope). Resource requests/limits are conservative production baselines
# suitable for the chassis-stage backplane; tune via overrides for higher-
# throughput deployments.

# -- Number of backplane replicas. v0.1 is single-replica; HA lands in v0.2.
replicaCount: 1

image:
  # -- Image repository. The G2.4 pipeline publishes to `ghcr.io/evoila/meho`.
  repository: ghcr.io/evoila/meho
  # -- Image tag — MUST be set; empty fails the schema at install time. CI
  # typically passes `--set image.tag=sha-<git-sha>`; Goal #11's deploy
  # discipline forbids the `:latest` tag entirely.
  tag: ""
  # -- Image pull policy.
  pullPolicy: IfNotPresent

# -- Image pull secrets when consumers mirror through a private registry.
# Public GHCR pulls (Goal #11's locked artefact-distribution principle) need
# no secret; the list is empty by default.
imagePullSecrets: []

# -- Override `<chart-name>` portion of resource names. Defaults to `meho` so
# every rendered resource carries `app.kubernetes.io/name: meho` regardless
# of the chart's OCI artefact name (`meho-chart` per Chart.yaml). NetworkPolicy
# pod selectors, ServiceMonitor matchLabels, and any consumer-side label
# selectors that target this release continue to use
# `app.kubernetes.io/name=meho`. Override only when running two MEHO releases
# in the same namespace and they need distinct selector labels.
nameOverride: "meho"
# -- Override the full resource name (`<release-name>-<chart-name>`).
fullnameOverride: ""

serviceAccount:
  # -- Whether to create the ServiceAccount. Disable to reuse an existing SA.
  create: true
  # -- Annotations to attach to the ServiceAccount (e.g. IAM/IRSA bindings).
  annotations: {}
  # -- Name of the ServiceAccount. Empty = generated from the fullname template.
  name: ""

# -- Pod-level annotations (e.g. for sidecar injectors).
podAnnotations: {}
# -- Pod-level labels.
podLabels: {}

# -- Pod-level security context.
# `runAsNonRoot: true` + a numeric `runAsUser` matches the backplane Dockerfile's
# `USER 1001:0` directive — running with the wrong UID will fail-closed at
# admission time on a cluster with the restricted PodSecurity profile.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context.
# `readOnlyRootFilesystem: true` + `drop: [ALL]` are the cert-manager / ArgoCD /
# Flux baseline. The backplane writes nothing to the root filesystem at runtime;
# `/tmp` is mounted as an `emptyDir` for the few libraries that insist on a
# writable tempdir.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8000
  # -- Name of the service port (consumed by the Ingress backend reference).
  portName: http

ingress:
  enabled: true
  # -- IngressClass name. Empty = let the cluster's default IngressClass apply.
  # Typical values: "nginx" (RKE2 bundled), "traefik", a private class name.
  className: ""
  # -- Hostname the Ingress publishes. Required (non-empty + RFC 1123 hostname)
  # by the schema only when `ingress.enabled: true` (the default); when
  # `ingress.enabled: false` the template skips the Ingress resource and
  # this field may be left blank.
  host: ""
  # -- Path rules. Default routes every path to the backplane Service.
  path: /
  pathType: Prefix
  # -- Annotations applied to the Ingress. Defaults are empty; consumers add
  # cert-manager / ingress-controller-specific annotations as needed (e.g.
  # `cert-manager.io/cluster-issuer: letsencrypt-prod`).
  annotations: {}
  tls:
    enabled: true
    # -- Name of the Kubernetes Secret holding the TLS certificate. Required
    # (non-empty) by the schema only when both `ingress.enabled` and
    # `ingress.tls.enabled` are true. When cert-manager owns the certificate
    # lifecycle, this is the Secret cert-manager creates from the Certificate
    # resource (or from the Ingress annotations on first reconcile).
    secretName: ""

# -- Container probes. Both probes target endpoints shipped by the backplane's
# chassis (`backend/src/meho_backplane/health.py`, Task #19 / G2.1-T2):
#
# * `/healthz` — process-up only; returns 200 unconditionally. Used by
#   `livenessProbe`. Failure → pod restart.
# * `/ready` — readiness registry; returns 200 only when every registered
#   probe (Vault/Keycloak in G2.2, Alembic migrations in G2.3) reports OK.
#   Empty registry returns 503 by design — the backplane fails-closed at the
#   chassis stage. Used by `readinessProbe`. Failure → pod removed from
#   Service endpoints but NOT restarted.
#
# Timings follow the issue body's specification: liveness allows 30s for
# the FastAPI app to start before the first check then 1s timeout × 3
# failures (30s detection window); readiness is faster (5s initial, 5s
# period, 2s timeout × 3 failures = 15s detection window) so a flaky
# dependency removes the pod from rotation promptly without triggering a
# restart. Every field is operator-tunable.
#
# `startup` (Issue #2393) gates liveness/readiness until first boot
# succeeds. First boot registers the full typed-op catalog and preloads the
# fastembed embedding model before the app binds :8000 (~2-3 min, longer on
# a cold install that downloads model weights into an empty cache PVC), so
# the short-delay liveness probe would otherwise CrashLoopBackOff a
# slow-but-healthy pod. The default budget is `failureThreshold` ×
# `periodSeconds` = 30 × 10s = 300s (5 min); once it passes the kubelet
# hands off to the liveness probe for fast hang detection. Clear
# `probes.startup` to opt out on a fast cluster.
probes:
  liveness:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
  readiness:
    httpGet:
      path: /ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  startup:
    httpGet:
      path: /healthz
      port: http
    # 30 × 10s = 300s (5 min) first-boot budget; covers op-catalog
    # registration + fastembed model preload/download on a cold install.
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 30

# -- Container resources. Conservative production baselines for the v0.1
# chassis backplane — sized for steady-state authn/authz traffic plus the
# audit-write fanout. Tune the limits up for higher-throughput deployments;
# the requests should always reflect observed steady-state usage.
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
    # -- Bounds writable-layer + emptyDir (tmp, fastembed-cache) + log
    # growth so a runaway write can't trigger node-pressure eviction of
    # co-located pods (kubernetes:S6870). The default model is baked into
    # the image layer, not ephemeral storage.
    ephemeral-storage: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi
    ephemeral-storage: 256Mi

# -- ConfigMap-sourced environment variables (non-secret).
# These map 1:1 to `backend/src/meho_backplane/settings.py` env-var contract.
# Required fields are placeholders; the chart fails-closed when they're left
# empty (the backplane raises at startup, which surfaces as a CrashLoopBackOff).
config:
  keycloakIssuerUrl: ""
  keycloakAudience: ""
  # -- Public OAuth client_id the CLI uses to drive the RFC 8628
  # device-code grant (`meho login`). Surfaced via
  # `GET /api/v1/auth-config` as the `cli_client_id` field; the CLI
  # maps it to `client_id` when initiating the device flow. Default
  # `""` (unset) keeps backwards compatibility with v0.3.1 — the
  # endpoint still returns the field but `meho login` surfaces an
  # actionable public-client error rather than silently falling back
  # to `keycloakAudience` (which is the confidential resource-server
  # identifier and cannot run device-code; Keycloak rejects it with
  # `401 unauthorized_client`). Operators MUST set this to the
  # client_id of a public Keycloak client (suggested name `meho-cli`)
  # with the device-grant flow enabled and an audience mapper that
  # injects `keycloakAudience` into the issued access token's `aud`
  # claim — see `deploy/values-examples/README.md` § meho-cli public
  # client for the realm-side recipe. G0.9.1-T9 (RDC dogfood Signal
  # #16, 2026-05-21).
  keycloakCliClientId: ""
  keycloakJwksCacheTtlSeconds: "300"
  keycloakJwtLeewaySeconds: "30"
  vaultAddr: ""
  vaultOidcRole: "meho-mcp"
  vaultOidcMountPath: "jwt"
  vaultTimeoutSeconds: "10.0"
  # Credential backend a schemeless target `secret_ref` (and the
  # `/api/v1/health` federation proof) resolves through (#2227). `vault`
  # (the default) keeps every existing install on today's Vault KV-v2 read
  # with no change — a schemeless `targets/<id>` ref and an explicit
  # `vault:targets/<id>` ref both dispatch to the Vault backend, and the
  # health proof reads `secret/meho/test/federation` unchanged. Set to
  # `gsm` for a GCP-native, Vault-free install: schemeless refs then
  # resolve through GCP Secret Manager and the health proof reads
  # `gsm:<gsmProject>/meho-test-federation`. Rendered as `CREDENTIAL_BACKEND`.
  # The schema requires `vault.address` only when this is `vault`, and
  # requires `gsm.enabled: true` + `gsm.project` when this is `gsm`.
  credentialBackend: "vault"
  # GCP project the GSM credential backend + health federation proof read
  # secrets under (#2227). Empty is correct for every Vault install; a
  # `gsm`-backend install sets it to the project hosting the MEHO target
  # credentials + the `meho-test-federation` probe secret. Rendered as
  # `GSM_PROJECT`. Typically mirrors the top-level `gsm.project`.
  gsmProject: ""
  # Optional service account the GSM backend impersonates when reading
  # Secret Manager (#2227). Empty (the default) reads directly under the
  # pod's own GKE Workload Identity ADC; a non-empty SA email wraps that
  # ADC source in impersonated credentials (the GcloudConnector chain). No
  # service-account JSON key is ever used. Rendered as `GSM_IMPERSONATE_SA`.
  gsmImpersonateSa: ""
  databasePoolSize: "10"
  databasePoolTimeout: "30.0"
  # MCP audience binding (G0.8-T4 #633). The `/mcp` router is mounted
  # unconditionally; every `/mcp` Bearer token must carry
  # `aud == MCP_RESOURCE_URI`. Leave both blank for the common
  # ingress-fronted deploy: the chart derives
  # `BACKPLANE_URL=https://<ingress.host>` (scheme follows
  # `ingress.tls.enabled`) and `MCP_RESOURCE_URI=${BACKPLANE_URL}/mcp`
  # so the documented default actually materialises. Set `backplaneUrl`
  # explicitly when the public URL differs from the Ingress host (split
  # horizon, external LB). Set `mcpResourceUri` explicitly only for a
  # non-default MCP mount point. When neither is set AND no Ingress is
  # configured, the backend fails loudly at startup with the remediation
  # (it does NOT serve a dark, silent `/mcp`). The operator must still
  # add a matching Keycloak oidc-audience-mapper — see
  # `docs/cross-repo/mcp-client-setup.md` Step 1.
  backplaneUrl: ""
  mcpResourceUri: ""
  # Retrieval substrate (G0.4-T2 #259). The default model is BAKED INTO
  # THE IMAGE at /opt/meho/model-cache (backend/Dockerfile warm step,
  # evoila/meho#574) so first boot is offline + version-locked and does
  # NOT depend on a persistent PVC that can be poisoned by a partial
  # first download. Leave `retrievalModelCacheDir` at the baked path
  # unless you also override `retrievalEmbeddingModel` to a non-default
  # model that must be fetched at runtime — in that case point it at the
  # opt-in `retrieval.modelCache` PVC mountPath and set
  # `retrieval.modelCache.enabled: true`.
  retrievalEmbeddingModel: "BAAI/bge-small-en-v1.5"
  retrievalModelCacheDir: "/opt/meho/model-cache"
  # Root the server-side kb bulk ingest (`POST /api/v1/kb/ingest`,
  # `meho kb ingest`) is confined to (#101 L8 + L14). The ingest
  # directory is resolved (symlinks followed) and rejected with a 400
  # unless it lands within this root, so a `tenant_admin` cannot read
  # an arbitrary `.md` elsewhere on the host (path-traversal / LFI).
  # The chart does NOT pre-create or mount this path. To ingest, mount
  # the kb content (a checked-out consumer repo / CI artefact) under
  # `kbIngestRoot` via `extraVolumes` + `extraVolumeMounts`, or repoint
  # this value to wherever the content lives. A chassis-only deploy
  # that never ingests carries the default harmlessly.
  kbIngestRoot: "/opt/meho/kb-ingest"
  # -- Reverse-proxy trust list (Issue #730 / Signal #3, RDC dogfood
  # 2026-05-20). The backplane Dockerfile invokes uvicorn with
  # `--proxy-headers`, which honours `X-Forwarded-Proto` /
  # `X-Forwarded-For` from upstream proxies so a TLS-terminating
  # Ingress' `https://` scheme survives FastAPI's trailing-slash 307
  # redirects. Without a restricted allow-list, `--proxy-headers`
  # would trust those headers from *any* connecting peer — a pod-to-
  # pod request could lie about the original scheme.
  #
  # `FORWARDED_ALLOW_IPS` is the env var uvicorn natively reads
  # (equivalent to the `--forwarded-allow-ips` CLI flag). uvicorn's
  # secure default is `127.0.0.1` only, which fails-closed in a
  # cluster: the Ingress controller's pod IP is never the loopback
  # and the chain breaks shut. Operators MUST override with the
  # Ingress controller's pod CIDR (preferred) — e.g. `10.42.0.0/16`
  # for the RKE2 default pod CIDR, or the specific `nginx-ingress` /
  # `traefik` namespace pod IPs once they're known. `*` disables the
  # allow-list entirely and is acceptable only for ephemeral CI
  # clusters where every connecting peer is the cluster's own proxy
  # — never for production. See
  # `docs/cross-repo/reverse-proxy-contract.md` for the operator-
  # side trust contract.
  forwardedAllowIps: "127.0.0.1"
  # -- Target-destination SSRF allowlist (v0.20.0, PR #2191). The
  # backplane refuses to register or dial a target whose host is (or
  # resolves to) a non-public address — loopback, RFC 1918, link-local,
  # `169.254.169.254` (cloud metadata), CGNAT, the IPv6 analogues —
  # classic server-side request forgery protection. This value is the
  # operator's scoped opt-out: it renders into the
  # `MEHO_TARGET_SSRF_ALLOWLIST` env var the guard reads per request
  # (`backend/src/meho_backplane/targets/ssrf_guard.py`), NOT via
  # settings.py. Comma-separated exemptions: CIDR ranges (`10.0.0.0/8`),
  # bare IPs (`192.168.7.10`), and/or hostname literals
  # (`vcenter.lab.internal`); whitespace around commas is ignored.
  #
  # Default `""` keeps the guard fully on (default-deny) — a genuine
  # no-op render. MEHO is on-prem: registering appliances on private
  # space is the normal case, so a deploy that manages LAN targets MUST
  # allowlist the ranges those appliances live on, e.g.
  # `"10.0.0.0/8,192.168.0.0/16"`. A scoped opt-in is the intended
  # posture, never a global off-switch; a malformed CIDR fails loudly at
  # runtime naming the offending token. See CHANGELOG v0.20.0
  # ("Deployment impact — action likely required") and
  # `docs/codebase/target-ssrf-guard.md`.
  targetSsrfAllowlist: ""
  # -- Async ingest-job watchdog budget override, in seconds (#2318,
  # hardens #2275). The backplane time-boxes each background OpenAPI-ingest
  # job in `asyncio.timeout(...)` so a wedged pipeline (a starved
  # `to_thread` executor, a hung grouping LLM call) can't sit at
  # `status=running` until a pod restart. The 30-min default is owned by the
  # backend (`_DEFAULT_INGEST_JOB_TIMEOUT_SECONDS`); this knob only overrides
  # it — raise it for a slow shared executor or a very large fleet of specs.
  # Rendered into `INGEST_JOB_TIMEOUT_SECONDS` ONLY when non-empty: the
  # default `""` omits the env so the backend's built-in 30-min default
  # applies silently (an always-rendered empty string would hit `float("")`
  # and log a spurious warning every boot). A non-finite (`inf`/`nan`),
  # non-positive, or malformed value is rejected at the backend, which logs
  # a warning and falls back to 30 min — a misconfigured budget can never
  # disable the watchdog. See `docs/codebase/spec-ingestion.md`.
  ingestJobTimeoutSeconds: ""

# Memory layer (G5.2 #374). The backplane ships an in-process
# memory-expiry sweeper that runs in the FastAPI lifespan and removes
# `source="memory"` rows whose `metadata.expires_at` has passed. The
# defaults here track the consumer-needs.md §G5 contract (7-day TTL,
# 24-hour sweep cadence). Disable `expiryEnabled` only when an external
# cleanup mechanism (k8s CronJob etc.) reaps expired rows instead;
# expired rows remain soft-hidden via the read-side filter until the
# external job runs.
memory:
  # -- Default time-to-live for user-scoped memory entries, in days.
  # G5.2-T2 (#624) consumes this on `POST /api/v1/memory` to inject
  # `expires_at = now() + userDefaultTtlDays` when the caller omits an
  # explicit value. Operators wanting permanent memories pass
  # `expires_at: null` on the write or set this to a year-class value.
  # Range [1, 365]. Default 7 matches consumer-needs.md §G5
  # ("session-scoped hints expire after 7 days unless re-pinned").
  userDefaultTtlDays: 7
  # -- Cadence of the in-process memory-expiry sweeper, in seconds.
  # Default 86400 (24h) matches Initiative #374's stated cadence.
  # Range [60, 86400]: below one minute competes with request load;
  # above one day risks accumulating soft-hidden rows.
  expiryTickIntervalSeconds: 86400
  # -- Whether to start the in-process memory-expiry sweeper. Set
  # false when an external cleanup mechanism reaps expired rows
  # instead; the read-side filter still hides expired rows from
  # consumers until the external job runs.
  expiryEnabled: true

# Topology layer (G9 #220). The backplane ships history tables
# (`graph_node_history` / `graph_edge_history`, G9.3-T1 #856) that
# accumulate one append-only row per refresh-driven or operator-
# annotated graph mutation. Without a retention policy these tables
# grow unbounded -- a 1-h refresh cadence on a churning tenant adds
# tens of thousands of rows per week, indefinitely. The G9.3-T6 (#858)
# retention prune task -- registered in the FastAPI lifespan as a
# weekly `asyncio.create_task` loop -- deletes rows older than
# `historyRetentionDays`. Disable `historyPruneEnabled` only when an
# external retention mechanism (k8s CronJob hitting the DB, cold-
# storage archive + delete) reaps rows instead.
topology:
  # -- Maximum age (in days) of `graph_node_history` /
  # `graph_edge_history` rows the retention prune preserves. Rows
  # whose `valid_from` is older than `now() - historyRetentionDays`
  # are deleted in one bounded batch per run. Default 90 matches
  # Initiative #365 work-item #8 ("quarterly ops review without
  # unbounded growth"). Set `0` for keep-forever -- the prune task
  # still runs as a heartbeat but every tick is a no-op. Operators
  # picking 0 accept unbounded disk growth in exchange for full
  # historical retention; export via `meho topology timeline --json`
  # to cold storage if quarterly-plus retention is operationally
  # required. Range [0, 3650] (10 years upper bound).
  historyRetentionDays: 90
  # -- Cadence of the in-process history retention prune sweeper, in
  # seconds. Default 604800 (7d / weekly) matches Initiative #365's
  # stated cadence ("a weekly background task prunes rows"). Range
  # [60, 604800]: below one minute the prune competes with normal
  # write load; the ceiling is the documented weekly cadence --
  # operators wanting slower pruning raise `historyRetentionDays`
  # instead (pushes the deletion horizon further out without changing
  # the sweep cadence).
  historyPruneIntervalSeconds: 604800
  # -- Whether to start the in-process history retention prune
  # sweeper. Set false when an external retention mechanism reaps
  # rows instead. Distinct from `historyRetentionDays: 0`: `0` keeps
  # the loop running but every tick is a no-op (cheap heartbeat that
  # proves retention is policy-driven); `false` here skips starting
  # the loop entirely (no audit-row noise, no log line).
  historyPruneEnabled: true

postgres:
  # -- PostgreSQL host. v0.1 expects an operator-managed PG cluster (Goal #11
  # explicitly excludes a bundled PG subchart); typically reached over the
  # network at the cluster boundary. Empty in defaults — consumers override.
  host: ""
  # -- PostgreSQL port. 5432 is the upstream default; override only when the
  # operator's PG cluster listens on a non-standard port.
  port: 5432
  # -- Database name. Defaults to `meho`; override if the operator's PG
  # cluster hosts multiple MEHO releases on the same instance with different
  # logical databases.
  database: meho
  # -- Name of the Kubernetes Secret holding the DATABASE_URL value at key
  # `url` — MUST be set. Synced from Vault by External Secrets Operator (ESO)
  # in production; the consumer pre-provisions it before `helm install`.
  credentialsSecret: ""

vault:
  # -- Vault address (e.g. `https://vault.example.org`) — MUST be set; empty
  # fails the schema. Goal #11 cross-repo dependency: the consumer's Vault
  # must have the `meho-mcp` JWT/OIDC role bound to the Keycloak issuer
  # configured below.
  address: ""
  # -- Vault auth method used by the backplane (`oidc` is the JWT/OIDC method).
  authMethod: oidc
  # -- Vault role name (matches Goal #11's `meho-mcp` cross-repo convention).
  role: meho-mcp
  paths:
    # -- KV v2 mount + base path for operator secrets. Federation-proof reads
    # happen under `<paths.kv>/test/federation` (see backend health.py).
    kv: secret/meho

# GCP Secret Manager credential backend (Initiative #2227). Mirrors the
# `vault.*` block: a top-level operator-facing declaration that the schema
# validates (required when `config.credentialBackend: gsm`), paired with
# the runtime `config.gsmProject` / `config.gsmImpersonateSa` env values the
# backplane reads. A Vault install leaves this at `enabled: false` and the
# block is inert.
gsm:
  # -- Whether the deployment uses the GSM credential backend. Set true
  # together with `config.credentialBackend: gsm` for a Vault-free,
  # GCP-native install. When false (the default) the block is inert and the
  # schema does not require `project`.
  enabled: false
  # -- GCP project id hosting the MEHO target credentials and the
  # `meho-test-federation` health-probe secret. Required (non-empty) when
  # `gsm.enabled: true`. Typically the same value as `config.gsmProject`
  # (which is the value the backplane actually reads at runtime).
  project: ""
  # -- Workload Identity Federation parameters for per-operator GCP token
  # exchange. STUB for Phase 2 (#2232) — declared so a GSM adopter can pin
  # the shape now, but NO template consumes these yet and the SA-direct
  # Phase 1 backend ignores them. Leave empty until #2232 wires the STS
  # token-exchange path.
  workloadIdentityFederation:
    # -- Workload Identity **pool** id (Phase 2 stub, #2232).
    poolId: ""
    # -- Workload Identity **provider** id within the pool (Phase 2 stub).
    providerId: ""
    # -- Service account the federated identity impersonates (Phase 2 stub).
    serviceAccount: ""

keycloak:
  # -- Keycloak issuer URL — MUST be set; empty fails the schema. The JWT
  # validator uses this as the `iss` claim expectation and to discover JWKS.
  issuer: ""
  # -- Keycloak audience (= the client ID in Keycloak that fronts the
  # backplane). The JWT `aud` claim must contain this value.
  audience: meho-backplane
  # -- Vault path the chart's downstream automation reads to recover the
  # Keycloak client secret (v0.2 wiring; v0.1 uses ESO directly).
  clientSecretSyncFromVault: secret/meho/keycloak/client_secret

# Agent-runtime LLM credentials (G11.1 #803). The bounded tool-use loop
# in `meho_backplane.agent.run` authenticates to Anthropic with the
# `ANTHROPIC_API_KEY` env var; the seam's model factory is fail-closed
# (`agent/run.py:default_model_factory` raises rather than starting a
# loop with no credentials), so leaving this disabled keeps the feature
# off without any other behaviour change — `/api/v1/agent-runs` returns
# the same "no credentials" surface it did before this block existed.
#
# The chart wires `ANTHROPIC_API_KEY` as a `secretKeyRef` env var (never
# a plaintext chart value), mirroring the Postgres / Keycloak-client-secret
# precedent. Either bring your own Kubernetes Secret and reference it by
# name + key, or set `eso.agent.enabled: true` to render an ExternalSecret
# that materialises one from Vault (mirrors `eso.keycloak`). Unset / empty
# `secretName` + `eso.agent.enabled: false` → the chart renders no env
# wiring and the backplane's fail-closed surface stays in place.
agent:
  # -- Whether to wire `ANTHROPIC_API_KEY` into the backplane Deployment.
  # Default `false`: agent-runtime endpoints fail-closed at first
  # invocation (no behaviour change vs. a chart that doesn't ship this
  # block). Flip to `true` and provide either an operator-managed Secret
  # (set `secretName` / `secretKey` below) or an ESO-rendered one
  # (`eso.agent.enabled: true`) for the env var to surface.
  enabled: false
  # -- Name of the Kubernetes Secret holding the Anthropic API key. The
  # chart references it by name only — sync is the consumer's GitOps
  # responsibility (or, opt-in, ESO via `eso.agent`). Required and
  # non-empty when `agent.enabled: true`.
  secretName: ""
  # -- Key within `secretName` whose value is the API key. Default `api_key`
  # matches the ESO target rendered by `eso.agent` when that path is
  # enabled, so operators who opt into both don't have to reconcile names.
  secretKey: api_key

# Keycloak Admin API credentials (G11.2 #803). The
# `KeycloakAdminClient` (`meho_backplane.auth.keycloak_admin`) is what
# gates agent-principal registration (`POST /api/v1/agent-principals`);
# the feature is "configured iff all three" `KEYCLOAK_ADMIN_*` envs are
# non-empty (`meho_backplane.features._agent_runtime_block`). Any of
# the three unset → the endpoint returns `503 keycloak_admin_not_configured`
# without behavioural drift vs. a chart that doesn't ship this block.
#
# `url` and `clientId` are non-secret operator config. `clientSecret`
# is a confidential credential and is wired exclusively as a
# `secretKeyRef` — never as a plaintext chart value or env value.
# Either bring your own Kubernetes Secret (set `clientSecret.secretName`
# / `clientSecret.secretKey`) or set `eso.keycloakAdmin.enabled: true`
# to render an ExternalSecret that materialises one from Vault. See
# `docs/cross-repo/keycloak-agent-client.md` for the realm-side
# `meho-admin` service-account client setup.
keycloakAdmin:
  # -- Whether to wire the three `KEYCLOAK_ADMIN_*` env vars into the
  # backplane Deployment. Default `false`: agent-principal endpoints
  # return `503 keycloak_admin_not_configured` (no behaviour change vs.
  # a chart that doesn't ship this block).
  enabled: false
  # -- Admin REST API base URL for the Keycloak realm managing MEHO
  # principals, e.g. `https://keycloak.example.com/admin/realms/meho`.
  # Plain env (`KEYCLOAK_ADMIN_URL`) — not a secret. Required and
  # non-empty when `keycloakAdmin.enabled: true`.
  url: ""
  # -- `client_id` of the confidential Keycloak client backing the Admin
  # REST API (suggested `meho-admin`; see
  # `docs/cross-repo/keycloak-agent-client.md` § Step 1). Plain env
  # (`KEYCLOAK_ADMIN_CLIENT_ID`) — not a secret. Required and non-empty
  # when `keycloakAdmin.enabled: true`.
  clientId: ""
  clientSecret:
    # -- Name of the Kubernetes Secret holding the admin client secret.
    # The chart references it by name only — sync is the consumer's
    # GitOps responsibility (or, opt-in, ESO via `eso.keycloakAdmin`).
    # Required and non-empty when `keycloakAdmin.enabled: true`.
    secretName: ""
    # -- Key within `secretName` whose value is the admin client secret.
    # Default `client_secret` matches the ESO target rendered by
    # `eso.keycloakAdmin` when that path is enabled, so operators who
    # opt into both don't have to reconcile names.
    secretKey: client_secret

audit:
  # -- v0.1: audit rows written to PostgreSQL only. The S3 / object-store
  # mirror is explicitly v0.2 per Goal #11 spec.
  postgresOnly: true

# Activity-broadcast subchart values (Valkey 9.x, per ADR 0005).
#
# The umbrella chart vendors a custom in-tree subchart at `charts/broadcast/`
# running Valkey OSS as a single-replica Deployment with ephemeral streams.
# Subchart slug is `broadcast` rather than `redis` because the protocol
# contract matters more than the brand. The backplane connects via the
# `BROADCAST_REDIS_URL` env var (operator-facing) rendered against the
# Service name `<release>-broadcast`.
#
# Operators on clusters running an external Valkey/Redis can flip
# `broadcast.enabled: false` and (in v0.2+) point the backplane at the
# external endpoint via `broadcast.externalEndpoint`. v0.1 ships the
# `enabled: true` path only — the `externalEndpoint` opt-out is reserved
# for the v0.2 broadcast feature work.
broadcast:
  enabled: true
  image:
    repository: valkey/valkey
    tag: "9.0-alpine"
    pullPolicy: IfNotPresent
  # -- Replica count. Hard-capped at 1 in v0.1 (no Sentinel, ephemeral
  # streams); the schema rejects any higher value.
  replicas: 1
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 999
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
      # -- Node-pressure guard for the broadcast container's ephemeral
      # data emptyDir + logs (kubernetes:S6870).
      ephemeral-storage: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi
      ephemeral-storage: 128Mi
  service:
    type: ClusterIP
    port: 6379

# Pre-install / pre-upgrade migration Job (Helm hook).
#
# Runs `python -m meho_backplane.db.migrate` (the entrypoint shipped by
# G2.3-T3 #29) before the Deployment is created or rolled forward. The
# migration runner exits non-zero on any Alembic failure, which fails the
# Helm release and prevents an unmigrated Pod from accepting traffic.
# Failed Jobs are NOT garbage-collected by the hook delete policy so the
# operator can inspect logs; the k8s-side `ttlSecondsAfterFinished` is
# the backstop.
migrationJob:
  # -- Number of times Kubernetes retries the migration Job on non-zero
  # exit. Alembic migrations are idempotent; the retries catch transient
  # network blips, not real schema mismatches.
  backoffLimit: 3
  # -- Seconds after Job completion (success or failure) before
  # Kubernetes garbage-collects the Job + its Pods. 10 minutes leaves
  # enough time for an operator to `kubectl logs` a failed Job and is
  # cleaned up promptly after successful installs.
  ttlSecondsAfterFinished: 600
  # -- Container resources for the migration runner. Migrations are
  # short-lived; the limits are conservative.
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
      # -- Short-lived migration runner; small ephemeral footprint
      # (kubernetes:S6870).
      ephemeral-storage: 256Mi
    requests:
      cpu: 50m
      memory: 256Mi
      ephemeral-storage: 64Mi

connectors:
  # -- v0.1 ships the chassis with no connectors enabled. The connector
  # surface lands post-Goal-2 with the first product ticket.
  enabled: []

# Retrieval substrate (G0.4, Initiative #225). The shipped default model
# `BAAI/bge-small-en-v1.5` is BAKED INTO THE IMAGE at
# `/opt/meho/model-cache` (backend/Dockerfile warm step, evoila/meho#574)
# so the default deploy needs neither HuggingFace egress nor a PVC: first
# boot is offline + version-locked. The `modelCache` PVC below is
# therefore an OPT-IN optimisation for operators who override
# `config.retrievalEmbeddingModel` to a non-default model that must be
# fetched at runtime — it is `enabled: false` by default. It is RWO
# (single-attach); v0.2 ships single-replica anyway.
#
# WARNING (evoila/meho#574): when you do enable this PVC for a custom
# model, fastembed treats an existing snapshot dir as "present" and will
# NOT re-fetch — a partial/interrupted first download (or a CSI volume
# that doesn't preserve the HF cache's `snapshots/<sha>/*.onnx ->
# ../../blobs/<hash>` symlinks) poisons the PVC permanently and every
# fresh pod CrashLoops. Recovery is to delete the PVC and redeploy.
retrieval:
  modelCache:
    # -- Mount an extra writable model-cache PVC on the backplane Pod.
    # Default `false`: the shipped default model is baked into the image,
    # so the default deploy needs no PVC. Set `true` ONLY when you
    # override `config.retrievalEmbeddingModel` to a non-default model
    # that is fetched at runtime and you want it to survive pod restarts.
    enabled: false
    # -- Requested PVC size. `BAAI/bge-small-en-v1.5` is ~120 MB on
    # disk; 200Mi gives headroom for the tokenizer metadata plus a
    # future swap to a same-dim multilingual model without resizing.
    # Tune upward when swapping to a larger model (e.g. `bge-base` at
    # ~450 MB).
    size: 200Mi
    # -- Path inside the backplane container where fastembed reads /
    # writes ONNX weights. Must match the
    # `RETRIEVAL_MODEL_CACHE_DIR` env var the chart's ConfigMap binds
    # (`config.retrievalModelCacheDir`).
    mountPath: /var/cache/fastembed
    # -- StorageClass for the PVC. Empty = cluster default. Set
    # explicitly when the cluster has multiple classes (e.g. `gp3`
    # vs `standard`) and the default is not appropriate for a small
    # rarely-written cache volume.
    storageClassName: ""

# Optional chart-side External Secrets Operator (ESO) resource rendering.
#
# Default `enabled: false` — the chart references operator-provisioned
# Kubernetes Secrets *by name* (e.g. `postgres.credentialsSecret`) and
# leaves the sync mechanism to the consumer's GitOps repo. This matches
# Goal #11's cross-repo convention where
# `evoila-bosnia/claude-rdc-hetzner-dc` owns the ExternalSecret manifests.
#
# Flipping `enabled: true` makes the chart render ExternalSecret CRs for
# `postgres.credentialsSecret` and (when `eso.keycloak.enabled: true`) the
# Keycloak client secret. The chart does NOT render the SecretStore /
# ClusterSecretStore itself — install ESO and create the store first.
#
# When `enabled: true` the schema also requires `eso.secretStore.name` and
# `eso.secretStore.kind`. See `deploy/values-examples/README.md` for the
# expected ClusterSecretStore + ExternalSecret pattern.
eso:
  enabled: false
  secretStore:
    # -- Name of the existing SecretStore / ClusterSecretStore.
    name: ""
    # -- Kind: `ClusterSecretStore` is the typical RKE2 choice (the store
    # lives once cluster-wide); `SecretStore` is namespace-scoped.
    kind: ClusterSecretStore
  # -- ESO refresh interval. ESO re-pulls from the upstream store at this
  # cadence; `1h` is the project default and balances rotation latency
  # against API load on Vault.
  refreshInterval: 1h
  postgres:
    # -- Vault KV path holding the DATABASE_URL value. Empty = derive from
    # `<vault.paths.kv>/postgres` at render time.
    remoteKey: ""
    # -- Property within the remote KV entry that holds the DATABASE_URL.
    # Must be `url` to match the Deployment env's `secretKeyRef.key: url`.
    remoteProperty: url
  keycloak:
    # -- Render an ExternalSecret for the Keycloak client secret. The
    # resulting Secret is named `<release>-keycloak-client`, keyed
    # `client_secret`. v0.1 does not yet consume this Secret in the
    # Deployment env — set this `true` to verify the sync end-to-end
    # before the v0.2 federation wiring lands.
    enabled: false
    remoteProperty: client_secret
  agent:
    # -- Render an ExternalSecret for the agent-runtime Anthropic API
    # key. When `true`, the chart materialises a `<release>-agent`
    # Secret keyed `api_key` (default — overridable via
    # `agent.secretKey`) from
    # `<eso.agent.remoteKey | default "<vault.paths.kv>/agent">`. To
    # actually wire the env var into the Deployment, also set
    # `agent.enabled: true` and either leave `agent.secretName: ""`
    # (chart picks the ESO target name automatically) or point
    # `agent.secretName` at this rendered Secret's name. Independent
    # of `eso.enabled: true` — when ESO isn't installed cluster-wide,
    # this stays `false` and the operator manages the Secret directly.
    enabled: false
    # -- Vault KV path holding the Anthropic API key value. Empty →
    # derive from `<vault.paths.kv>/agent` at render time.
    remoteKey: ""
    # -- Property within the remote KV entry that holds the API key.
    # Must match `agent.secretKey` (default `api_key`) so the
    # Deployment's `secretKeyRef.key` resolves.
    remoteProperty: api_key
  keycloakAdmin:
    # -- Render an ExternalSecret for the Keycloak admin client secret
    # (`KEYCLOAK_ADMIN_CLIENT_SECRET`). When `true`, the chart
    # materialises a `<release>-keycloak-admin` Secret keyed
    # `client_secret` (default — overridable via
    # `keycloakAdmin.clientSecret.secretKey`) from
    # `<eso.keycloakAdmin.remoteKey | default "<vault.paths.kv>/keycloak/admin_client_secret">`.
    # To actually wire the env var into the Deployment, also set
    # `keycloakAdmin.enabled: true` and either leave
    # `keycloakAdmin.clientSecret.secretName: ""` (chart picks the ESO
    # target name automatically) or point it at this rendered Secret's
    # name. Independent of `eso.enabled: true`.
    enabled: false
    # -- Vault KV path holding the admin client secret value. Empty →
    # derive from `<vault.paths.kv>/keycloak/admin_client_secret` at
    # render time.
    remoteKey: ""
    # -- Property within the remote KV entry that holds the admin
    # client secret. Must match `keycloakAdmin.clientSecret.secretKey`
    # (default `client_secret`).
    remoteProperty: client_secret

networkPolicy:
  # -- Whether to ship the default-deny NetworkPolicy. Disable only on
  # clusters running an equivalent mesh-level policy (Istio AuthorizationPolicy
  # etc.) — disabling without a replacement removes the chart's least-
  # privilege egress story.
  enabled: true
  # -- Namespace label value selecting the ingress controller. RKE2 ships with
  # `ingress-nginx`; override per-cluster.
  ingressControllerNamespace: ingress-nginx
  # -- PostgreSQL egress CIDR. Required and pattern-validated by the schema
  # only when `networkPolicy.enabled: true` (the default); when disabled the
  # template skips the NetworkPolicy resource and this field may be left blank.
  postgresCIDR: ""
  # -- Vault egress CIDR. Same conditional rules as postgresCIDR.
  vaultCIDR: ""
  # -- Keycloak egress CIDR. Same conditional rules as postgresCIDR.
  keycloakCIDR: ""

# -- Node selector applied to the Pod template.
nodeSelector: {}
# -- Tolerations applied to the Pod template.
tolerations: []
# -- Affinity rules applied to the Pod template.
affinity: {}

# -- Extra Volumes to attach to the backplane Pod AND the migration Job
# Pod. Items are Kubernetes Volume objects rendered into the Pod spec
# verbatim. Most common use: mounting a trust-manager-distributed CA
# bundle ConfigMap so the backplane trusts internal-CA-signed Vault /
# Keycloak / Postgres endpoints. See `deploy/values-examples/README.md`
# for the SSL_CERT_FILE pattern (Issue #209). Default empty — no extra
# volumes are mounted; clusters using only public CAs need nothing here.
extraVolumes: []

# -- Extra VolumeMounts attached to the backplane container AND the
# migration Job container. Items are Kubernetes VolumeMount objects
# rendered into the container spec verbatim. Pair with `extraVolumes`
# above (a mount with no matching Volume name fails Pod admission).
extraVolumeMounts: []

# -- Extra environment variables for the backplane container AND the
# migration Job container. Items are full Kubernetes EnvVar objects
# (accepts `value` OR `valueFrom`). Most common use: `SSL_CERT_FILE`
# pointing at a mounted trust bundle's path, so Python's default ssl
# context honours internal CAs. The list is appended after the chart's
# own env (DATABASE_URL, BROADCAST_REDIS_URL); operator values win on collisions
# only if Kubernetes' duplicate-EnvVar resolution rule (last-write-wins)
# applies to your runtime. Don't rely on overrides — pick a name that
# doesn't clash.
extraEnv: []
