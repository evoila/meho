# Dependabot configuration.
#
# Active ecosystems: GitHub Actions (workflows), uv (backend Python
# deps), and docker (backend/Dockerfile base image). Pip / npm land
# when their manifests do (a root pyproject.toml, a package.json).
# Adding an ecosystem before its manifest exists silently no-ops but
# invites confusion later — the schedule would already be running.

version: 2
updates:
  # Pin-bumps for third-party Actions used in .github/workflows/.
  # Runs weekly; PRs land with `chore(deps):` prefix matching the
  # repo's Conventional Commits convention.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # cli/.golangci.yml was migrated to the v2 schema in PR #640 and
      # golangci-lint-action was upgraded to v9.2.0 at the same time.
      # Major-version bumps of this action are still blocked to prevent
      # a future v10+ breaking change from silently landing via Dependabot
      # (same lesson as PR #198 which bumped v6→v9 without the config
      # migration and broke CI). Minor / patch bumps within v9 still come
      # through normally. When a new major ships, do the migration first.
      - dependency-name: "golangci/golangci-lint-action"
        update-types:
          - "version-update:semver-major"

  # Backend Python deps live at backend/pyproject.toml + backend/uv.lock.
  # Without this block, Dependabot security updates default to `/` and
  # fail with `dependency_file_not_found: { "file-path": "/" }` (Dependabot
  # job 1360360077). The `uv` ecosystem covers the uv.lock format the
  # project uses (Dependabot supports it natively since 2025).
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"

  # The backplane image's base is `FROM python:3.12-slim@sha256:…` in
  # backend/Dockerfile. Dependabot's docker ecosystem bumps that literal,
  # tag-qualified digest when upstream rebuilds the tag, so newly disclosed
  # base-OS CVEs arrive as an automatic PR instead of silently accumulating
  # on a frozen digest. `directory` points at the Dockerfile's directory.
  # Only literal `FROM image:tag@sha256:` references are tracked — an
  # ARG-held digest is not resolved (dependabot-core#2057 / #4597), which
  # is why the Dockerfile inlines the pin on both FROM lines.
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"

  # When other language manifests land, add per-ecosystem blocks below.
  # Reference (MEHO.X conventions):
  #
  # - package-ecosystem: "pip"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
  #     day: "monday"
  #   labels: ["dependencies", "python"]
  #   commit-message:
  #     prefix: "chore(deps)"
  #
  # - package-ecosystem: "npm"
  #   directory: "/<frontend-path>"
  #   schedule:
  #     interval: "weekly"
  #     day: "monday"
  #   labels: ["dependencies", "frontend"]
  #   commit-message:
  #     prefix: "chore(deps)"
