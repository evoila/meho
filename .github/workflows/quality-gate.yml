# SonarCloud quality gate.
#
# Triggers via workflow_run after CI succeeds. Downloads the Python
# coverage artifact CI produces, then runs the SonarCloud scan. The
# "Clean as You Code" model is meant to gate new code only — existing
# issues don't block PRs.
#
# NEW-CODE BASELINE: this workflow analyzes main pushes only (see the
# `if:` on the job — the event filter stops PR completions from
# overwriting the main-branch analysis). The new-code period is left at
# SonarCloud's default `previous_version`, NOT a reference branch: pinning
# New Code = "Reference branch: main" would make main's own new-code
# window permanently ~empty (main is diffed against itself). Rationale +
# how to read the dashboard live in docs/codebase/sonarcloud.md.
# continue-on-error below keeps the gate advisory.
#
# Prerequisite: SONAR_TOKEN repo secret. Verified present pre-merge.
#
# IMPORTANT: Uses SonarSource/sonarqube-scan-action@v5 (NOT the
# deprecated sonarcloud-github-action). All third-party actions are
# pinned to commit SHAs.

name: Quality Gate

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: quality-gate-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # required for PR decoration (Sonar comment with the gate result)

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: meho-runners-ci
    timeout-minutes: 20
    continue-on-error: true
    # Only analyze main pushes. CI runs on both `push` and `pull_request`,
    # so without the event filter every PR-branch CI completion triggered a
    # scan that overwrote the main-branch analysis (SonarCloud stores one
    # analysis per project, keyed by branch — PR scans churned the activity
    # history and the "new code" window never lined up with a real merge).
    # See docs/codebase/sonarcloud.md.
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'push'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0  # full history for accurate blame + new-code detection
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download Python coverage from CI workflow
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: python-coverage
          # Extract into backend/ so the file lands at backend/coverage.xml,
          # matching sonar.python.coverage.reportPaths in
          # sonar-project.properties. The artifact stores the bare
          # `coverage.xml` basename (uploaded from backend/coverage.xml).
          path: backend
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # missing artifact degrades to "no coverage", never blocks

      - name: Assert python-coverage artifact present (fail-visible)
        # Fail-visible contract (#2513). The job-level `if:` above already scopes
        # this workflow to main-push analyses, so a missing backend/coverage.xml
        # here means the push-only python-coverage job (ci.yml) did not upload
        # coverage — historically an invisible OOM / runner-loss on
        # meho-runners-ci-heavy that collapsed SonarCloud coverage from 65.8% to
        # ~24% on 2026-06-20 and stayed hidden for 3+ weeks (the download above is
        # continue-on-error, so the scan silently ran without coverage). This step
        # makes that degradation LOUD: an error-level workflow annotation naming
        # the missing artifact plus a clearly-named failed step. Its own
        # continue-on-error keeps it non-blocking, so the SonarCloud scan below
        # still runs (resilience preserved) — only the invisibility is removed.
        # See docs/codebase/sonarcloud.md (coverage-collapse runbook).
        if: hashFiles('backend/coverage.xml') == ''
        continue-on-error: true
        run: |
          echo "::error title=python-coverage artifact missing::No backend/coverage.xml on this main-push analysis — the push-only python-coverage job (ci.yml) did not upload coverage (likely an OOM / runner-loss on meho-runners-ci-heavy). SonarCloud will import 0% backend coverage for commit ${{ github.event.workflow_run.head_sha }}. See docs/codebase/sonarcloud.md (coverage-collapse runbook)."
          exit 1

      - name: Point coverage report at the backend/ source root
        # coverage.py (relative_files=true) writes an empty <source></source>
        # and filenames like `src/meho_backplane/...` relative to backend/.
        # SonarCloud resolves coverage paths from the repo root, so without
        # the `backend/` prefix every file fails with "Cannot resolve the
        # file path ... the file does not exist in all 'source'" and coverage
        # imports as 0% (observed on the #920 merge run). Injecting the
        # source root makes paths resolve to backend/src/meho_backplane/...
        # Guarded on the file existing so a missing coverage artifact is a no-op.
        if: hashFiles('backend/coverage.xml') != ''
        run: |
          set -euo pipefail
          sed -i 's#<source></source>#<source>backend</source>#' backend/coverage.xml
          grep -q '<source>backend</source>' backend/coverage.xml \
            && echo "coverage source root set to backend/" \
            || echo "::warning::coverage <source> not rewritten — sonar may report 0% coverage"

      - name: Download Go coverage from CI workflow
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: go-coverage
          # Extract into cli/ so the file lands at cli/coverage.out, matching
          # sonar.go.coverage.reportPaths. The Go profile uses module import
          # paths (github.com/evoila/meho/cli/...), which SonarCloud's Go
          # sensor resolves via cli/go.mod — no path rewrite needed (unlike
          # the Python report).
          path: cli
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # missing artifact degrades to "no Go coverage", never blocks

      - name: Ensure dirmngr is available (for sonar-scanner GPG verify)
        run: |
          set -euo pipefail
          if ! command -v dirmngr >/dev/null 2>&1; then
            sudo -n DEBIAN_FRONTEND=noninteractive apt-get update -y
            sudo -n DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends dirmngr
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f  # v8.2.1
        with:
          # Stamp each analysis with the analysed commit so SonarCloud's
          # history is navigable (the project version was "not provided").
          args: >-
            -Dsonar.projectVersion=${{ github.event.workflow_run.head_sha }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
