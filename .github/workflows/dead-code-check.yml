name: Dead Code Check

on:
  pull_request:
    branches: [main, develop]

env:
  # Baselines for public repo where .planning/reports/ does not exist.
  # Update these when running vulture/knip locally on the private repo.
  VULTURE_BASELINE: "25"
  KNIP_BASELINE: "398"

jobs:
  python-dead-code:
    name: Python Dead Code (Vulture)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "vulture>=2.15"

      - name: Run Vulture
        run: |
          # Count dead code candidates (exit 0 even if found — we check count)
          COUNT=$(vulture meho_app/ vulture_whitelist.py --min-confidence 80 2>&1 | wc -l | tr -d ' ')
          echo "Vulture found $COUNT dead code candidates"
          # Read baseline from private repo report, fall back to env var for public repo
          BASELINE=$(grep -oP 'Baseline: \K[0-9]+' .planning/reports/vulture-report.md 2>/dev/null || echo "${{ env.VULTURE_BASELINE }}")
          echo "Baseline: $BASELINE"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::Dead code increased from $BASELINE to $COUNT candidates. Run vulture locally and update the report."
            vulture meho_app/ vulture_whitelist.py --min-confidence 80
            exit 1
          fi
          echo "Dead code count ($COUNT) is at or below baseline ($BASELINE)"

  typescript-dead-code:
    name: TypeScript Dead Code (Knip)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: meho_frontend/package-lock.json

      - name: Install dependencies
        working-directory: meho_frontend
        run: npm ci

      - name: Run Knip
        working-directory: meho_frontend
        run: |
          # Count dead code candidates (total issue lines, not categories)
          COUNT=$(npx knip --no-progress 2>&1 | grep -cE '^\s' || true)
          echo "Knip found $COUNT dead code items"
          # Read baseline from private repo report, fall back to env var for public repo
          BASELINE=$(grep -oP 'Baseline: \K[0-9]+' ../.planning/reports/knip-report.md 2>/dev/null || echo "${{ env.KNIP_BASELINE }}")
          echo "Baseline: $BASELINE"
          if [ "$COUNT" -gt "$BASELINE" ]; then
            echo "::error::Dead code items increased from $BASELINE to $COUNT. Run knip locally and update the report."
            npx knip --no-progress
            exit 1
          fi
          echo "Knip issue count ($COUNT) at or below baseline ($BASELINE)"
