{{/*
Backend Secret.

Renders only when the chart owns the backend Secret. Set
`secrets.existingSecret` to a non-empty name and the operator owns
the Secret resource out-of-band â€” typical production path under an
External Secrets Operator (ESO) integration; see the chart README
`## Secrets` section for the canonical ExternalSecret manifest.

`secrets.create=false` skips this template even when `existingSecret`
is empty, leaving the operator to apply a hand-written Secret via
`kubectl apply -f`. Both off-paths assume the named Secret exists at
install time; otherwise the backend pod hangs in
`CreateContainerConfigError`.

The Secret name resolves through `meho.backend.secretName` so the
backend Deployment's `envFrom: secretRef` and this template stay in
lock-step on rename.

`stringData` carries plain text; the Kubernetes apiserver auto-base64s
at admission. `helm install --set secrets.jwtSecretKey=...` flows
through `helm history` â€” fine for evaluator installs, never for
production. The two-stage validation (`required` for non-empty,
`fail` + `len` for the encryption-key length) is wrapped in the
same outer `{{- if ... }}` block so neither check fires when the
chart is in external-secret mode (Helm's `required` and `fail` are
both lazy w.r.t. the surrounding control flow). The 32-character
minimum mirrors what `meho_app/core/config.py` enforces at backend
startup â€” failing at template time turns a `CrashLoopBackOff`
debug session into a one-line `helm install` error.

`MEHO_LICENSE_KEY` is optional â€” community mode runs without it. The
key is omitted from the rendered Secret entirely when not supplied,
keeping `kubectl describe secret` output honest.
*/}}
{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
{{- $jwtKey := required "secrets.jwtSecretKey is required when secrets.create=true (set the JWT signing key, or set secrets.existingSecret to use an externally managed Secret instead)" .Values.secrets.jwtSecretKey }}
{{- $encKey := required "secrets.credentialEncryptionKey is required when secrets.create=true (set the connector-credential encryption key, or set secrets.existingSecret to use an externally managed Secret instead)" .Values.secrets.credentialEncryptionKey }}
{{- if lt (len $encKey) 32 }}
{{- fail "secrets.credentialEncryptionKey must be at least 32 characters when secrets.create=true (the backend rejects shorter values at startup; see meho_app/core/config.py)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "meho.backend.secretName" . }}
  labels:
    {{- include "meho.backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET_KEY: {{ $jwtKey | quote }}
  CREDENTIAL_ENCRYPTION_KEY: {{ $encKey | quote }}
  {{- with .Values.secrets.licenseKey }}
  MEHO_LICENSE_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
