# Development / evaluator overlay.
#
# Usage:
#   helm install meho ./deploy/helm/meho \
#     --values ./deploy/helm/meho/values-dev.yaml
#
# This overlay is for laptops, kind clusters, and demos. It bundles
# Postgres + Redis subcharts so the operator does not need an
# external database. NOT for production — see `values-prod.yaml`
# for the production starting point.

image:
  variant: slim
  pullPolicy: Always

# appEnvironment: override the chart-default `prod` so the
# evaluator path renders `ENV=dev` inside the backend container.
# Without this override, `helm install ... --values values-dev.yaml`
# would silently run the app in production mode.
appEnvironment: dev

backend:
  replicaCount: 1
frontend:
  replicaCount: 1

resources:
  backend:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

embedded:
  enabled: true
