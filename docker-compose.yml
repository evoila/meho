# ==================================================================================
# MEHO Docker Compose Configuration (Community Edition Default)
#
# Quick start:
#   docker compose up              # Starts full community stack (no .env needed)
#   ./scripts/dev-env.sh up        # Development mode (runs migrations)
#
# Default credentials: admin / admin (change immediately in production!)
# Set ANTHROPIC_API_KEY in .env to enable LLM features.
#
# TEI sidecars (bge-m3 embeddings + bge-reranker-v2-m3) require the "tei" profile.
# dev-env.sh auto-activates this profile only when VOYAGE_API_KEY is not set.
# Manual: docker compose --profile tei up
# ==================================================================================

name: meho  # Explicit project name prevents meho/mehox confusion

x-common-env: &common-env
  MEHO_LLM_PROVIDER: ${MEHO_LLM_PROVIDER:-anthropic}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}  # Optional: required only for MEHO_LLM_PROVIDER=anthropic
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}  # Optional: required only for MEHO_LLM_PROVIDER=openai
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}  # Optional: required only for MEHO_LLM_PROVIDER=ollama
  VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}  # Optional: set for Voyage AI enterprise embeddings
  CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-community-default-key-change-in-prod-32chars}
  OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-meho-dev-data}
  OBJECT_STORAGE_ENDPOINT: http://minio:9000
  OBJECT_STORAGE_ACCESS_KEY: minioadmin
  OBJECT_STORAGE_SECRET_KEY: minioadmin
  OBJECT_STORAGE_USE_SSL: "false"
  REDIS_URL: redis://redis:6379/0
  LOG_LEVEL: INFO
  ENV: ${APP_ENVIRONMENT:-dev}
  # LLM Model Configuration -- two-tier Anthropic defaults
  # Heavy reasoning (Opus 4.6)
  LLM_MODEL: ${LLM_MODEL:-anthropic:claude-opus-4-6}
  STREAMING_AGENT_MODEL: ${STREAMING_AGENT_MODEL:-anthropic:claude-opus-4-6}
  PLANNER_MODEL: ${PLANNER_MODEL:-anthropic:claude-opus-4-6}
  EXECUTOR_MODEL: ${EXECUTOR_MODEL:-anthropic:claude-opus-4-6}
  INTERPRETER_MODEL: ${INTERPRETER_MODEL:-anthropic:claude-opus-4-6}
  # Utility tasks (Sonnet 4.6)
  CLASSIFIER_MODEL: ${CLASSIFIER_MODEL:-anthropic:claude-sonnet-4-6}
  DATA_EXTRACTOR_MODEL: ${DATA_EXTRACTOR_MODEL:-anthropic:claude-sonnet-4-6}
  WORKFLOW_BUILDER_MODEL: ${WORKFLOW_BUILDER_MODEL:-anthropic:claude-sonnet-4-6}
  TRANSFORM_GENERATION_MODEL: ${TRANSFORM_GENERATION_MODEL:-anthropic:claude-sonnet-4-6}
  WORKFLOW_LLM_REPORT_MODEL: ${WORKFLOW_LLM_REPORT_MODEL:-anthropic:claude-sonnet-4-6}
  # Embeddings
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-voyage-4-large}
  TEI_EMBEDDING_URL: ${TEI_EMBEDDING_URL:-http://tei-embeddings:80}
  TEI_RERANKER_URL: ${TEI_RERANKER_URL:-http://tei-reranker:80}
  # OpenTelemetry Configuration
  OTEL_SERVICE_NAME: meho
  OTEL_EXPORTER_OTLP_ENDPOINT: http://seq:80/ingest/otlp
  OTEL_CONSOLE: "true"
  MEHO_LOG_LEVEL: INFO

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - meho-network

services:
  # =============================================================================
  # Infrastructure Services
  # =============================================================================

  postgres:
    <<: *service-defaults
    image: pgvector/pgvector:pg15  # PostgreSQL with pgvector extension
    environment:
      POSTGRES_DB: meho
      POSTGRES_USER: meho
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meho"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    <<: *service-defaults
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_BROWSER_REDIRECT_URL: http://localhost:9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5

  redis:
    <<: *service-defaults
    image: redis/redis-stack-server:latest
    command: redis-server --save "" --protected-mode no --loadmodule /opt/redis-stack/lib/rejson.so --loadmodule /opt/redis-stack/lib/redisearch.so
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    <<: *service-defaults
    image: quay.io/keycloak/keycloak:24.0
    container_name: meho-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: meho
      KC_DB_PASSWORD: password
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_PROXY: edge
    command: start-dev --import-realm --spi-login-protocol-openid-connect-suppress-logout-confirmation-screen=true
    ports:
      - "8080:8080"
    volumes:
      - ./config/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && timeout 1 cat <&3 | grep -q 'UP'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 90s

  pgadmin:
    <<: *service-defaults
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@meho.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  # =============================================================================
  # Observability
  # =============================================================================

  seq:
    <<: *service-defaults
    image: datalust/seq:latest
    ports:
      - "5341:80"      # UI + OTLP ingestion
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    volumes:
      - seq_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # TEI Embedding & Reranking Sidecars (profile: tei)
  # Only started when VOYAGE_API_KEY is not set (auto-detected by dev-env.sh).
  # Models download from HuggingFace Hub on first boot (~2-4 min).
  # Manual start: docker compose --profile tei up
  # For GPU: replace cpu-1.9 with 1.9 and add deploy.resources.reservations.devices
  # Note: x86_64 only -- no ARM64/Apple Silicon build available.
  # =============================================================================

  tei-embeddings:
    <<: *service-defaults
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    command: --model-id BAAI/bge-m3 --port 80
    ports:
      - "8090:80"
    volumes:
      - tei_models:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s
    profiles: ["tei"]

  tei-reranker:
    <<: *service-defaults
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    command: --model-id BAAI/bge-reranker-v2-m3 --port 80
    ports:
      - "8091:80"
    volumes:
      - tei_models:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 120s
    profiles: ["tei"]

  # =============================================================================
  # MEHO Unified Backend Service (replaces 5 distributed services)
  # =============================================================================

  meho:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.meho
    ports:
      - "8000:8000"
    volumes:
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://meho:password@postgres:5432/meho
      SERVICE_NAME: meho
      INGESTION_MEMORY_LIMIT_MB: ${INGESTION_MEMORY_LIMIT_MB:-8192}
      INGESTION_PAGE_BATCH_SIZE: ${INGESTION_PAGE_BATCH_SIZE:-50}
      INGESTION_OCR_ENABLED: ${INGESTION_OCR_ENABLED:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173"]}
      # Keycloak configuration (required for authentication)
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-meho-api}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # =============================================================================
  # Frontend Service
  # =============================================================================

  meho-frontend:
    <<: *service-defaults
    build:
      context: .
      dockerfile: docker/Dockerfile.meho-frontend
    environment:
      API_URL: ${API_URL:-http://localhost:8000}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-meho-community}
      KEYCLOAK_CLIENT_ID: ${FRONTEND_KEYCLOAK_CLIENT_ID:-meho-frontend}
    ports:
      - "5173:5173"
    depends_on:
      meho:
        condition: service_started

  # =============================================================================
  # Optional: Ollama Local LLM (started only with --profile ollama)
  # =============================================================================

  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]  # Only started with: docker compose --profile ollama up
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - meho-network
    # GPU support (uncomment for NVIDIA GPU):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  postgres_data:
  minio_data:
  redis_data:
  pgadmin_data:
  seq_data:
  tei_models:  # Shared cache for TEI model downloads (bge-m3 + bge-reranker-v2-m3)
  ollama_data:  # Ollama model cache (persistent across restarts)

networks:
  meho-network:
    driver: bridge

