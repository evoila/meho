name: Feature Request
description: Suggest a new feature or improvement for MEHO
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you'd like.
      placeholder: What should MEHO do?
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case / Problem
      description: What problem does this solve? Why is this feature needed?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
      placeholder: Describe your ideal implementation...
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of MEHO would this affect?
      options:
        - Agent/Investigation
        - Connectors
        - Knowledge Base
        - Topology
        - Frontend UI
        - Docker/Deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: I've tried...
    validations:
      required: false
