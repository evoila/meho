apiVersion: v2
# `name` is the OCI artefact basename — `helm push` derives the published
# package path (`ghcr.io/evoila/meho-chart`) from this field. We keep it as
# `meho-chart` permanently so the GHCR package stays distinct from the
# backplane image package at `ghcr.io/evoila/meho` (Task #33). To preserve
# the existing resource-label invariant (`app.kubernetes.io/name: meho`)
# the umbrella sets `nameOverride: meho` in values.yaml; the chart name
# rename is purely a publish-coordinate concern.
name: meho-chart
description: Governance backplane for AI agents acting on infrastructure
type: application

# version is the *chart* version (calver-bumped by .github/workflows/chart.yml:
# 0.1.YYYYMMDD-<short-sha> on main pushes, plain semver on v* tag pushes).
# appVersion is the *application* version — overridden by the same workflow
# to the git sha being deployed. Both values are placeholders here; the
# publish workflow rewrites them at OCI push time.
version: 0.1.0
appVersion: "0.1.0"

# Tightest Kubernetes API version range that exercises all manifests:
# - networking.k8s.io/v1 NetworkPolicy: stable since 1.19
# - networking.k8s.io/v1 Ingress: stable since 1.19
# RKE2 (Goal #11's target) ships 1.28+; tighten the floor to match.
kubeVersion: ">=1.28.0-0"

icon: https://meho.ai/icon.svg

sources:
  - https://github.com/evoila/meho

maintainers:
  - name: evoila Group
    url: https://github.com/evoila

keywords:
  - mcp
  - governance
  - audit
  - kubernetes
  - backplane

# The broadcast subchart lives in-tree at `charts/broadcast/` (ADR 0005:
# custom Valkey 9.x chart, not Bitnami). `repository: ""` is the documented
# Helm shape for an unpacked local subchart — no `helm dependency update`
# is required, and no Chart.lock is produced. The `condition:` flag flips
# the entire subchart off when an operator points the backplane at an
# external Valkey/Redis endpoint instead (v0.2+ wiring).
dependencies:
  - name: broadcast
    version: 0.1.0
    repository: ""
    condition: broadcast.enabled
