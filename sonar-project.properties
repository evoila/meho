# SonarCloud configuration for MEHO
# Organization and project key must match SonarCloud setup
sonar.projectKey=evoila_meho
sonar.organization=evoila

# Python backend
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.13

# TypeScript frontend
sonar.typescript.lcov.reportPaths=meho_frontend/coverage/lcov.info

# Sources
sonar.sources=meho_app,meho_frontend/src,meho_mcp_server
sonar.tests=tests
sonar.test.inclusions=**/test_*.py,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/__tests__/**

# Exclusions (auto-generated code, build artifacts, test infrastructure)
sonar.exclusions=**/alembic/**,**/node_modules/**,**/__pycache__/**,**/dist/**,meho_mock_systems/**

# Coverage exclusions (same as .coveragerc + .codecov.yml)
sonar.coverage.exclusions=**/test_*.py,**/*test*.py,**/alembic/**,meho_mock_systems/**,tests/**
