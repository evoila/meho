apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "meho.fullname" . }}
  labels:
    {{- include "meho.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "meho.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll the pod whenever the ConfigMap the backplane reads via
        # `envFrom` (below) changes. Helm updates the ConfigMap object on a
        # `config.*`-only upgrade, but the pod template is otherwise
        # byte-identical, so without this the new environment never reaches
        # the running pod until a manual `kubectl rollout restart` (#2586).
        # Hashing the fully rendered configmap.yaml (the Helm howto pattern)
        # means any change to what the pod consumes — config.*, memory.*,
        # topology.*, or the derived MCP/backplane values — forces a rollout,
        # while an unchanged render leaves the checksum stable (no churn).
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "meho.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "meho.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
        {{- /*
        Optional unprivileged-ICMP-ping knob for the net.ping diagnostic
        (Initiative #2405). Default-off: when empty, NO sysctl is rendered
        and NO pod-security posture changes — net.trace / net.path_mtu are
        unprivileged everywhere and net.ping degrades to available=false.
        SECURITY-REVIEW: setting this widens who may open ICMP sockets in
        the pod; see values.yaml `netdiag.pingGroupRange`.
        */}}
        {{- with .Values.netdiag.pingGroupRange }}
        sysctls:
          - name: net.ipv4.ping_group_range
            value: {{ . | quote }}
        {{- end }}
      containers:
        - name: backplane
          # Image reference deliberately offers no `default .Chart.AppVersion`
          # fallback: the values schema rejects empty `image.tag` so every
          # install pins the tag explicitly. Goal #11's deploy discipline
          # forbids any moving reference (including a chart-appVersion shadow).
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "meho.fullname" . }}-config
          env:
            # Surfaces the deployed chart's version to the backplane so
            # GET /version reports a real `chart_version` (#631). chart.yml
            # stamps `.Chart.Version` to the calver at package time; this
            # is the only path that carries that value into the running
            # container (the image build does not know its chart release).
            - name: CHART_VERSION
              value: {{ .Chart.Version | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.credentialsSecret }}
                  key: url
            {{- if .Values.broadcast.enabled }}
            # BROADCAST_REDIS_URL points the backplane at the in-cluster
            # broadcast store. The name must match the env var the
            # backplane actually reads (`Settings.broadcast_redis_url`
            # resolves from `BROADCAST_REDIS_URL` in
            # backend/src/meho_backplane/settings.py); an unset var falls
            # back to `redis://localhost:6379`, so the readiness probe's
            # broadcast leg dials localhost inside the Pod and the healthy
            # Service is never contacted. ADR 0005 locks the
            # wire-protocol-compatible store as Valkey 9.x; `redis-py`
            # (locked driver) parses the `redis://` scheme unchanged.
            - name: BROADCAST_REDIS_URL
              value: "redis://{{ .Release.Name }}-broadcast:{{ .Values.broadcast.service.port }}/0"
            {{- end }}
            # Other operator-supplied secrets (Keycloak client secret, Vault
            # role bindings) come via ESO-synced Kubernetes Secrets; G2.6
            # wires the references when each surface lands.
            {{- if .Values.agent.enabled }}
            # G11.1 (#803) — agent-runtime LLM credentials. Wired only when
            # `agent.enabled: true`; unset → the seam's model factory in
            # `meho_backplane.agent.run` fails closed at first invocation
            # rather than starting a loop with no credentials. Always
            # `secretKeyRef`, never plaintext — the schema rejects an empty
            # `secretName` under `enabled: true` at install time.
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "meho.agentSecretName" . | quote }}
                  key: {{ .Values.agent.secretKey | quote }}
            {{- end }}
            {{- if .Values.keycloakAdmin.enabled }}
            # G11.2 (#803) — Keycloak Admin REST API credentials gating
            # agent-principal registration. All three render together
            # (schema requires `url` + `clientId` + `clientSecret` refs
            # under `enabled: true`). `KEYCLOAK_ADMIN_CLIENT_SECRET` is the
            # only confidential value and uses `secretKeyRef`; the other
            # two are plain operator config and render as `value:`.
            # Unset → `POST /api/v1/agent-principals` returns
            # `503 keycloak_admin_not_configured` (see
            # `meho_backplane.features._agent_runtime_block`).
            - name: KEYCLOAK_ADMIN_URL
              value: {{ .Values.keycloakAdmin.url | quote }}
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: {{ .Values.keycloakAdmin.clientId | quote }}
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "meho.keycloakAdminSecretName" . | quote }}
                  key: {{ .Values.keycloakAdmin.clientSecret.secretKey | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            # Operator-supplied extra env vars (full EnvVar shape — accepts
            # `value` or `valueFrom`). Most common use: pointing
            # `SSL_CERT_FILE` at a trust-manager-distributed bundle path so
            # the Python ssl context trusts internal-CA-signed Vault /
            # Keycloak endpoints (Issue #209).
            {{- toYaml . | nindent 12 }}
            {{- end }}
          # Probes target the backplane's chassis health endpoints (Task #19,
          # `backend/src/meho_backplane/health.py`): `/healthz` for liveness
          # (returns 200 unconditionally; failure → pod restart) and `/ready`
          # for readiness (registry of dependency probes — 503 until G2.2 /
          # G2.3 register concrete probes; failure → pod removed from Service
          # endpoints, no restart). Probes always render — disabling them
          # would mask startup deadlocks and let an unready Pod accept
          # traffic. Every probe field is operator-tunable via
          # `.Values.probes.<kind>.<field>`.
          #
          # `startupProbe` gates liveness/readiness until first boot succeeds
          # (Issue #2393). First boot runs the full typed-op catalog
          # registration plus the fastembed model preload before the app binds
          # :8000 — ~2-3 min, longer on a cold install that downloads model
          # weights into an empty cache PVC. Without this probe the kubelet
          # starts liveness-checking mid-registration and CrashLoopBackOffs a
          # slow-but-healthy pod. The default budget is
          # `failureThreshold × periodSeconds` = 30 × 10s = 300s (5 min); the
          # kubelet disables liveness/readiness until it passes, then the
          # short-delay liveness probe takes over for fast hang detection. The
          # `with` guard lets an operator opt out on a fast cluster by clearing
          # `.Values.probes.startup`.
          {{- with .Values.probes.startup }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.retrieval.modelCache.enabled }}
            # G0.4-T2 (#259) — fastembed ONNX-weight cache. Mount
            # gated on the same `retrieval.modelCache.enabled` knob
            # as the PVC template; flipping it off skips the mount
            # AND the PVC so the Pod still admits cleanly (fastembed
            # downloads weights to an ephemeral path on every restart
            # in that mode).
            - name: fastembed-cache
              mountPath: {{ .Values.retrieval.modelCache.mountPath | quote }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            # Operator-supplied extra VolumeMounts. Paired with
            # `extraVolumes` below — see Issue #209 for the trust-bundle
            # use case (mount a trust-manager ConfigMap into the Pod so
            # `SSL_CERT_FILE` resolves to a real path).
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.retrieval.modelCache.enabled }}
        # G0.4-T2 (#259) — bind the fastembed-cache PVC into the Pod.
        # The PVC itself is rendered by templates/pvc-fastembed-cache.yaml,
        # gated on the same `retrieval.modelCache.enabled` boolean.
        - name: fastembed-cache
          persistentVolumeClaim:
            claimName: {{ include "meho.fullname" . }}-fastembed-cache
        {{- end }}
        {{- with .Values.extraVolumes }}
        # Operator-supplied extra Volumes (full Volume shape). Most common
        # use: mounting a trust-manager-distributed CA bundle ConfigMap
        # so the backplane can connect to internal-CA-signed Vault and
        # Keycloak (Issue #209). Paired with `extraVolumeMounts` above.
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
