# Semgrep static analysis.
#
# Runs on every push and PR. Uses Semgrep's curated registry packs
# (p/python, p/typescript, p/security-audit, p/owasp-top-ten) rather
# than vendored rules. The registry-packs trade-off — registry-side
# changes can silently move suppression behavior — does not bite yet
# because the codebase has no suppressions to break. When suppressions
# accumulate, vendor a curated rule set under .semgrep/rules/ and
# switch the --config flag.
#
# SARIF is uploaded to GitHub Code Scanning (continue-on-error: true
# on the upload step so a not-yet-enabled Code Scanning UI doesn't
# block the workflow). The Semgrep step itself fails on ERROR-severity
# findings (--error --severity ERROR).
#
# Per evoila-bosnia/MEHO.X#712: pip-audit and npm-audit jobs deferred
# until pyproject.toml / package.json exist (their suppression lists
# are deeply tied to MEHO.X's specific dependency graph; carrying
# them over to an empty repo is signal decay).

name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # required for SARIF upload to Code Scanning

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: meho-runners
    timeout-minutes: 15
    # Authenticated Docker Hub pull. The ARC scale-set runs every job
    # as an ephemeral pod sharing one cluster-egress NAT IP, which
    # exhausts Docker Hub's anonymous 100-pulls-per-6h limit fast and
    # has tripped this Semgrep job in production. Authenticated
    # Personal-tier doubles the bucket to 200/6h
    # (https://docs.docker.com/docker-hub/usage/pulls/) — enough
    # short-term while evoila-bosnia/claude-rdc-hetzner-dc#463 stands
    # up the in-cluster pull-through cache that retires this block.
    #
    # `credentials:` is consumed by the runner BEFORE any step runs,
    # so `docker/login-action` cannot substitute. Secrets are
    # provisioned at the `evoila` org level (visibility `all`) so all
    # sibling repos inherit them without per-repo duplication. If
    # either secret is missing the workflow fails template-validation
    # at "Set up job" — that's the intended loud-failure signal that
    # someone deleted the org secret. Bump cadence: monthly review or
    # on advisory.
    container:
      image: semgrep/semgrep:1.160.0
      credentials:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run Semgrep
        run: >
          semgrep scan
          --config p/python
          --config p/typescript
          --config p/security-audit
          --config p/owasp-top-ten
          --sarif
          -o semgrep-results.sarif
          --error
          --severity ERROR

      - name: Upload SARIF as job artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        continue-on-error: true  # tolerate org artifact-storage quota; SARIF goes to Code Scanning regardless
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
          retention-days: 14

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v3
        if: always()
        continue-on-error: true  # graceful fallback if Code Scanning not enabled
        with:
          sarif_file: semgrep-results.sarif
