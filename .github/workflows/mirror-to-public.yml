# Mirror private repo to public repo
#
# Triggered after CI passes on main. Checks out the code, strips private
# directories (.planning/, .claude/, .cursor/), and force-pushes to the
# public evoila/meho repo. Uses a fine-grained PAT (PUBLIC_REPO_PAT) scoped
# to the public repo with contents:write permission.
#
# This is the ONLY authorized path for code to reach the public repo.
# Developers are blocked from pushing directly by the .githooks/pre-push hook.

name: Mirror to Public

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: mirror
  cancel-in-progress: true

jobs:
  mirror:
    name: Mirror to Public Repo
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout private repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1

      - name: Strip private directories
        run: |
          rm -rf .planning/ .claude/ .cursor/

          # Verify stripping was successful
          REMAINING=$(find . -path './.git' -prune -o \( -name '.planning' -o -name '.claude' -o -name '.cursor' \) -print)
          if [ -n "$REMAINING" ]; then
            echo "::error::Private directories still present after stripping: $REMAINING"
            exit 1
          fi
          echo "Private directories stripped successfully."

      - name: Push to public repo
        run: |
          git config user.name "meho-mirror-bot"
          git config user.email "mirror-bot@evoila.com"

          # Stage all changes (deletions of stripped dirs)
          git add -A

          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to mirror."
            exit 0
          fi

          git commit -m "mirror: sync from private $(git rev-parse --short HEAD)"

          # Add public remote and force-push
          git remote add public "https://x-access-token:${{ secrets.PUBLIC_REPO_PAT }}@github.com/evoila/meho.git"
          git push public HEAD:main --force
