apiVersion: v2
name: meho
description: MEHO — AI-powered diagnostic and operations platform
type: application

# version: chart version (SemVer 2). Bumped on every chart change,
# independent of the application version below.
version: 0.1.0

# appVersion: the MEHO image tag this chart targets. String per Helm
# convention so leading zeros and pre-release identifiers survive YAML
# parsing.
appVersion: "0.1.0"

home: https://meho.ai
sources:
  - https://github.com/evoila/meho

maintainers:
  - name: evoila Group
    url: https://meho.ai

icon: https://meho.ai/favicon.png

keywords:
  - ai
  - operations
  - observability
  - kubernetes
  - diagnostic

# dependencies: subcharts pulled in only when `embedded.enabled=true`.
# Production deployments default to operator-supplied managed Postgres
# and Redis (RDS / Cloud SQL / ElastiCache / Memorystore); the embedded
# subcharts are evaluator-only and have no production-grade backup,
# monitoring, or upgrade story.
#
# Aliases are lower-case on purpose: Bitnami subcharts derive resource
# names from `<release>-<alias>`, and Kubernetes resource names must be
# RFC 1123 lower-case (no upper-case letters).
dependencies:
  - name: postgresql
    version: "13.4.4"
    repository: "https://charts.bitnami.com/bitnami"
    condition: embedded.enabled
    alias: embeddedpostgres
  - name: redis
    version: "20.13.4"
    repository: "https://charts.bitnami.com/bitnami"
    condition: embedded.enabled
    alias: embeddedredis
