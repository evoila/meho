  # - package-ecosystem: "pip"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
  #     day: "monday"
  #   labels: ["dependencies", "python"]
  #   commit-message:
  #     prefix: "chore(deps)"
  #
  # - package-ecosystem: "npm"
  #   directory: "/<frontend-path>"
  #   schedule:
  #     interval: "weekly"
  #     day: "monday"
  #   labels: ["dependencies", "frontend"]
  #   commit-message:
  #     prefix: "chore(deps)"
