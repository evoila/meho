# Production overlay.
#
# Usage:
#   helm install meho ./deploy/helm/meho \
#     --values ./deploy/helm/meho/values-prod.yaml \
#     --set-string postgres.external.dsn="$POSTGRES_DSN" \
#     --set-string redis.external.url="$REDIS_URL"
#
# `--set-string` (not `--set`) avoids Helm's value-parser splitting
# on commas / equals inside connection strings. For real production
# wire the DSN and URL through a Secret reference rather than a
# command-line flag — never commit credentials into a values file.

image:
  variant: full
  pullPolicy: IfNotPresent

backend:
  replicaCount: 2
frontend:
  replicaCount: 2
  # Placeholder values that satisfy the chart's `required` checks
  # so `helm template --values values-prod.yaml` works for CI smoke
  # testing. Operators MUST replace `meho.example.com` and
  # `auth.meho.example.com` with their real hostnames before
  # production install — install proceeds with the placeholders
  # but the SPA will fail to reach the backend / Keycloak.
  apiUrl: https://meho.example.com
  keycloakUrl: https://auth.meho.example.com
  allowedOrigins: https://meho.example.com
  keycloakOrigin: https://auth.meho.example.com

resources:
  backend:
    requests:
      cpu: 1000m
      memory: 2Gi
    limits:
      cpu: 4000m
      memory: 8Gi
  frontend:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Production MUST use external managed Postgres and Redis. The
# bundled subcharts have no production-grade backup, monitoring,
# or upgrade story.
embedded:
  enabled: false

# `ingress.host` set to a placeholder so the prod overlay renders
# without operator intervention (CI smoke testing). Operators MUST
# replace with their real public hostname before production install.
# `ingress.tls` MUST be populated when serving over HTTPS — leaving
# it empty downgrades the Ingress to plain HTTP, regardless of how
# requests reach the cluster.
ingress:
  enabled: true
  className: nginx
  host: meho.example.com
