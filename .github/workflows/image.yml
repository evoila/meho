# Backplane container image build + publish pipeline.
#
# Locked tag scheme (Goal #11 — artefact-distribution principle):
#   PR (branch -> main)   : build only, do NOT push (verifies Dockerfile + deps).
#   push to main          : push :<git-sha> (immutable) + :main (moving target).
#   push tag v*           : push :v<x.y.z> (alongside :<sha> + :main from main push).
#
# Goal #11 explicitly forbids :latest as a deploy target — operators MUST pin
# to :<git-sha> (immutable) or :v<x.y.z> (semver, immutable). metadata-action
# is configured to never emit a "latest" tag for that reason.
#
# Multi-arch (linux/amd64 + linux/arm64) is mandatory per Initiative #31 DoD;
# the Dockerfile is digest-pinned and multi-arch ready (PR #163 / Task #32).
# QEMU + buildx make cross-arch builds work on a single amd64 runner; arm64
# layers are emulated (3-5x slower than native, accepted per Dockerfile
# header comment).
#
# Auth uses GITHUB_TOKEN with packages:write — no PATs. The first time the
# workflow pushes to ghcr.io/evoila/meho, the GHCR package is created
# PRIVATE by default; a maintainer must flip visibility to public ONCE via
#   gh api --method PATCH /orgs/evoila/packages/container/meho \
#     -f visibility=public
# (or via the GHCR UI). The workflow can't do this safely from CI — visibility
# is org-scoped and changing it from a workflow would require a PAT with
# org admin scope. README.md documents the one-time step.
#
# Cosign keyless signing (Task #34, ADR 0006):
#   - id-token: write (granted in the permissions block) lets the runner mint
#     a GitHub Actions OIDC token; cosign exchanges that token at Fulcio for
#     a short-lived (~10-min) signing certificate, signs the manifest-list
#     digest, and uploads the signature + certificate to the public Rekor
#     transparency log. No private keys, no GitHub secrets.
#   - The signature is bound to the digest (not the tag), so every tag alias
#     of the same digest (:sha-<long>, :main, :v<x.y.z>) is covered by one
#     `cosign sign` invocation.
#   - The certificate identity an operator verifies against is the workflow
#     file path + ref pattern:
#       https://github.com/evoila/meho/.github/workflows/image.yml@<ref>
#     where <ref> is `refs/heads/main` for main pushes or `refs/tags/v*` for
#     tag pushes. Verification commands and the identity regex live in
#     backend/README.md (operator copy-paste) and docs/codebase/backend.md
#     (rationale).
#
# Supply-chain attestations (Task #35):
#   - provenance + sbom on build-push-action emit small inline OCI annotations
#     into the manifest; the richer syft SBOM attestation + trivy scan run as
#     additional steps on this same job, after the sign step below.
#   - anchore/sbom-action invokes syft against the pushed manifest-list digest
#     and writes SPDX JSON; cosign then packages the SBOM as a Sigstore
#     attestation signed under the same keyless identity as the image. The
#     attestation is content-addressed (bound to the digest, not a tag) so
#     verification works for every tag alias.
#   - aquasecurity/trivy-action scans the same digest for CVEs and emits SARIF.
#     It runs post-push on main/tags with `exit-code: '1'`, so a CRITICAL/HIGH
#     fixed CVE fails the run as a red-main alarm against silent CVE
#     accumulation on a stale base image (it is not a PR merge gate — the step
#     is skipped on pull_request). SARIF results land both on the GitHub
#     Security tab (Code scanning alerts) and as a 30-day workflow artefact.

name: image

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/image.yml'
  push:
    # No `paths:` filter here. Path filtering applies to BOTH branch and tag
    # pushes when set, which would cause a v* tag annotating a docs-only
    # commit on main to skip the image push. Releases must always publish;
    # the cost of an occasional cache-hit-mostly build on a non-backend
    # main commit is negligible.
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write          # push to ghcr.io/evoila/meho
  id-token: write          # cosign keyless OIDC (Task #34, #35)
  security-events: write   # upload trivy SARIF to the Security tab (Task #35)

concurrency:
  # On main/tag pushes: keep one in-flight build per ref so a fast follow-up
  # commit cancels its predecessor. On PRs: scoped by PR ref the same way.
  group: image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (and conditionally push) backplane image
    # Fork-PR guard: never execute arbitrary Dockerfile code from a fork on the
    # self-hosted runner pool. `docker/build-push-action` runs the Dockerfile,
    # which on a self-hosted runner is the canonical fork-PR compromise vector
    # (GitHub Actions hardening guide, "Hardening for self-hosted runners").
    #   - push events (main, v*) -> github.event_name != 'pull_request' -> run.
    #   - same-repo PRs (internal branches) -> head.repo.full_name == github.repository -> run.
    #   - fork PRs -> head.repo.full_name != github.repository -> skip entirely.
    # The OR short-circuits on push events, so the missing pull_request context
    # on push is irrelevant. Job-level (not step-level) so no step ever starts.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: meho-runners-ci
    timeout-minutes: 45  # arm64 emulation under QEMU is 3-5x slower than native
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up QEMU (arm64 emulation for cross-build)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to GHCR
        # PRs build only; no login needed and no GHCR credential available
        # to the workflow on PRs from forks anyway.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ghcr.io/evoila/meho
          # Tag matrix:
          #   type=sha,format=long          -> :sha-<40char> (always emitted)
          #   type=raw,value=main           -> :main         (main push only)
          #   type=semver,pattern={{raw}}   -> :v<x.y.z>     (v* tag push only)
          # NO type=raw,value=latest — Goal #11 forbids :latest as deploy target.
          tags: |
            type=sha,format=long
            type=raw,value=main,enable={{is_default_branch}}
            type=semver,pattern={{raw}}
          # docker/metadata-action emits OCI annotation labels (source, revision,
          # created, etc.) by default; build-push-action applies them as image
          # labels so `docker inspect` shows provenance.
          flavor: |
            latest=false

      - name: Build (and conditionally push) image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: backend
          # Multi-arch invariant (Initiative #31 DoD): publish manifest list
          # covering amd64 + arm64. Dockerfile is digest-pinned so the base
          # image resolves per-arch automatically.
          platforms: linux/amd64,linux/arm64
          # PRs build only (verifies Dockerfile + dep resolution).
          # Main pushes and v* tag pushes go live.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build-identity stamps surfaced via GET /version (#631). The
          # Dockerfile already declares `ARG GIT_SHA` / `ARG BUILD_DATE`
          # and re-exports them as ENV; without these build-args the ARGs
          # keep their `unknown` defaults and the shipped image cannot
          # self-report which commit it was built from. BUILD_DATE reuses
          # docker/metadata-action's `org.opencontainers.image.created`
          # label (RFC3339, UTC) so the /version build_date and the OCI
          # `created` annotation are the same single value — no second
          # `date -u` step that could drift between the two.
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          # GHA-backed remote cache. The first build cold-fills it; subsequent
          # builds reuse layers across branches.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Inline OCI provenance + SBOM annotations on the manifest. These
          # are buildkit-native, cheap, and complement (do not replace) the
          # cosign attestations landing in Task #35.
          provenance: true
          sbom: true

      - name: Echo pushed digest
        # Surfaces the immutable manifest-list digest in workflow logs.
        # The cosign sign step below signs by exactly this digest.
        if: github.event_name != 'pull_request'
        run: echo "Pushed digest=${{ steps.build.outputs.digest }}"

      - name: Ensure envsubst (gettext-base) — cosign-installer dep
        # See chart.yml for context. Same PR-skip gate as the cosign step
        # so PR-only builds don't burn apt time on a package they won't use.
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if command -v envsubst >/dev/null 2>&1; then exit 0; fi
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y --no-install-recommends gettext-base
          else
            apt-get update -q && apt-get install -y --no-install-recommends gettext-base
          fi

      - name: Install cosign
        # Pinned to cosign-installer v4.1.2 (ships cosign v3.0.6 by default;
        # see action.yml). v4.x dropped pre-2.0 cosign support; v3.x of cosign
        # has keyless-by-default semantics — no COSIGN_EXPERIMENTAL=1 needed.
        # SHA pinned per repo policy (every third-party action pins to a SHA;
        # the trailing comment carries the human-readable tag).
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign image with cosign (keyless OIDC)
        # Keyless signing flow:
        #   1. cosign requests an OIDC token from GitHub Actions (id-token: write).
        #   2. Fulcio CA verifies the token's claims (repo + workflow + ref) and
        #      mints a ~10-minute x509 certificate bound to that identity.
        #   3. cosign signs the manifest-list digest with the cert's ephemeral key.
        #   4. cosign uploads {signature, certificate} to the public Rekor
        #      transparency log (tlog-upload defaults to true on keyless;
        #      disabling it would make the post-expiry certificate unverifiable
        #      and is forbidden by ADR 0006).
        #
        # --yes is the non-interactive confirmation (CI has no TTY); it replaces
        # the deprecated COSIGN_EXPERIMENTAL=1 of the cosign-1.x era.
        #
        # We sign the manifest-list digest, not any tag. For multi-arch builds
        # docker/build-push-action's `digest` output IS the manifest-list digest,
        # so this one invocation covers every per-arch child manifest and every
        # tag alias pointing at this digest (`:sha-<long>`, `:main`, `:v<x.y.z>`).
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "ghcr.io/evoila/meho@${DIGEST}"

      - name: Generate SBOM (syft via anchore/sbom-action)
        # anchore/sbom-action wraps syft. It pulls the image by digest (the
        # `image:` input accepts `repo@sha256:...`) and emits the SBOM in the
        # requested format. SPDX JSON is the format the downstream consumer's
        # `cosign verify-attestation --type spdxjson` expects (Goal #11 cross-
        # repo install.sh contract); cosign's predicate type vocabulary maps
        # `spdxjson` -> SPDX 2.x JSON, which is what syft produces here.
        #
        # The action also auto-attaches the SBOM as a workflow run artefact
        # (named `sbom.spdx.json` by default) so it's downloadable for 90 days
        # even before the attest step runs. We *also* pass `output-file:` so
        # the file lives at a predictable path for the cosign attest step.
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ghcr.io/evoila/meho@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          # Skip the per-job auto-upload to GitHub release pages; this workflow
          # also runs on plain main pushes (no release), and the SBOM is
          # already surfaced via cosign attest + the workflow artefact.
          upload-release-assets: false

      - name: Attach SBOM as cosign attestation
        # cosign attest wraps the SBOM file as an in-toto attestation
        # (predicate = SBOM, predicate type = spdxjson), signs it under the
        # same keyless OIDC identity as the cosign sign step above, and
        # uploads {attestation, certificate} to Rekor. Verification:
        #
        #   cosign verify-attestation --type spdxjson \
        #     --certificate-identity-regexp '...' \
        #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
        #     ghcr.io/evoila/meho@<digest>
        #
        # Attest by digest (immutable) — the attestation binds to the manifest
        # list, so every tag alias and per-arch child is covered by one call.
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "ghcr.io/evoila/meho@${DIGEST}"

      - name: Vulnerability scan (trivy, report-only)
        # trivy scans the pushed image (OS packages + language deps,
        # including the uv-installed Python wheels in /app/.venv). Emits
        # SARIF for upload to the GitHub Security tab.
        #
        #   - `severity: CRITICAL,HIGH` restricts the scan to the levels that
        #     actually matter. `limit-severities-for-sarif: true` makes the
        #     SARIF honour that filter — without it the trivy-action emits
        #     ALL severities into SARIF regardless of `severity` (its
        #     documented default), which is why the Security tab previously
        #     showed LOW/MEDIUM alerts the `severity` input was meant to drop.
        #   - `exit-code: '1'` makes the step FAIL when a CRITICAL/HIGH fixed
        #     CVE is present. This scan runs POST-PUSH on main/tags against the
        #     already-pushed digest — it is a red-main alarm against silent
        #     CVE accumulation on a stale base image, NOT a PR merge gate (the
        #     `if:` below skips it on pull_request). A red run means "the base
        #     image drifted; bump the digest (Dependabot docker PR) and
        #     re-push", not "this merge is blocked".
        #   - `ignore-unfixed: true` drops CVEs with no upstream fix
        #     available, which would otherwise dominate the SARIF without
        #     any operator action to take.
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/evoila/meho@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload trivy SARIF to GitHub Security tab
        # SARIF upload surfaces findings under repo -> Security -> Code
        # scanning alerts. Requires `security-events: write` at the job or
        # workflow level — granted in the top-level permissions block.
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          sarif_file: trivy-results.sarif
          # Category disambiguates this run when other SARIF sources (e.g.
          # CodeQL itself) upload to the same repo; without it the upload
          # would overwrite siblings.
          category: trivy-image-scan

      - name: Upload trivy SARIF as workflow artefact
        # Mirrors the SARIF upload as a downloadable artefact (30-day
        # retention) so operators can pull it via `gh run download` without
        # needing Security-tab access.
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30
          if-no-files-found: error
