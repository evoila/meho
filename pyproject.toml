[project]
name = "meho"
version = "0.1.0"
description = "MEHO - Machine Enhanced Human Operator"
requires-python = ">=3.13"
authors = [
    {name = "MEHO Team"}
]
readme = "README.md"
license = "AGPL-3.0-only"

dependencies = [
    # Web Framework
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    # Database
    "sqlalchemy[asyncio]>=2.0.0",
    "alembic>=1.12.0",
    "asyncpg>=0.29.0",
    # Data Validation
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    # AI/Agents
    "pydantic-ai-slim[anthropic,openai,mcp]>=1.63.0",
    # Vector Store (PostgreSQL with pgvector)
    "pgvector>=0.2.0",
    # Object Storage
    "boto3>=1.29.0",
    # Cache
    "redis>=5.0.0",
    # Rate Limiting
    "slowapi>=0.1.9",
    # HTTP Client
    "httpx>=0.25.0",
    "aiohttp>=3.9.0", # For async SOAP transport
    # SOAP/WSDL Support
    "zeep>=4.2.0", # SOAP client library for WSDL parsing and execution
    # VMware vSphere Support (TASK-97)
    "pyvmomi>=8.0.0.0", # VMware vSphere API Python SDK
    # Proxmox VE Support (TASK-100)
    "proxmoxer>=2.0.0", # Proxmox VE API Python SDK
    # Google Cloud Platform Support (TASK-102)
    "google-cloud-compute>=1.14.0", # Compute Engine SDK
    "google-cloud-container>=2.32.0", # GKE SDK
    "google-cloud-monitoring>=2.18.0", # Cloud Monitoring SDK
    "google-auth>=2.23.0", # GCP Authentication
    "google-cloud-build>=3.35.0", # Cloud Build SDK
    "google-cloud-artifact-registry>=1.20.0", # Artifact Registry SDK
    "google-cloud-run>=0.16.0", # Cloud Run Jobs SDK (ephemeral workers)
    "google-cloud-storage>=2.14.0", # Cloud Storage SDK (build logs)
    # Azure Cloud Platform Support (Phase 92)
    "azure-identity>=1.25.0", # Azure Authentication
    "azure-mgmt-compute>=37.0.0", # VMs, Disks
    "azure-mgmt-monitor>=7.0.0", # Metrics, Alerts
    "azure-mgmt-containerservice>=41.0.0", # AKS Clusters, Node Pools
    "azure-mgmt-network>=30.0.0", # VNets, NSGs, Load Balancers
    "azure-mgmt-storage>=24.0.0", # Storage Accounts
    "azure-mgmt-web>=10.0.0", # App Service, Functions
    "azure-mgmt-resource>=23.0.0", # Resource Groups
    # Kubernetes Support (TASK-159)
    "kubernetes-asyncio>=24.2.0", # Kubernetes async client
    # Web Crawling (URL ingestion for knowledge base)
    "crawl4ai>=0.8.0",
    # Container management (Docker backend for ephemeral workers)
    "docker>=7.1.0",
    # File Processing
    "python-multipart>=0.0.6",
    # PDF primitive (page-count probe in the lightweight ingestion path).
    "pypdfium2>=5.6.0",
    # Lightweight CPU-only document ingestion (PDF/DOCX/HTML).
    "pymupdf4llm>=1.27.0", # PDF text + layout -> markdown (AGPL-3.0)
    "pdfplumber>=0.11.0", # PDF table extraction (MIT)
    "rapidocr-onnxruntime>=1.2.0", # OCR for scanned PDFs, no PyTorch (Apache-2.0)
    "python-docx>=1.1.0", # DOCX extraction (MIT)
    "beautifulsoup4>=4.12.0", # HTML extraction (MIT)
    "lxml>=5.0.0", # HTML parser backend for bs4 (BSD)
    # Templating
    "jinja2>=3.1.0",
    # Search & Retrieval (BM25 lexical + Porter stemmer)
    "rank-bm25>=0.2.2",
    "nltk>=3.8.0",
    # Embeddings (in-process ONNX via fastembed; CPU-only, no PyTorch/transformers)
    "fastembed>=0.7.0",
    "tiktoken>=0.7.0",  # BPE token counting for text_validation (approximate guard for MiniLM inputs)
    # Data Processing
    "duckdb>=1.4.3", # SQL queries on Arrow tables (data reduction + jsonflux)
    "pyarrow>=21.0.0", # Parquet support for efficient Redis caching + jsonflux
    # JSON Structure Analysis (jsonflux)
    "msgspec>=0.20.0",
    "tabulate>=0.9.0",
    # OpenTelemetry (core)
    "opentelemetry-api>=1.27.0",
    "opentelemetry-sdk>=1.27.0",
    "opentelemetry-exporter-otlp-proto-http>=1.27.0",
    # OpenTelemetry instrumentation
    "opentelemetry-instrumentation-fastapi>=0.48b0",
    "opentelemetry-instrumentation-sqlalchemy>=0.48b0",
    "opentelemetry-instrumentation-httpx>=0.48b0",
    # Utilities
    "python-jose[cryptography]>=3.3.0",
    "cryptography>=41.0.0",
    "python-dotenv>=1.0.0",
    # Keycloak Integration (TASK-139)
    "python-keycloak>=4.0.0",
    # Scheduled Tasks (Phase 45)
    "APScheduler>=3.11,<4", # Cron scheduling with PostgreSQL persistence
    "croniter>=6.0.0", # Cron expression parsing and validation
    "psycopg2-binary>=2.9.0", # Sync PostgreSQL driver for APScheduler's SQLAlchemyJobStore
    # Slack Integration (Phase 94.1)
    "slack-bolt>=1.27.0,<2.0.0", # Slack app framework (handlers, Socket Mode, FastAPI adapter)
    # Network Diagnostics (Phase 96.1)
    "aiodns>=4.0.0", # Async DNS resolver for SRV/MX/CNAME record queries
    "markdown>=3.10.2",
    "typer>=0.21.2",
    "rich>=14.3.1",
]

[project.scripts]
# Console scripts shipped with the wheel. `meho-dev` replaces the old
# scripts/dev-env.sh bash wrapper (see #310 / PR-M). Implemented as a Typer
# app so each subcommand is a unit-testable Python function.
meho-dev = "meho_app.tools.dev:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = [
    "meho_app",  # Unified monolith application (includes core/ for shared utilities)
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",     # pycodestyle errors
    "W",     # pycodestyle warnings
    "F",     # pyflakes
    "I",     # isort
    "B",     # flake8-bugbear
    "BLE",   # flake8-blind-except (blocks new broad Exception catches)
    "C4",    # flake8-comprehensions
    "UP",    # pyupgrade
    "S",     # flake8-bandit (security)
    "ASYNC", # flake8-async
    "PT",    # flake8-pytest-style
    "DTZ",   # flake8-datetimez
    "SIM",   # flake8-simplify
    "RUF",   # Ruff-specific rules
    "PERF",  # Perflint performance anti-patterns
    "ERA",   # eradicate (commented-out code detection)
    "TCH",   # flake8-type-checking (TYPE_CHECKING import optimization)
]
ignore = [
    "E501",    # line too long (handled by formatter)
    "B008",    # do not perform function calls in argument defaults
    "RUF100",  # unused noqa directives (noqa comments cover multiple rules incl. non-enabled)
]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.per-file-ignores]
# --- Existing ignores ---
"__init__.py" = ["F401"]
"**/alembic/env.py" = ["E402"]
"tests/**/*.py" = [
    "S101",    # assert usage (standard in tests)
    "S105",    # hardcoded password strings (test fixtures)
    "S106",    # hardcoded password func args (test fixtures)
    "S311",    # non-cryptographic random (tests don't need crypto)
    "PERF",    # performance rules less critical in test code
    "ERA",     # test comments describe setup/expected behavior (false positives)
    "TCH",     # TYPE_CHECKING moves break test mocking patterns
    "E402",    # sys.modules stubbing requires imports after stub block
    "F821",    # pytest fixtures/conftest symbols unresolvable by static analysis
    "F401",    # fixture imports appear unused but needed for pytest discovery
    "I001",    # import order after sys.modules stubs is intentional
    "DTZ001",  # naive datetimes in test data (matching DB timestamps)
    "B017",    # broad pytest.raises(Exception) acceptable in tests
    "PT011",   # broad pytest.raises match patterns acceptable in tests
    "F841",    # assigned-but-unused fixture setup variables
    "SIM117",  # multiple with-statements for readability in tests
    "SIM108",  # if-else vs ternary preference in tests
    "SIM105",  # suppressible-exception in test helpers
    "ASYNC230",# blocking open in async test context
    "RUF059",  # unused unpacked variables in test destructuring
    "RUF043",  # ambiguous pytest.raises pattern
    "B007",    # unused loop variable in test iteration
    "UP041",   # timeout-error-alias in older test patterns
    "BLE001",  # broad Exception catches acceptable in test helpers and contract tests
]
